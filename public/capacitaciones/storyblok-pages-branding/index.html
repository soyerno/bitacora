  <script>window.LESSONS = [{"id":"intro","num":"·","title":"Empezá acá","eyebrow":"Curso sin código · te empodera a hacerlo vos","file":"","md":"# Armá páginas de modo.com.ar — sí, vos\n\n> **Al terminar, armás páginas de modo.com.ar de punta a punta.** Crear, editar y publicar, a tu ritmo, sin escribir una línea de código. La marca y la calidad ya vienen resueltas en las piezas: vos ponés el contenido y las decisiones, y la página sale.\n\n## Esto es tuyo\n\nUna parte enorme de cada página —qué secciones tiene, en qué orden, con qué textos, qué imágenes, qué contenido, cuándo sale— **la manejás vos**. Este curso te da las llaves para hacerlo.\n\n## Para quién\n\n- **Branding y diseño** que quiere ver su criterio reflejado en el sitio sin intermediarios.\n- **Contenido y marketing** que escribe, arma campañas y necesita publicar a tiempo.\n- Cualquiera que quiera **armar y publicar** una página a su ritmo.\n\n## Qué vas a SABER HACER al terminar\n\n1. **Crear** una página nueva eligiendo y ordenando sus secciones.\n2. **Editar** textos, imágenes, botones y contenido con total tranquilidad.\n3. **Previsualizar** tu trabajo antes de que lo vea nadie.\n4. **Publicar** cuando vos decidas que está listo.\n5. **Hacer que pase los controles de calidad** — porque vas a saber qué mira cada uno y cómo darle lo que pide.\n\nNo es teoría: la última lección es una **práctica guiada** donde armás tu primera página de punta a punta.\n\n## La idea en una imagen\n\nPensá una página como una **construcción con bloques** (estilo LEGO):\n\n- La **página** es lo que armás: una landing de producto, una campaña, una sección.\n- Los **bloques** son las piezas: un encabezado grande, una grilla de logos, un banner con botón, un listado de bancos. Ya están hechas y probadas; vos las **elegís, las ordenás y las llenás de contenido**.\n- Vos **diseñás la página**: elegís las piezas, el orden y el contenido, y se lo pedís a Claude, que la arma y la actualiza por vos.\n\nLo mejor: **experimentás libre.** Borrador y vista previa para probar todo lo que quieras, y la marca ya viene incorporada en cada pieza, así que siempre sale prolijo. Pedí, mirá, ajustá, publicá.\n\n## El recorrido\n\n| # | Lección | Lo que te llevás |\n|---|---------|------------------|\n| 01 | [Tu material de trabajo](#01) | Pensar la página como bloques que combinás |\n| 02 | [Le pedís a Claude](#02) | Cómo dirigís el armado (Claude lo hace por vos) |\n| 03 | [La marca juega para vos](#03) | La marca ya viene en las piezas — siempre on-brand |\n| 04 | [Hacé que pase los controles](#04) | Qué mira cada control y cómo darle el OK |\n| 05 | [Publicá con confianza](#05) | Llevar tu página a la gente, sin sustos |\n| 🚀 | [Práctica: tu primera página](#practica) | Armala de cero, guiado paso a paso |\n| 📖 | [Glosario](#glosario) | Las palabras técnicas, en humano |\n\n> Arrancá por [01 · Tu material de trabajo](#01). Vas a terminar con una página tuya publicada.\n"},{"id":"01","num":"01","title":"Tu material de trabajo","eyebrow":"Lección 01 · Página, bloque, dirección","file":"01-pagina-que-es.md","md":"# 01 · Tu material de trabajo\n\n> Con tres ideas ya estás listo para construir: **página**, **bloque** y **dirección**. Dominás esto y dominás el 80% del trabajo.\n\n## La página la armás vos\n\nUna página es una pantalla completa de modo.com.ar: una landing de producto, una página de campaña, una sección del sitio. Armarla es **tu trabajo creativo**: elegís qué secciones la componen, en qué orden y con qué contenido.\n\n## Los bloques son tus piezas\n\nCada página se construye apilando **bloques** de arriba hacia abajo. Tu caja de piezas incluye, entre otras:\n\n- **encabezado** grande con título, bajada e imagen;\n- **grilla** de logos o tarjetas;\n- **banner** con su botón;\n- **listado de bancos**;\n- **carrusel**, **video**, **preguntas frecuentes**.\n\nEstas piezas ya están construidas y probadas. Tu poder está en **elegirlas, ordenarlas y darles contenido** para contar lo que querés — se lo pedís a Claude y él las arma. Dos personas con la misma caja de bloques arman páginas distintas: la diferencia es tu criterio.\n\n### Lo que armás solo (que es casi todo)\n\n| Lo hacés vos, solo | Sumás a diseño/desarrollo |\n|--------------------|---------------------------|\n| Elegir qué bloques y en qué orden | Inventar una pieza visual que **nunca existió** en el sitio |\n| Cargar textos, imágenes, botones, contenido | Sumar un color nuevo a la marca |\n| Elegir la dirección de la página | — |\n| Previsualizar y publicar | — |\n\nLo primero siempre es **mirar qué piezas ya existen y reusarlas**: la mayoría de las páginas se arman enteras así, y eso lo hacés solo, hoy. Si tu idea necesita una pieza nueva, se diseña y se suma al kit pasando por las validaciones del equipo — y queda lista para que cualquiera la reuse después. Reusar primero te deja avanzar rápido con todo lo que ya tenés a mano.\n\n> Truco para saber si lo podés hacer solo: describí tu página en voz alta. “Encabezado, después grilla de 6 logos, después banner con botón.” Si suena así, son piezas que ya tenés. Si decís “quiero un efecto que nunca vimos”, ahí sí convocás a diseño.\n\n## La dirección es tu decisión\n\nLo que va después de `modo.com.ar/` lo elegís vos al crear la página. Por ejemplo `modo.com.ar/pagos-agenticos`. Conviene que sea **clara y estable**: es lo que vas a compartir en campañas y lo que ayuda a que te encuentren en buscadores (lección 04). Cambiarla después rompe los links que ya circularon, así que elegila pensando a futuro.\n\n> Siguiente: [02 · Le pedís a Claude](#02) — pasamos a la acción.\n"},{"id":"02","num":"02","title":"Le pedís a Claude","eyebrow":"Lección 02 · Dirigís el armado · Claude lo hace por MCP","file":"02-storyblok.md","md":"# 02 · Le pedís a Claude\n\n> No tocás Storyblok a mano. Le **describís a Claude** qué querés y Claude crea y actualiza la página por vos, conectado a Storyblok. Vos dirigís, revisás y pedís ajustes — en lenguaje normal, sin código.\n\n## Cómo funciona\n\nStoryblok es donde **vive** el contenido del sitio, pero vos no entrás a cargar campos uno por uno. Claude está conectado a Storyblok (por una integración llamada **MCP**) y hace el trabajo mecánico: crea la página, arma los bloques, carga los textos e imágenes que le pasás, y los actualiza cuando le pedís cambios.\n\nTu rol es el de quien **dirige**: decís qué querés, mirás cómo queda, pedís ajustes. El de quien decide y aprueba, no el de quien teclea en una herramienta.\n\n## El ida y vuelta\n\n1. **Le pedís la página.** En lenguaje normal: “armá una landing en `/pagos-agenticos` con un encabezado que diga X, una grilla de 3 beneficios y un botón ‘Conocé más’ que vaya a Y”.\n2. **Claude la genera** en Storyblok (vía MCP): crea la página, elige los bloques, carga tu contenido.\n3. **Revisás la vista previa.** Mirás cómo quedó, como lo verá la gente, todavía en privado.\n4. **Pedís ajustes.** “Cambiá el título”, “sumá un beneficio”, “movelo arriba del botón”. Claude actualiza la misma página.\n5. **Publicás** cuando estás conforme (se lo pedís a Claude, o lo aprobás vos).\n\n> El borrador es tu campo de pruebas: pedí, mirá, cambiá, repetí. Probá todo lo que quieras — la página recién llega a la gente cuando se publica.\n\n## Borrador vs publicado\n\n- **Borrador**: lo ven vos y el equipo. Para iterar con Claude.\n- **Publicado**: lo ve cualquiera que entre a la página.\n\nSi alguien dice “no veo tu cambio”, casi siempre es que está en borrador y falta publicar. Pedile a Claude que publique (o publicalo vos).\n\n## Qué darle a Claude para que salga redonda\n\nCuanto más claro el pedido, mejor sale a la primera. Tené listo:\n\n- **Los textos finales** (título, bajada, beneficios, texto de botones).\n- **Las imágenes** en buena calidad, con una **descripción corta de cada una** (el “texto alternativo” — Claude lo carga, pero vos sabés qué muestra la foto; nunca va vacío).\n- **La dirección** de la página (la URL que decidiste en la lección 01).\n- **A dónde llevan los botones** (links finales).\n- **Título y descripción para buscadores** (para Google y los buscadores con IA).\n\nCon eso, pedís la página y la tenés armada en minutos. Después, todo ajuste es otro pedido en lenguaje normal.\n\n> Siguiente: [03 · La marca juega para vos](#03)\n"},{"id":"03","num":"03","title":"La marca juega para vos","eyebrow":"Lección 03 · El sistema te respalda","file":"03-marca.md","md":"# 03 · La marca juega para vos\n\n> La marca es un sistema que te respalda: armes lo que armes, va a verse MODO. Te libera para enfocarte en el contenido.\n\n## Un sistema que te cuida\n\nLos colores (el verde MODO), las tipografías (Quicksand y Red Hat Display), los espacios y las formas viven en un **sistema de diseño** único. Cada bloque toma su estilo de ahí automáticamente. ¿Qué significa para vos? Que **la marca ya viene incorporada en cada pieza**: elijas lo que elijas, sale on-brand. Armás con tranquilidad sabiendo que el resultado va a estar prolijo.\n\nPensalo como una cancha con líneas pintadas: jugás libre adentro, y las líneas se encargan de que nunca te vayas afuera.\n\n## Lo que esto te habilita\n\n- **Consistencia gratis.** Tu página va a convivir perfecto con el resto del sitio sin que tengas que medir nada.\n- **A prueba de futuro.** Si mañana la marca ajusta un tono, cambia en todas las páginas de una vez. Tu trabajo no envejece.\n- **Menos decisiones aburridas, más criterio.** No perdés tiempo eligiendo el verde exacto; lo invertís en qué contar y cómo.\n\n## Cómo aprovecharlo al máximo\n\n- **Pensá por intención.** “Quiero que este banner se sienta principal / secundario” — el sistema ya tiene la variante correcta y vos la elegís. Te alcanza con eso.\n- **Las imágenes son tu lienzo libre.** Ahí mandás vos: elegí fotos que convivan con el verde MODO y respiren la marca.\n- **Si una campaña pide un color que no existe en MODO**, eso es una **decisión de marca**: se suma al sistema primero, charlándolo con diseño. Es un paso previo, y deja una variante nueva lista para todos.\n\n## Verse bien = verse para todos\n\nParte de la marca es que el texto se lea con buen contraste y en tamaños cómodos. El sistema ya viene pensado así, con lo cual **cuando usás las piezas tal cual, tu página arranca siendo accesible**. Una cosa menos de la que preocuparte, y un punto a favor cuando pase los controles (lección 04).\n\n> Siguiente: [04 · Hacé que pase los controles](#04)\n"},{"id":"04","num":"04","title":"Hacé que pase los controles","eyebrow":"Lección 04 · Llegá en verde, vos manejás","file":"04-calidad.md","md":"# 04 · Hacé que pase los controles\n\n> Toda página pasa por cuatro controles antes de salir: una red de seguridad que cuida tu trabajo. Llegás a cada uno con el OK puesto, porque sabés qué mira y cómo darle lo que pide.\n\nPensalos como el repaso antes de salir de casa: ¿llaves, billetera, teléfono? Cuatro chequeos, y arrancás tranquilo.\n\n## Control 1 · Que funcione\n\nSe prueba que la página haga lo suyo: que el botón aparezca cuando corresponde, que la lista muestre lo correcto, que nada se rompa. Son pruebas automáticas que quedan guardadas, así que tu trabajo queda protegido para siempre.\n\n**Tu parte:** describir bien qué tiene que pasar (“el botón solo si hay link”). Cuanto más claro lo dejás, más fácil pasa.\n\n## Control 2 · Que sea de marca y esté revisado\n\nOtra persona del equipo da una mirada y una herramienta chequea que esté prolijo y on-brand. Como ya viste en la lección 03, **si usaste las piezas del sistema, este control casi se aprueba solo**.\n\n**Tu parte:** usar los bloques tal cual, pedir por intención, y que el resultado coincida con lo que se quería lograr.\n\n## Control 3 · Que cargue rápido y sea segura\n\nSe mide la **velocidad** (que aparezca rápido y no se mueva sola al cargar) y la **seguridad** (que solo traiga contenido confiable). Acá tu palanca más fuerte son las imágenes.\n\n**Tu parte:** subir imágenes de buena calidad pero **optimizadas** (livianas). Es lo que más mueve la aguja y está enteramente en tus manos. Una foto liviana = una página que vuela.\n\n## Control 4 · Que sea accesible y se encuentre\n\nDos cosas:\n\n- **Accesible** — usable por todos, incluida la gente con discapacidad. Entra el **texto alternativo** de cada imagen, el contraste y poder navegar con teclado.\n- **Encontrable** — que Google y los buscadores con inteligencia artificial puedan leer y mostrar tu página.\n\n**Tu parte:** completar el texto alternativo de cada imagen (nunca vacío) y cargar el **título y la descripción** para buscadores. Dos campos que llenás vos y que deciden si la página incluye a todos y si la gente la encuentra.\n\n## Tu tablero para llegar en verde\n\n| Control | Qué mira | Tu jugada |\n|---------|----------|-----------|\n| 1 · Funciona | Que haga lo suyo, hoy y mañana | Dejar claro el comportamiento esperado |\n| 2 · De marca y revisado | Prolijo, on-brand, lo pedido | Usar las piezas del sistema |\n| 3 · Rápida y segura | Carga ágil, contenido confiable | Imágenes livianas |\n| 4 · Accesible y encontrable | Para todos + visible en buscadores | Texto alternativo + título/descripción |\n\nTres de las cuatro jugadas las **hacés vos directamente** — llegás al control con el OK puesto y la página avanza.\n\n> Siguiente: [05 · Publicá con confianza](#05)\n"},{"id":"05","num":"05","title":"Publicá con confianza","eyebrow":"Lección 05 · Del borrador a producción, al mando","file":"05-publicar.md","md":"# 05 · Publicá con confianza\n\n> Publicar es tu momento. Conocé el camino y lo manejás vos, sin sorpresas y sin depender de que alguien “le dé play” por vos.\n\n## El camino, que vos conducís\n\n1. **Borrador.** Armás y revisás en privado. Iterás todo lo que quieras.\n2. **Vista previa en ambiente real.** Una copia interna del sitio, idéntica a la real, donde ves tu página “en vivo” sin exponerla. Acá se confirman velocidad y seguridad contra algo real.\n3. **Producción (modo.com.ar).** La ve el público. Para llegar acá, los cuatro controles tienen que estar en verde y, según el caso, hace falta una aprobación.\n\nEs como una función de teatro: ensayás, hacés el ensayo general con la sala vacía, y recién después abrís al público. Vos estás al mando en cada paso.\n\n## Por qué hay aprobaciones (y por qué es bueno para vos)\n\nPublicar a producción puede requerir el visto bueno del equipo o de las áreas dueñas del contenido. No es burocracia que te frena: es la red que evita que algo a medio hacer salga con tu nombre. Te da respaldo. Y como ya sabés qué mira cada control (lección 04), llegás a pedir la aprobación con todo resuelto.\n\n## Manejá tus tiempos como un profesional\n\n- **Cerrá el contenido temprano.** Textos e imágenes listos y aprobados con días de margen, no la mañana del lanzamiento.\n- **Borrador no es online.** Tener la página impecable en vista previa no la pone en la calle: falta publicar. Tenelo claro y no te agarra desprevenido.\n- **Los cambios de último minuto cuestan.** Cada cambio reinicia parte de los controles. Si planificás, todo fluye.\n\n## Tu checklist antes de dar publicar\n\n- [ ] Textos finales y aprobados (cero “lorem ipsum” o provisorios).\n- [ ] Imágenes de buena calidad, livianas y con texto alternativo.\n- [ ] Dirección de la página decidida y estable.\n- [ ] Botones apuntando a links finales.\n- [ ] Título y descripción para buscadores cargados.\n- [ ] Fecha objetivo avisada al equipo con margen.\n\nTildás esto y publicás tranquilo. **La página es tuya, de punta a punta.**\n\n> Ahora lo hacés de verdad: [🚀 Práctica: tu primera página](#practica)\n"},{"id":"practica","num":"🚀","title":"Práctica: tu primera página","eyebrow":"Manos a la obra · armala de cero","file":"","md":"# 🚀 Práctica · Tu primera página\n\n> Llegó el momento. Vas a armar una landing de **producto** de cero, dirigiendo a Claude. Hacelo con Claude abierto mientras leés. Al final tenés una página tuya, lista para mostrar.\n\n## El encargo (para practicar)\n\n> Producto quiere una landing para presentar **Pagos agénticos: pagá con MODO desde ChatGPT** — comprar conversando con un asistente de IA y confirmar el pago con MODO, sin salir del chat. Necesita un encabezado que explique la idea, una sección de cómo funciona, y un botón para saber más. Tiene que sentirse MODO y estar lista para publicar.\n\nCon piezas que ya existen alcanza. Vamos.\n\n## Paso 1 · Pensá la página (lección 01)\n\nAntes de pedir nada, escribí en un papel qué querés:\n\n1. **Encabezado** — título “Pagá con MODO sin salir del chat”, una bajada que explique en una frase qué es, una imagen.\n2. **Cómo funciona** — 3 tarjetas: “Pedís lo que querés conversando”, “Confirmás con tu huella o cara”, “MODO paga de forma segura”.\n3. **Botón** — “Conocé MODO para agentes” → a la página de la solución.\n\nDecidí la **dirección**: `modo.com.ar/pagos-agenticos`. ✅\n\n## Paso 2 · Pedile a Claude que la arme (lección 02)\n\nDescribilo en lenguaje normal. Algo así:\n\n> “Armá una landing en `/pagos-agenticos`. Encabezado con título ‘Pagá con MODO sin salir del chat’, bajada explicando que comprás conversando con una IA y pagás con MODO. Después una grilla de 3 pasos: [los tres]. Cerrá con un banner y un botón ‘Conocé MODO para agentes’ que vaya a [link]. Variante de marca principal.”\n\nClaude crea la página en Storyblok y arma los bloques. Vos no tocás la herramienta.\n\n## Paso 3 · Pasale el contenido fino (lección 02)\n\nDale los textos finales y las imágenes. Por cada imagen, una **descripción corta** (ej.: “Persona comprando desde un chat con IA y confirmando el pago con MODO”) — nunca vacía. Y los **datos para buscadores**: título “Pagos agénticos — pagá con MODO desde ChatGPT” + una descripción que explique el beneficio.\n\n> Producto nuevo: como casi nadie lo busca por su nombre todavía, que la descripción explique el **beneficio** (“comprá conversando y pagá seguro”). Así te encuentran quienes buscan la idea aunque no sepan cómo se llama.\n\n## Paso 4 · Revisá y pedí ajustes (lección 02 + 03)\n\nMirá la vista previa. ¿Algo no te cierra? Pedilo: “hacé el título más corto”, “sumá un cuarto paso”, “que el banner se sienta más destacado”. Claude actualiza. La marca ya viene en las piezas, así que siempre sale prolijo.\n\n## Paso 5 · Repasá los controles antes de publicar (lección 04)\n\n- [ ] ¿El botón aparece y funciona? (Control 1)\n- [ ] ¿Quedó on-brand? (Control 2)\n- [ ] ¿Las imágenes son livianas? (Control 3)\n- [ ] ¿Toda imagen tiene descripción y cargaste título + descripción de buscador? (Control 4)\n\n## Paso 6 · Publicá (lección 05)\n\nCuando estás conforme, pedile a Claude que publique (o aprobalo vos). Felicitaciones: dirigiste el armado y pusiste online la landing de un producto.\n\n## Te aprobás si…\n\n- [ ] Pensaste la página antes de pedirla.\n- [ ] Le pediste a Claude que la arme con una dirección clara.\n- [ ] Le pasaste contenido a los tres bloques.\n- [ ] Toda imagen tiene descripción.\n- [ ] Pediste la variante de marca por intención (sin colores a mano).\n- [ ] Cargaste título y descripción de buscador, explicando el beneficio.\n- [ ] Repasaste los 4 controles antes de publicar.\n\n## Subí la apuesta\n\nCuando esta te salga fácil, pedí variantes: “sumá una sección de preguntas frecuentes (‘¿es seguro?’, ‘¿qué necesito?’)”, “agregá un video mostrando el flujo”, o armá una segunda landing para otro producto. Cada pedido te hace más rápido.\n\n> ¿Quedó algún término en el aire? [📖 Glosario](#glosario)\n"},{"id":"glosario","num":"📖","title":"Glosario","eyebrow":"Vocabulario para hablar de igual a igual","file":"","md":"# 📖 Glosario · técnico → humano\n\n> Dominar estas palabras te deja hablar de igual a igual con desarrollo y diseño. No para entender de afuera: para pedir, decidir y construir con vocabulario propio.\n\n## Contenido y páginas\n\n- **Página / “story”** — Una pantalla completa del sitio (la home, una landing de producto, una sección). En la herramienta de contenido se la llama *story*.\n- **Bloque / “blok”** — Una sección reutilizable de la página: encabezado, grilla, banner, listado. Se construye una vez y se reusa en muchas páginas.\n- **Dirección / URL / “slug”** — Lo que va después de `modo.com.ar/`. Identifica la página y es lo que compartís.\n- **CMS / Storyblok** — Donde vive el contenido del sitio. No lo editás a mano: Claude lo genera y actualiza por vos.\n- **Claude** — El asistente con el que dirigís el armado. Le pedís en lenguaje normal y crea/actualiza la página.\n- **MCP** — La conexión que enchufa a Claude con Storyblok (y otras herramientas), para que pueda crear y actualizar el contenido por vos.\n- **Borrador / “draft”** — Versión visible solo para el equipo, todavía no publicada.\n- **Publicar** — Dejar el contenido visible para el público.\n\n## Marca y diseño\n\n- **Sistema de diseño / design system** — El conjunto único de colores, tipografías y componentes de MODO. Todas las páginas toman su estilo de ahí.\n- **Token** — Cada definición de marca con nombre (por ejemplo, “verde primario”). Se usa el nombre, no el color exacto a mano, para mantener coherencia.\n- **Accesibilidad / a11y** — Que la página sea usable por todos, incluida la gente con discapacidad (contraste, texto alternativo, navegación por teclado).\n- **Texto alternativo / “alt”** — La descripción corta de una imagen. La leen los lectores de pantalla y Google. Nunca va vacía.\n\n## Calidad y publicación\n\n- **Control de calidad / “gate”** — Cada una de las cuatro revisiones que una página debe pasar antes de publicarse. Si una está en rojo, no se publica.\n- **Revisión entre pares / code review** — Otra persona del equipo revisa el trabajo antes de aprobarlo.\n- **Performance / velocidad** — Cuánto tarda la página en aparecer y si se mantiene estable mientras carga.\n- **Seguridad / CSP** — Reglas que aseguran que la página solo cargue contenido de fuentes confiables.\n- **SEO / GEO** — Que la página se pueda encontrar en Google (SEO) y en los buscadores con inteligencia artificial (GEO).\n- **Ambiente de prueba / alpha** — Una copia interna del sitio, idéntica a la real, para probar antes de exponer al público.\n- **Producción** — El sitio real, modo.com.ar, el que ve la gente.\n\n## Roles (a grandes rasgos)\n\n- **Branding / diseño** — Cuida que todo sea de marca y se vea bien.\n- **Contenido / marketing** — Escribe los textos, arma las campañas, elige imágenes.\n- **Desarrollo** — Construye los bloques nuevos, publica a producción, cuida velocidad y seguridad.\n\n> Volvé al [inicio](#intro) cuando quieras.\n"}];</script>
