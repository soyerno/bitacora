  <script>window.LESSONS = [{"id":"intro","num":"·","title":"Introducción","eyebrow":"Capacitación interactiva","file":"","md":"# Capacitación · Consolidar el styling a Tailwind\n\n> **Harness = skills.** Este curso se hace con Claude Code abierto. Cada lección usa skills MODO reales y casos del repo modo-landing. No es para leer y olvidar — es para ejecutar.\n>\n> Autor: Hernán De Souza · Sr AI Engineer · MODO\n\n---\n\n## Por qué existe este curso\n\nmodo-landing convivía con **tres sistemas CSS-in-JS al mismo tiempo**: Tailwind 3, Styled Components 5 y Emotion 11. Eso significa tres runtimes de styling, bundle más grande, SSR frágil y un blocker para la migración a Next.js 15. La consolidación a Tailwind-only resuelve todo eso — component-by-component, con skill auto-invoke como red de contención.\n\nEste curso documenta la estrategia real que aplicamos en PR #1509 (Wave 2, 2026-05-28) y la extiende a un flujo repetible para cualquier componente del repo.\n\n## Qué vas a saber hacer al terminar\n\n1. Detectar qué sistema de styling usa cada componente (Tailwind, SC, Emotion, CSS modules).\n2. Migrar un componente CSS-in-JS a Tailwind usando tokens del design system MODO.\n3. Manejar props dinámicos, media queries y estados con clases condicionales.\n4. Usar los tokens de `tailwind.config.js` sin hardcodear hex ni valores arbitrarios.\n5. Migrar Tailwind 3 → 4 con `@config` backward-compat y los gotchas verificados.\n6. Verificar la migración con Playwright visual regression sin snapshots.\n\n## Learning path\n\n| # | Lección | Skill harness | Lo que tocás |\n|---|---------|---------------|--------------|\n| 00 | [Los 3 sistemas](00-tres-sistemas.md) | `styled-components-to-tailwind` | Diagnóstico |\n| 01 | [Estrategia](01-estrategia.md) | `styled-components-to-tailwind` | Plan de migración |\n| 02 | [CSS-in-JS → utilities](02-css-in-js-a-utilities.md) | `styled-components-to-tailwind` | Mapeo de patrones |\n| 03 | [Tokens + design system](03-tokens-design-system.md) | `tailwind-design-system` | Paleta SDK MODO |\n| 04 | [Tailwind 3 → 4](04-tailwind-3-a-4.md) | `tailwind-3-to-4-migration` | Migración mayor |\n| 05 | [Verify](05-verify.md) | `guardia`, Playwright | Visual regression |\n| 🧪 | [Lab: migrar un componente](exercises/README.md) | todos | Integrador |\n\n## Skills harness disponibles\n\n```\n/styled-components-to-tailwind   # auto-invoke al editar imports de SC/@emotion\n/tailwind-3-to-4-migration       # usar post-consolidación de CSS-in-JS\n/tailwind-design-system          # tokens, variantes, CVA\n/guardia                         # gates completos incl. bundle + visual\n```\n\n## Reglas del equipo que este curso respeta\n\n- **Sin hex hardcodeados** — tokens del design system o CSS variables del SDK.\n- **Sin snapshots** — RTL semántico o Playwright.\n- **Sin nuevas imports de SC o Emotion** tras la migración.\n- **Sin `console.log/error/warn`** en prod.\n- **Commits**: `type(COENXT-XXX): Subject`.\n- **SonarCloud**: 0 new smells, 0 hotspots, ≤3% duplicación.\n\n> Empezá por [00 · Los 3 sistemas](00-tres-sistemas.md).\n"},{"id":"00","num":"00","title":"Los 3 sistemas","eyebrow":"Lección 00 · El problema","file":"00-tres-sistemas.md","md":"# 00 · Los 3 sistemas\n\n> Objetivo: entender qué convive en modo-landing, por qué es un problema y cómo detectar cada sistema antes de migrar.\n\n## Harness\n\n- `styled-components-to-tailwind` — auto-invoke al editar archivos con imports de SC o Emotion.\n\n---\n\n## El estado de base (modo-landing, 2026-05-28 pre-PR #1509)\n\nmodo-landing tenía **tres runtimes de styling activos al mismo tiempo**:\n\n| Sistema | Versión | Import típico | Cantidad |\n|---------|---------|---------------|----------|\n| Tailwind CSS | 3.3.3 → 4.3.0 | `className=\"...\"` | ~60% del codebase |\n| Styled Components | 5.2.3 | `import styled from 'styled-components'` | ~25% |\n| Emotion | 11.11.x | `import { css } from '@emotion/react'` | ~15% |\n\nAdemás: algunos archivos con **CSS modules** (`*.module.css`) e inline `style={{}}` para overrides puntuales.\n\n---\n\n## Por qué consolidar\n\n### 1. Bundle doble (o triple)\n\nCada sistema CSS-in-JS ship su runtime al cliente. Styled Components pesa ~12 KB gzip, Emotion ~7 KB. Con Tailwind utility-only, el CSS se shakea en build y el runtime JS baja a cero.\n\n### 2. SSR frágil\n\n`src/pages/_document.js` tiene un `ServerStyleSheet` de Styled Components para SSR. Eso es:\n- Código de setup manual en `_document.js`.\n- Un gotcha silencioso si un componente nuevo usa SC sin entender el patrón.\n- Un **blocker duro** para migrar a App Router de Next 15 (incompatible con `ServerStyleSheet`).\n\n### 3. DX fragmentada\n\nDev nuevo ve tres formas de hacer lo mismo. Code review tiene que razonar tres contextos. El design system MODO (`tailwind.config.js`, 480 líneas de tokens) existe completo — pero SC y Emotion lo ignoran y hardcodean valores.\n\n### 4. Regla del equipo\n\n> Sin hex hardcodeados. Sin nuevas imports de SC o Emotion. Tokens del design system siempre.\n\nEsa regla es imposible de hacer cumplir con tres sistemas activos.\n\n---\n\n## Cómo detectar cada sistema\n\n### Grep rápido\n\n```bash\n# Styled Components\ngrep -rl \"from 'styled-components'\" src/\n\n# Emotion\ngrep -rl \"@emotion/react\\|@emotion/css\\|@emotion/styled\" src/\n\n# CSS modules\nfind src/ -name \"*.module.css\"\n\n# Tailwind (referencia, no hay que migrar esto)\ngrep -rl \"className=\" src/ | wc -l\n```\n\n### Por archivo: qué buscar\n\n**Styled Components**:\n```jsx\nimport styled from 'styled-components';\n// o\nimport { styled } from 'styled-components';\n\nconst Container = styled.div`\n  display: flex;\n  background-color: #1a1a2e;  /* ← hex hardcodeado */\n`;\n```\n\n**Emotion con `css` template literal**:\n```jsx\nimport { css } from '@emotion/react';\n\n<div css={css`\n  height: 100%;\n  border-radius: 18px;\n  @media screen and (min-width: 768px) {\n    border-radius: 8px;\n  }\n`} />\n```\n\n**Emotion con `cx`/`css` function**:\n```jsx\nimport { css, cx } from '@emotion/css';\n\nconst activeClass = css`color: green;`;\n<span className={cx(baseClass, isActive && activeClass)} />\n```\n\n**Tailwind puro** (destino):\n```jsx\n<div className=\"flex bg-[var(--brand-green-default)] rounded-lg md:rounded-md\" />\n```\n\n### Detectar SC en `_document.js`\n\n```bash\ngrep -n \"ServerStyleSheet\\|StyleSheetManager\" src/pages/_document.js\n```\n\nSi matchea, esa es la pieza que bloquea App Router. Se elimina recién cuando **todos** los SC del repo estén migrados.\n\n---\n\n## Priorizar qué migrar primero\n\nNo todo el repo se migra de una. El criterio:\n\n1. **Leaf components sin lógica compleja** — los más fáciles (adaptadores de UI, tarjetas, badges).\n2. **Componentes usados en rutas críticas** (home, /promos) — impactan bundle y SSR.\n3. **Componentes que van a tocar otros PRs** — mejor migrar antes de que generen conflictos.\n4. **`src/pages/_document.js` al final** — solo cuando el grep de SC devuelve 0 resultados.\n\n> Trap común: migrar `_document.js` primero y dejar componentes SC huérfanos que crashean el SSR.\n\n---\n\n## Checklist de salida\n\n- [ ] Sabés correr el grep para auditar qué sistema usa cada componente\n- [ ] Identificaste al menos 3 componentes SC y 1 Emotion en el repo\n- [ ] Entendés por qué `_document.js` se migra al final\n- [ ] Tenés claro que el destino es Tailwind-only con tokens del design system\n\n> Siguiente: [01 · Estrategia](01-estrategia.md)\n"},{"id":"01","num":"01","title":"Estrategia","eyebrow":"Lección 01 · Component-by-component","file":"01-estrategia.md","md":"# 01 · Estrategia\n\n> Objetivo: entender el orden de migración, cuándo se auto-invoca el skill y cómo no romperse en el camino.\n\n## Harness\n\n- `styled-components-to-tailwind` — se auto-invoca cuando editás un archivo que importa `styled-components` o `@emotion/*`.\n\n---\n\n## El principio fundamental: leaf-first\n\nMigrá de **afuera hacia adentro**. Los componentes hoja (sin hijos que usen SC) son los más seguros porque:\n- No tienen dependencias que fallen si el SSR cambia.\n- El diff es pequeño y revisable.\n- Si algo se rompe visualmente, el scope es acotado.\n\n```\n❌ Migrás el layout root primero → rompe todo el árbol\n✅ Migrás el componente de tarjeta leaf → scope acotado\n```\n\n### Orden recomendado\n\n1. **Atoms** (Badge, Tag, Icon wrapper, Pill) — sin lógica, sin hijos SC.\n2. **Cards y banners** (PromoCard, BannerHero, CardImagePromo) — lógica mínima, visible en tests.\n3. **Componentes con props dinámicos** (variantes de color, size) — requieren `classnames` o CVA.\n4. **Layouts y containers** — afectan muchas rutas, mejor al final.\n5. **`_document.js` ServerStyleSheet** — solo cuando el grep de SC da 0.\n\n---\n\n## Auto-invoke del skill\n\nEl skill `styled-components-to-tailwind` se auto-invoca cuando Claude detecta que estás editando un archivo con:\n\n```\nimport styled from 'styled-components'\nimport { css } from '@emotion/react'\nimport { css, cx } from '@emotion/css'\n```\n\n**Qué hace el skill cuando se invoca**:\n1. Identifica los styled-components o emotion blocks en el archivo.\n2. Mapea las CSS properties a tokens de `tailwind.config.js`.\n3. Sugiere el equivalente Tailwind antes de que escribas el código.\n4. Verifica que no queden imports unused post-migración.\n\nPodés invocarlo manualmente también:\n```\n/styled-components-to-tailwind\n```\n\n---\n\n## El workflow por componente\n\n```\n1. Grep: ¿qué sistema usa el archivo?\n2. Leé el styled-component o emotion block completo.\n3. Mapeá cada property a un token (lección 03) o utility Tailwind.\n4. Reemplazá el bloque CSS-in-JS por className=\"...\".\n5. Eliminá los imports unused (styled, css, theme).\n6. Verificación visual local.\n7. pnpm lint → pnpm build (no corras build en el curso, pero en PR sí).\n```\n\n---\n\n## Branches y PRs\n\nLa migración de modo-landing se organizó en **waves** bajo una rama de integración:\n\n```\nintegration/nextjs-12-to-16   ← rama base\n  └── feat/EXA-ssr-cms-body   ← PR #1509 (Waves 0-N de styling)\n        ├── Wave 0: Tailwind 3 → 4 (1 commit)\n        ├── Wave 1: 3 archivos Emotion migrados\n        ├── Wave 2: 39 SC migrados (Batches A1-A6 + B1-B3)\n        └── Wave 3+: pendientes\n```\n\n**Por qué waves y no un PR gigante**: cada wave tiene scope acotado, pasa SonarCloud, y es revisable. Un PR de 200 archivos de styling no pasa code review.\n\n---\n\n## Qué NO hacer\n\n```\n❌ import { styled } from '@emotion/styled'   ← reemplazo por otro CSS-in-JS\n❌ style={{ color: '#1a1a2e' }}               ← inline style con hex\n❌ crear styles.js nuevos                     ← aumenta la deuda\n❌ migrar _document.js antes que todos los SC ← rompe SSR\n❌ dejar imports unused post-migración        ← ESLint no-unused-vars falla\n```\n\n---\n\n## Señales de que la migración va bien\n\n- [ ] El grep de SC en el archivo da 0 después de migrar.\n- [ ] El `import styled` o `import { css }` desapareció del archivo.\n- [ ] No hay imports nuevos de SC ni Emotion.\n- [ ] `pnpm lint` pasa sin `no-unused-vars`.\n- [ ] La visual check local muestra el componente idéntico.\n\n---\n\n## Checklist de salida\n\n- [ ] Entendés el orden leaf-first y por qué\n- [ ] Sabés cuándo se auto-invoca el skill y qué hace\n- [ ] Tenés claro el workflow por componente (6 pasos)\n- [ ] Conocés los anti-patterns de la lista ❌\n\n> Siguiente: [02 · CSS-in-JS → utilities](02-css-in-js-a-utilities.md)\n"},{"id":"02","num":"02","title":"CSS-in-JS → utilities","eyebrow":"Lección 02 · Mapeo","file":"02-css-in-js-a-utilities.md","md":"# 02 · CSS-in-JS → utilities\n\n> Objetivo: mapear los patrones más comunes de Styled Components y Emotion a clases Tailwind. Con casos reales de modo-landing PR #1509.\n\n## Harness\n\n- `styled-components-to-tailwind` — sugiere el mapeo cuando editás imports de SC o Emotion.\n\n---\n\n## Patrón 1: `styled.div` básico → JSX + className\n\n**Antes (Styled Components)**:\n```jsx\nimport styled from 'styled-components';\n\nconst Card = styled.div`\n  display: flex;\n  flex-direction: column;\n  border-radius: 8px;\n  padding: 16px;\n  background-color: var(--greys-white);\n`;\n\n// uso\n<Card>...</Card>\n```\n\n**Después (Tailwind)**:\n```jsx\n// sin import de styled-components\n\n<div className=\"flex flex-col rounded-lg p-4 bg-[var(--greys-white)]\">\n  ...\n</div>\n```\n\n> Si `Card` se usa en muchos lugares, extraé un componente React con `className` prop en lugar de un styled-component.\n\n---\n\n## Patrón 2: props dinámicos → clases condicionales\n\n**Antes (Styled Components con props)**:\n```jsx\nconst Badge = styled.span`\n  background-color: ${({ variant }) =>\n    variant === 'success' ? 'var(--brand-green-default)' : 'var(--greys-grey-2)'};\n  color: ${({ variant }) =>\n    variant === 'success' ? 'var(--greys-white)' : 'var(--greys-black)'};\n  border-radius: 4px;\n  padding: 2px 8px;\n`;\n\n<Badge variant=\"success\">Activo</Badge>\n```\n\n**Después (Tailwind + classnames)**:\n```jsx\nimport classnames from 'classnames';\n\n// el paquete 'classnames' ya está instalado en modo-landing\n\nfunction Badge({ variant, children }) {\n  return (\n    <span\n      className={classnames(\n        'rounded px-2 py-0.5',\n        {\n          'bg-[var(--brand-green-default)] text-[var(--greys-white)]': variant === 'success',\n          'bg-[var(--greys-grey-2)] text-[var(--greys-black)]': variant !== 'success',\n        }\n      )}\n    >\n      {children}\n    </span>\n  );\n}\n```\n\n> Para variantes más complejas (3+), CVA es más legible — ver [lección 03](03-tokens-design-system.md).\n\n---\n\n## Patrón 3: Emotion `css` template literal con media queries\n\nCaso real de `CardImagePromo/index.jsx` (PR #1509 Wave 1):\n\n**Antes (Emotion)**:\n```jsx\nimport { css } from '@emotion/react';\nimport { theme } from '../../constants/theme';\n\n<LazyLoadImage\n  css={css`\n    height: 100%;\n    object-fit: cover;\n    max-width: 100%;\n    max-height: 130%;\n    border-radius: 18px;\n    @media screen and (min-width: ${theme.breakpoints.mobileMDmax}) {\n      max-height: 100%;\n      border-radius: 8px;\n    }\n  `}\n  src={src}\n/>\n```\n\n**Después (Tailwind)**:\n```jsx\n// sin import de @emotion/react\n// sin import de theme (si solo se usaba para breakpoints en css``)\n\n<LazyLoadImage\n  className=\"h-full object-cover max-w-full max-h-[130%] rounded-[18px] md:max-h-full md:rounded-lg\"\n  src={src}\n/>\n```\n\n**Steps replicables**:\n1. Eliminar `import { css } from '@emotion/react'`.\n2. Eliminar `import { theme }` si solo se usaba en `css```.\n3. Reemplazar `css={css`...`}` con `className=\"...\"`.\n4. Mapear `@media screen and (min-width: <breakpoint>)` → prefijo responsive (`sm:`, `md:`, `lg:`).\n5. Valores sin token → `[value]` arbitrary syntax.\n\n> Trap: `LazyLoadImage` acepta `className` directo, no necesita `wrapperClassName` para utility-only styling.\n\n---\n\n## Patrón 4: `styled.div` con estado hover/focus\n\n**Antes**:\n```jsx\nconst Button = styled.button`\n  background-color: var(--brand-green-default);\n  color: var(--greys-white);\n  &:hover {\n    background-color: var(--brand-green-dark);\n  }\n  &:focus {\n    outline: 2px solid var(--brand-green-default);\n    outline-offset: 2px;\n  }\n`;\n```\n\n**Después**:\n```jsx\n<button\n  className=\"bg-[var(--brand-green-default)] text-[var(--greys-white)] hover:bg-[var(--brand-green-dark)] focus-visible:outline-2 focus-visible:outline-[var(--brand-green-default)] focus-visible:outline-offset-2\"\n>\n  ...\n</button>\n```\n\n---\n\n## Patrón 5: `css` con múltiples media queries anidadas\n\n**Antes**:\n```jsx\nconst Hero = styled.section`\n  padding: 24px 16px;\n  @media (min-width: 768px) {\n    padding: 48px 32px;\n  }\n  @media (min-width: 1280px) {\n    padding: 64px 48px;\n  }\n`;\n```\n\n**Después**:\n```jsx\n<section className=\"px-4 py-6 md:px-8 md:py-12 xl:px-12 xl:py-16\">\n  ...\n</section>\n```\n\n> Breakpoints de Tailwind en modo-landing: `sm` (640), `md` (768), `lg` (1024), `xl` (1280), `xxl` (1536). Ver `tailwind.config.js` para los custom: `small`, `regular`, `medium`, `large`.\n\n---\n\n## Patrón 6: Emotion `cx` para composición de clases\n\n**Antes**:\n```jsx\nimport { css, cx } from '@emotion/css';\n\nconst base = css`font-size: 14px; color: var(--greys-black);`;\nconst active = css`color: var(--brand-green-default); font-weight: bold;`;\n\n<span className={cx(base, isActive && active)}>...</span>\n```\n\n**Después**:\n```jsx\nimport classnames from 'classnames';\n\n<span\n  className={classnames(\n    'text-sm text-[var(--greys-black)]',\n    isActive && 'text-[var(--brand-green-default)] font-bold'\n  )}\n>\n  ...\n</span>\n```\n\n---\n\n## Qué hacer con valores sin token exacto\n\nCuando no hay token Tailwind exacto, usá `[value]` arbitrary syntax con la CSS variable del SDK:\n\n```jsx\n// ✅ Con CSS variable del SDK\nclassName=\"text-[var(--font-size-body-medium)]\"\nclassName=\"rounded-[var(--border-radius-m)]\"\n\n// ✅ Con valor semántico si no existe token\nclassName=\"rounded-[18px]\"    // valor específico del diseño\n\n// ❌ Hex hardcodeado\nclassName=\"text-[#1a1a2e]\"    // prohibido — usar var() siempre\n```\n\n---\n\n## Checklist de salida\n\n- [ ] Sabés convertir un `styled.div` básico a JSX + className\n- [ ] Manejás props dinámicos con `classnames`\n- [ ] Convertís Emotion media queries a responsive prefixes Tailwind\n- [ ] Sabés usar `[value]` arbitrary con CSS variables, no con hex\n- [ ] Post-migración: verificás que no queden imports unused\n\n> Siguiente: [03 · Tokens + design system](03-tokens-design-system.md)\n"},{"id":"03","num":"03","title":"Tokens + design system","eyebrow":"Lección 03 · Sin hex","file":"03-tokens-design-system.md","md":"# 03 · Tokens + design system\n\n> Objetivo: usar los tokens del design system MODO en lugar de valores hardcodeados. Entender la paleta SDK, la tipografía y los espaciados disponibles en `tailwind.config.js`.\n\n## Harness\n\n- `tailwind-design-system` — patrones de design system con Tailwind, CVA, tokens.\n\n---\n\n## La regla que no se negocia\n\n> **Sin hex hardcodeados. Sin valores arbitrarios de px que ya tienen token. Tokens del design system siempre.**\n\nSi llegás a escribir `text-[#1a1a2e]` o `bg-[#00c46a]`, es una señal de que hay un token que no encontraste. Antes de usar un valor hardcodeado, buscá en `tailwind.config.js`.\n\n---\n\n## Dónde están los tokens\n\nEl fuente de verdad es `tailwind.config.js` en la raíz de modo-landing (~480 líneas). Los tokens viven en dos capas:\n\n1. **CSS variables del SDK** — definidas en `:root` por el paquete `@playsistemico/modo-ui-lib-web`. Se consumen como `var(--nombre)`.\n2. **Extensiones Tailwind** — mapeadas en `tailwind.config.js` para poder usarlas como clases directas.\n\n---\n\n## Paleta de colores SDK MODO\n\nUsá estas CSS variables, no los hex que las definen internamente:\n\n```\nvar(--greys-white)           ← blanco base\nvar(--greys-black)           ← negro base\nvar(--greys-grey-1)          ← gris muy claro\nvar(--greys-grey-2)          ← gris claro\nvar(--greys-grey-3)          ← gris medio\nvar(--greys-grey-4)          ← gris oscuro\nvar(--greys-grey-5)          ← gris muy oscuro\n\nvar(--brand-green-default)   ← verde MODO principal\nvar(--brand-green-dark)      ← verde oscuro (hover)\nvar(--brand-green-light)     ← verde claro (fondo suave)\n\nvar(--brand-blue-default)    ← azul MODO\nvar(--brand-blue-dark)       ← azul hover\nvar(--brand-blue-light)      ← azul fondo suave\n\nvar(--error-default)         ← rojo error\nvar(--warning-default)       ← amarillo warning\nvar(--success-default)       ← verde success\n```\n\nEn Tailwind, se usan con `[var(...)]` arbitrary o como clase si están mapeadas en config:\n\n```jsx\n// Con arbitrary syntax (funciona siempre):\nclassName=\"bg-[var(--brand-green-default)]\"\nclassName=\"text-[var(--greys-black)]\"\n\n// Como clase directa (si tailwind.config.js la tiene mapeada):\nclassName=\"bg-brand-green\"\nclassName=\"text-greys-black\"\n```\n\n> Antes de usar arbitrary, verificá si está en `tailwind.config.js` como extend.colors. Un `grep 'brand-green' tailwind.config.js` te dice si tiene nombre de clase directo.\n\n---\n\n## Tipografía\n\nmodo-landing define 40+ estilos tipográficos en `tailwind.config.js`. Los más usados:\n\n```\ntext-h1-bold       ← heading grande\ntext-h2-bold\ntext-h3-bold\ntext-h4-bold\ntext-body-regular  ← cuerpo de texto\ntext-body-medium\ntext-body-bold\ntext-caption       ← texto pequeño\ntext-overline-s    ← etiquetas\n\n/* versiones mobile/web */\ntext-p1-mobile     text-p1-web\ntext-p2-mobile     text-p2-web\ntext-p3-mobile     text-p3-web\n```\n\nFuentes disponibles: `font-red-hat` (Red Hat Display, default MODO), `font-quicksand` (Rewards).\n\n---\n\n## Espaciado\n\nLos tokens de spacing están como CSS variables del SDK:\n\n```\nvar(--spacing-xxs)   /* muy pequeño */\nvar(--spacing-xs)\nvar(--spacing-sm)\nvar(--spacing-md)\nvar(--spacing-lg)\nvar(--spacing-xl)\nvar(--spacing-xxl)\n```\n\nCuando el valor coincide con la escala default de Tailwind (`p-2`, `p-4`, `gap-6`, etc.), usá la clase estándar. Los custom vars son para valores fuera de esa escala.\n\n---\n\n## Border radius\n\n```\nrounded-s    ← var(--border-radius-s)\nrounded-m    ← var(--border-radius-m)\nrounded-l    ← var(--border-radius-l)\nrounded-xl   ← var(--border-radius-xl)\n```\n\n> Si el diseño pide `border-radius: 18px` y no hay token exacto, usá `rounded-[18px]`. Si aparece en más de 3 componentes, proponé agregar el token al config.\n\n---\n\n## Props dinámicos con variantes: usar CVA\n\nPara componentes con 3+ variantes de apariencia, `class-variance-authority` (CVA) es más legible que ternarios anidados:\n\n```tsx\nimport { cva, type VariantProps } from 'class-variance-authority';\nimport classnames from 'classnames';\n\nconst badgeVariants = cva(\n  // base styles\n  'inline-flex items-center rounded px-2 py-0.5 text-caption font-medium',\n  {\n    variants: {\n      intent: {\n        success: 'bg-[var(--brand-green-light)] text-[var(--brand-green-dark)]',\n        warning: 'bg-[var(--warning-default)] text-[var(--greys-black)]',\n        error:   'bg-[var(--error-default)] text-[var(--greys-white)]',\n        neutral: 'bg-[var(--greys-grey-1)] text-[var(--greys-grey-5)]',\n      },\n    },\n    defaultVariants: {\n      intent: 'neutral',\n    },\n  }\n);\n\ntype BadgeProps = VariantProps<typeof badgeVariants> & {\n  children: React.ReactNode;\n  className?: string;\n};\n\nexport function Badge({ intent, children, className }: BadgeProps) {\n  return (\n    <span className={classnames(badgeVariants({ intent }), className)}>\n      {children}\n    </span>\n  );\n}\n```\n\n> CVA no está instalado por default en modo-landing. Si el componente tiene 2 variantes o menos, `classnames` es suficiente y no agrega dependencia.\n\n---\n\n## Anti-patterns\n\n```jsx\n// ❌ Hex hardcodeado\nclassName=\"bg-[#00c46a]\"\n\n// ❌ Valor px que tiene token equivalente\nclassName=\"rounded-[8px]\"    // si tailwind.config.js tiene rounded-m = 8px\n\n// ❌ Inline style con valor fijo\nstyle={{ color: '#1a1a2e' }}\n\n// ✅ CSS variable del SDK\nclassName=\"bg-[var(--brand-green-default)]\"\n\n// ✅ Token de config como clase directa\nclassName=\"rounded-m\"\n\n// ✅ Arbitrary solo cuando no hay token\nclassName=\"rounded-[18px]\"    // valor específico del diseño, sin token equivalente\n```\n\n---\n\n## Checklist de salida\n\n- [ ] Sabés dónde buscar tokens en `tailwind.config.js`\n- [ ] Usás CSS variables del SDK para colores (`var(--brand-green-default)`)\n- [ ] Usás tokens de tipografía (`text-h2-bold`, `text-body-regular`)\n- [ ] Sabés cuándo usar CVA vs classnames\n- [ ] Cero hex hardcodeados en el componente migrado\n\n> Siguiente: [04 · Tailwind 3 → 4](04-tailwind-3-a-4.md)\n"},{"id":"04","num":"04","title":"Tailwind 3 → 4","eyebrow":"Lección 04 · Migración mayor","file":"04-tailwind-3-a-4.md","md":"# 04 · Tailwind 3 → 4\n\n> Objetivo: migrar Tailwind 3.x a v4 sin reescribir los 480 líneas de config. Gotchas verificados en modo-landing PR #1509 Wave 0.\n\n## Harness\n\n- `tailwind-3-to-4-migration` — invocar post-consolidación de CSS-in-JS.\n\n---\n\n## Cuándo hacer esta migración\n\nTailwind 3 → 4 es **Wave 0**: se hace una vez, antes de migrar los componentes CSS-in-JS. Así las waves siguientes ya corren sobre base v4.\n\n> En modo-landing: Wave 0 del PR #1509 migró TW 3.4.17 → 4.3.0 en 1 commit. Sin reescribir el config. Build verde. Waves 1-N de SC/Emotion encima de esa base.\n\n---\n\n## Los cambios grandes en Tailwind v4\n\n| Aspecto | v3 | v4 |\n|---------|----|----|\n| Config | `tailwind.config.js` | CSS `@theme` block (opcional con `@config`) |\n| Content paths | `content: [...]` en JS | `@source` en CSS |\n| PostCSS plugin | `tailwindcss` | `@tailwindcss/postcss` |\n| JIT mode | `mode: 'jit'` explicit | default, no declarar |\n| CSS base import | `@tailwind base/components/utilities` | `@import 'tailwindcss'` |\n\n---\n\n## Estrategia recomendada: `@config` backward-compat\n\nPara un `tailwind.config.js` grande (400+ líneas, miles de tokens custom), reescribir todo a `@theme` block en un commit es riesgoso. v4 acepta config legacy v3-style vía `@config` directive:\n\n```css\n/* src/styles/globals.css */\n@import 'tailwindcss';\n@config '../../tailwind.config.js';\n\n/* resto de :root vars, custom utilities, etc. */\n```\n\n> Trap: la path del `@config` es **relativa al archivo CSS**, no a la raíz del proyecto. Si el CSS está en `src/styles/`, el path al config en la raíz es `'../../tailwind.config.js'`.\n\nEsto permite:\n- Shippear v4 con el config legacy intacto.\n- Waves posteriores que migran token-by-token al `@theme` block.\n- Las CSS variables del SDK (`var(--greys-white)`) siguen funcionando sin cambios.\n\n---\n\n## Instalación\n\n```bash\npnpm add -D tailwindcss@4 @tailwindcss/postcss\n```\n\nActualizar `postcss.config.js`:\n\n```js\n// v3\nmodule.exports = {\n  plugins: { tailwindcss: {}, autoprefixer: {} }\n}\n\n// v4\nmodule.exports = {\n  plugins: { '@tailwindcss/postcss': {}, autoprefixer: {} }\n}\n```\n\n---\n\n## Gotcha 1: `@apply` con clase custom falla en v4\n\nv3 permitía aplicar clases custom definidas en el config dentro de `@apply`:\n\n```css\n/* ❌ rompe en v4 */\n.buttonPrimary {\n  @apply px-4 py-2 bodyRegular font-bold;\n  /* 'bodyRegular' es clase custom del config — v4 no la resuelve en @apply */\n}\n```\n\nFix: inline las utilities que componen `bodyRegular`:\n\n```css\n/* ✅ v4 */\n.buttonPrimary {\n  @apply px-4 py-2 font-normal text-p3-mobile md:text-p3-web font-bold;\n}\n```\n\n---\n\n## Gotcha 2: `plugins` legacy object literal revienta v4\n\nSi el config tiene plugins como object (legacy v2, ignorado silenciosamente por v3):\n\n```js\n// ❌ rompe en v4 con: \"CssSyntaxError: w is not a function\"\nplugins: [{ '@tailwindcss/jit': {}, autoprefixer: {} }]\n\n// ✅ v4\nplugins: []\n```\n\n---\n\n## Gotcha 3: import de `tailwindcss/tailwind.css` en `_app.js`\n\nSi existe este import en `_app.js` o `_app.tsx`:\n\n```js\n// ❌ no existe en v4 — \"Module not found\"\nimport 'tailwindcss/tailwind.css';\n```\n\nRemovelo. El CSS base se importa desde `globals.css` con `@import 'tailwindcss'`.\n\n---\n\n## Gotcha 4: Safe-chain bloquea `enhanced-resolve` reciente\n\n> Este es el gotcha más silencioso. Safe-chain bloquea paquetes publicados en las últimas 168h.\n\n`@tailwindcss/node@4.3.0` depende de `enhanced-resolve` que se actualiza frecuentemente. Si el repo tiene Safe-chain check activo, la instalación falla o instala una versión inestable.\n\n**Fix**: pin a una versión conocida (>7 días de vida) en `package.json`:\n\n```json\n{\n  \"pnpm\": {\n    \"overrides\": {\n      \"enhanced-resolve\": \"5.21.6\"\n    }\n  }\n}\n```\n\n> Verificá que `5.21.6` siga siendo la recomendada. Si cambia la versión de `@tailwindcss/node`, revisá cuál `enhanced-resolve` pide y pinneá a la siguiente stable >7d.\n\n---\n\n## Verificación post-migración (sin correr build en el curso)\n\nEn un PR real:\n\n```bash\npnpm build              # debe terminar sin errores\npnpm lint               # sin regresiones de ESLint\ngrep -r \"tailwindcss/tailwind.css\" src/   # debe dar 0 resultados\ngrep -rn \"@apply.*bodyRegular\\|@apply.*h1-bold\" src/styles/   # custom classes en @apply\n```\n\n---\n\n## Flujo completo verificado (caso modo-landing)\n\n```\n1. pnpm add -D tailwindcss@4 @tailwindcss/postcss\n2. Agregar override enhanced-resolve en package.json\n3. Actualizar postcss.config.js (plugin name)\n4. Actualizar globals.css:\n   - @import 'tailwindcss'  (reemplaza @tailwind base/components/utilities)\n   - @config '../../tailwind.config.js'\n5. Limpiar _app.js de import 'tailwindcss/tailwind.css' si existe\n6. Arreglar @apply con custom classes\n7. Arreglar plugins: [{...}] → plugins: []\n8. pnpm build verde ✓\n```\n\n---\n\n## Checklist de salida\n\n- [ ] Instalaste `tailwindcss@4` y `@tailwindcss/postcss`\n- [ ] Actualizaste `postcss.config.js` con el nombre nuevo del plugin\n- [ ] Usás `@config` directive para mantener el config legacy sin reescribir\n- [ ] Pintaste el override de `enhanced-resolve` si el repo tiene Safe-chain\n- [ ] Verificaste que `@apply` no use custom classes (o las inlineaste)\n- [ ] Limpiaste `plugins: [{...}]` → `plugins: []`\n\n> Siguiente: [05 · Verify](05-verify.md)\n"},{"id":"05","num":"05","title":"Verify","eyebrow":"Lección 05 · Visual regression","file":"05-verify.md","md":"# 05 · Verify\n\n> Objetivo: verificar que la migración no rompió nada visualmente ni en build. Sin snapshots.\n\n## Harness\n\n- `guardia` — gates paralelos: bundle, visual regression, a11y, SonarCloud.\n- Playwright — screenshots comparativos desktop + mobile.\n\n---\n\n## La regla: sin snapshots\n\n> El equipo quiere eliminar los Jest snapshots. No los uses para verificar migraciones de styling. Usá RTL semántico o Playwright.\n\nLos snapshots de styled-components se rompen con cada rerender de className generado dinámicamente — son falsos positivos o negativos constantes. Playwright ve el resultado visual real.\n\n---\n\n## Nivel 1: verificación local rápida\n\nAntes de commitear, checklist mínimo:\n\n```bash\npnpm lint            # ESLint: sin no-unused-vars, sin reglas SC/Emotion\npnpm test            # RTL tests: los existentes deben seguir verdes\n\n# Grep de seguridad: que no queden imports\ngrep -n \"from 'styled-components'\\|from '@emotion\" src/components/TuComponente/index.jsx\n# debe dar 0 resultados\n```\n\nVisual check local: `pnpm dev` → abrí el componente migrado → comparar con el diseño o screenshot pre-migración.\n\n---\n\n## Nivel 2: Playwright visual regression\n\nPara componentes críticos (hero, cards de promos, banners), capturá screenshots antes y después de la migración:\n\n```typescript\n// tests/visual/card-image-promo.spec.ts\nimport { test, expect } from '@playwright/test';\n\ntest('CardImagePromo visual regression', async ({ page }) => {\n  await page.goto('/promos');\n  \n  // Screenshot del componente específico\n  const card = page.locator('[data-testid=\"card-image-promo\"]').first();\n  await expect(card).toBeVisible();\n  await expect(card).toHaveScreenshot('card-image-promo.png', {\n    threshold: 0.02,  // 2% de diferencia aceptable\n  });\n});\n\ntest('CardImagePromo mobile', async ({ page }) => {\n  await page.setViewportSize({ width: 375, height: 812 });\n  await page.goto('/promos');\n  \n  const card = page.locator('[data-testid=\"card-image-promo\"]').first();\n  await expect(card).toHaveScreenshot('card-image-promo-mobile.png', {\n    threshold: 0.02,\n  });\n});\n```\n\nCorrer y actualizar baseline si la migración es intencional:\n\n```bash\nnpx playwright test tests/visual/\n# Primera vez: genera los screenshots baseline\nnpx playwright test tests/visual/ --update-snapshots\n# Tras migración: compara contra baseline\n```\n\n> Los screenshots de Playwright SÍ se usan como baseline visual. Los que están prohibidos son los **Jest snapshots de componentes React**.\n\n---\n\n## Nivel 3: gates con `/guardia`\n\nPara PRs, `/guardia` corre en paralelo:\n\n```\n/guardia\n```\n\nGates que aplican post-migración de styling:\n\n| Gate | Qué verifica |\n|------|-------------|\n| **Bundle** | Que el bundle no creció (SC/Emotion removidos reducen JS) |\n| **SonarCloud** | 0 new smells, 0 hotspots, ≤3% duplicación |\n| **Visual** | Screenshots desktop 1280x800 + mobile 375x812 |\n| **a11y** | Que el refactor no rompió atributos aria o roles |\n| **ESLint** | Sin imports unused, sin reglas violadas |\n\n---\n\n## Qué mirar en bundle size\n\nPost-migración de Styled Components o Emotion, el bundle JS debe bajar. Verificación:\n\n```bash\n# Antes de migrar (guardar el número)\npnpm build 2>&1 | grep \"First Load JS\"\n\n# Después de migrar\npnpm build 2>&1 | grep \"First Load JS\"\n```\n\nStyled Components pesa ~12 KB gzip, Emotion ~7 KB. Si el bundle **creció** tras eliminar imports, hay algo mal (otro archivo los reintrodujo, o quedó un `import styled` olvidado).\n\n```bash\n# Verificar que no queden imports en todo el repo\ngrep -rl \"from 'styled-components'\" src/\ngrep -rl \"@emotion/react\\|@emotion/css\" src/\n```\n\n---\n\n## Qué NO verificar\n\n- **Snapshots Jest** — prohibidos. Si el repo tiene `toMatchSnapshot`, no actualizarlos tras styling migration: refactorizarlos a RTL semántico.\n- **Visual perfection pixel-perfect** — un 2% de threshold en Playwright es suficiente. Las fuentes tienen anti-aliasing diferente por OS.\n- **CSS output manual** — no leas el CSS compilado línea a línea. Playwright y el build son el oráculo.\n\n---\n\n## Señales de que algo está roto\n\n- Bundle JS **creció** → hay un import SC/Emotion que no se removió.\n- Playwright screenshot diff >5% → cambio visual real, revisar.\n- `pnpm lint` falla con `no-unused-vars` → import de `styled` o `css` olvidado.\n- `pnpm build` falla con `Cannot apply unknown utility class` → gotcha de `@apply` custom class (lección 04).\n- Componente se ve sin estilos → falta `globals.css` siendo importado, o el className no llegó al DOM.\n\n---\n\n## Checklist de salida\n\n- [ ] `pnpm lint` pasa sin warnings nuevos\n- [ ] `pnpm test` verde (RTL tests existentes)\n- [ ] Grep de SC y Emotion da 0 en los archivos migrados\n- [ ] Visual check local: componente idéntico al pre-migración\n- [ ] (para PRs) Playwright screenshots del componente principal\n- [ ] (para PRs) `/guardia` gates verdes\n\n> Siguiente: [Lab integrador](exercises/README.md)\n"},{"id":"lab","num":"🧪","title":"Lab: migrar un componente","eyebrow":"Lab integrador","file":"","md":"# 🧪 Lab · Migrar un componente de Styled Components a Tailwind\n\n> Objetivo integrador: tomás un componente real del repo, lo migrás end-to-end usando los patrones de las lecciones 00-05 y dejás el PR listo para review.\n\n---\n\n## El componente a migrar\n\nElegí **uno** de estos candidatos (todos son leaf components con SC o Emotion):\n\n| Componente | Archivo | Sistema | Dificultad |\n|------------|---------|---------|------------|\n| `CardImagePromo` | `src/components/PromoCardsBySlot/CardImagePromo/index.jsx` | Emotion | ⭐ |\n| `BannerPromo` | `src/components/BannerPromo/index.jsx` (si existe SC) | SC | ⭐⭐ |\n| `Pill` / `Tag` | `src/components/Pill/index.jsx` | SC | ⭐ |\n| Cualquier `Badge` | `src/components/*/Badge/*.jsx` | SC/Emotion | ⭐ |\n\nSi encontrás uno más simple con un grep rápido (`grep -rl \"from 'styled-components'\" src/components/`), usá ese.\n\n---\n\n## Paso a paso\n\n### Paso 1: Diagnóstico (lección 00)\n\n```bash\n# Desde la raíz de modo-landing:\ngrep -n \"from 'styled-components'\\|from '@emotion\" src/components/TuComponente/index.jsx\n```\n\nAnotá:\n- ¿Qué sistema usa?\n- ¿Cuántos styled-components o emotion blocks tiene?\n- ¿Tiene props dinámicos (el styled recibe props que cambian el CSS)?\n\n### Paso 2: Activar el skill\n\nAbrí el archivo en Claude Code. El skill `styled-components-to-tailwind` se auto-invoca. Si no se invoca, ejecutá manualmente:\n\n```\n/styled-components-to-tailwind\n```\n\n### Paso 3: Mapear tokens (lección 03)\n\nPara cada color, spacing o typography que encontrés en el styled-component:\n\n1. Buscá el equivalente en `tailwind.config.js`:\n   ```bash\n   grep -n \"brand-green\\|greys-white\\|spacing\" tailwind.config.js | head -20\n   ```\n2. Si es un color → usá `var(--nombre-del-token)`.\n3. Si es tipografía → buscá la clase como `text-h2-bold` o `text-body-regular`.\n\n**No uses hex. No uses valores px si hay token equivalente.**\n\n### Paso 4: Migrar (lección 02)\n\nReemplazá el bloque styled/emotion por JSX + `className=\"...\"`. Guía rápida:\n\n```\nstyled.div`...`              → <div className=\"...\">\ncss={css`...`}               → className=\"...\"\n@media (min-width: 768px)    → md: prefix\n${({ prop }) => value}       → classnames({ 'clase': prop === 'valor' })\n```\n\n### Paso 5: Limpiar imports\n\n```bash\n# verificá que no queden imports de SC/Emotion en el archivo\ngrep -n \"from 'styled-components'\\|from '@emotion\" src/components/TuComponente/index.jsx\n# debe dar 0\n```\n\n### Paso 6: Tests\n\nEl componente probablemente ya tiene tests. Corrélos:\n\n```bash\nnpx jest src/components/TuComponente --watch\n```\n\nSi alguno usaba `toMatchSnapshot` y falla, refactorizalo a RTL semántico:\n\n```tsx\n// ❌ snapshot (prohibido)\nexpect(container).toMatchSnapshot();\n\n// ✅ RTL semántico\nexpect(screen.getByRole('img', { name: /promoción/i })).toBeInTheDocument();\nexpect(screen.getByText('Black Friday')).toBeVisible();\n```\n\n### Paso 7: Verificación local\n\n```bash\npnpm lint\npnpm test\npnpm dev  # visual check en el browser\n```\n\n---\n\n## Checklist del lab\n\n- [ ] Componente elegido: `____________________`\n- [ ] Sistema identificado (SC / Emotion / mixto): `____`\n- [ ] Skill auto-invocado o invocado manualmente\n- [ ] Todos los colores usan `var(--token)`, cero hex\n- [ ] Todos los spacings usan tokens o escala Tailwind estándar\n- [ ] Imports de SC/Emotion eliminados del archivo\n- [ ] `pnpm lint` verde\n- [ ] `pnpm test` verde (sin snapshots nuevos)\n- [ ] Visual check local: idéntico al pre-migración\n- [ ] Grep de SC da 0 en el archivo migrado\n\n---\n\n## Commit y PR\n\nCuando todo está verde:\n\n```bash\ngit add src/components/TuComponente/\ngit commit -m \"refactor(COENXT-XXX): migrar TuComponente de SC a Tailwind\"\n```\n\nTítulo del PR: `refactor(COENXT-XXX): migrar <Componente> de styled-components a Tailwind`\n\nDescripción mínima:\n```\n🎯 ¿Qué dolor soluciona?\nConsolidación del styling a Tailwind-only. Elimina runtime SC del bundle.\n\n🛠️ ¿Qué tuvimos que hacer?\n- Reemplazar X styled-components por className con tokens del design system.\n- Eliminar imports de styled-components del archivo.\n\n🎁 ¿Para qué?\nBundle JS más chico. Sin runtime CSS-in-JS. Un paso más hacia el bloqueo de _document.js.\n```\n\n---\n\n## Recursos\n\n- [Lección 00 · Los 3 sistemas](../00-tres-sistemas.md)\n- [Lección 01 · Estrategia](../01-estrategia.md)\n- [Lección 02 · CSS-in-JS → utilities](../02-css-in-js-a-utilities.md)\n- [Lección 03 · Tokens + design system](../03-tokens-design-system.md)\n- [Lección 04 · Tailwind 3 → 4](../04-tailwind-3-a-4.md)\n- [Lección 05 · Verify](../05-verify.md)\n"}];</script>
