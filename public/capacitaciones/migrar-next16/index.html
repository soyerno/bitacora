  <script>window.LESSONS = [{"id":"intro","num":"·","title":"Introducción","eyebrow":"Capacitación interactiva","file":"","md":"# Capacitación · Migrar un frontend a Next.js 16 (Pages Router)\n\n> **Harness = agentes.** Curso activo: abrís Claude Code, seguís cada lección, los gates te dicen si está bien. No es un manual para leer y guardar.\n>\n> Autor: Hernán De Souza · Sr AI Engineer · MODO\n\n---\n\n## Para quién\n\nDev frontend que llega con un proyecto existente —Vite SPA, Next 12/13, u otro— y necesita llevarlo a **Next.js 16 server-rendered** (Pages Router, `next start`) listo para la infra MODO en EKS.\n\nCasos reales que guían el contenido:\n\n- **modo-landing** — Next 12 → 16, stacked sub-PRs, 175 suites verdes.\n- **aprendeatumodo** — Vite 5 → Next 16, basePath, Storyblok runtime.\n- **erno-modo** — static HTML monolítico → Next 16 App Router.\n\n## Qué vas a saber hacer al terminar\n\n1. Diagnosticar de dónde partís (Vite / Next viejo / otro) y elegir la estrategia correcta.\n2. Armar un integration branch con sub-PRs apilados sin romper CI.\n3. Navegar los breaking changes de cada step (12→13, 13→14, 14→15, 15→16).\n4. Manejar `next/image` moderno, runtime env (`NEXT_PUBLIC_*`), basePath y rewrites.\n5. Verificar el contrato: `pnpm build` verde + smoke `curl :3000/<basePath> = 200`.\n6. Disparar un deploy alpha a playsistemico.\n\n## Learning path\n\n| # | Lección | Qué cubre |\n|---|---------|-----------|\n| 00 | [Assessment](00-assessment.md) | Qué tenés hoy · Decidir target · Un solo lockfile |\n| 01 | [Estrategia](01-estrategia.md) | Integration branch · Pages Router coexistence · EKS · basePath · runtime env |\n| 02 | [Breaking changes](02-breaking-changes.md) | Step 12→13, 13→14, 14→15, 15→16 · image · link · Turbopack |\n| 03 | [Routing + data](03-routing-data.md) | getServerSideProps · getStaticProps · ISR · catch-all · rewrites |\n| 04 | [Build + test + smoke](04-build-test-smoke.md) | pnpm build verde · contrato curl · Jest mocks · policy no-snapshots |\n| 05 | [Deploy](05-deploy.md) | ci-alpha · link al curso deploy-playsistemico |\n| 🧪 | [Lab integrador](exercises/README.md) | Migrar una page de ejemplo end-to-end |\n\n> Empezá por [00 · Assessment](00-assessment.md).\n"},{"id":"00","num":"00","title":"Assessment","eyebrow":"Lección 00 · Qué tenés y a dónde vas","file":"00-assessment.md","md":"# 00 · Assessment — ¿qué tenés y a dónde vas?\n\n> Objetivo: antes de tocar una línea, saber exactamente de dónde partís y confirmar que el target es **server-rendered** con `next start`.\n\n---\n\n## 1. Diagnosticar el punto de partida\n\nRespondé estas preguntas primero:\n\n### ¿Cuál es tu stack actual?\n\n| Caso | Señales |\n|------|---------|\n| **Vite SPA** | `vite.config.ts` presente, `react-router`, sin `pages/` ni `app/`, `index.html` en raíz |\n| **Next 12** | `package.json` con `\"next\": \"12.x\"`, `src/pages/`, `_app.js`, `_document.js` |\n| **Next 13/14** | `\"next\": \"13.x\"` o `\"14.x\"`, puede tener `src/app/` |\n| **Next 15** | `\"next\": \"15.x\"`, Turbopack en dev |\n| **Static HTML** | Sin bundler, `index.html` por página, `nav-counts.js` etc. |\n\n```bash\n# Comando rápido de diagnóstico\ncat package.json | grep -E '\"next\"|\"vite\"|\"react-router\"'\nls -1 src/ 2>/dev/null || ls -1 .\n```\n\n### ¿Hay un `output: 'export'` o similar?\n\n```bash\ngrep -r \"output\" next.config* 2>/dev/null\ngrep -r \"ssr.*false\" next.config* 2>/dev/null\n```\n\n> **Trap**: si alguien configuró `output: 'export'` pensando en static hosting, hay que removerlo. La infra MODO necesita `next start` (Node server), no export estático. Un build con `output: 'export'` no soporta `getServerSideProps` ni ISR.\n\n---\n\n## 2. Confirmar el target: server-rendered, no export\n\nEl target de este curso es:\n\n- `next start` en `:3000`.\n- Output a `./dist/` (o el `distDir` configurado).\n- **Sin** `output: 'export'` ni `output: 'standalone'`.\n- Probes de k8s/Istio apuntan a `/<basePath>`, no a `/`.\n\nSi tu caso es Vite SPA → App Router, este curso cubre la estrategia pero el skill `vite-to-nextjs-app-router` tiene el workflow detallado para App Router.\n\n---\n\n## 3. Resolver el package manager: un solo lockfile\n\n> **Trap crítica**: dos lockfiles en el mismo repo (`package-lock.json` + `pnpm-lock.yaml`) causan inconsistencias silenciosas. El pre-push hook de safe-chain y los CI workflows usan el lockfile de pnpm — si hay otro, se ignora y los deps pueden diferir entre entornos.\n\n```bash\n# Inventariar lockfiles\ngit ls-files | grep -E \"(package-lock|yarn\\.lock|bun\\.lock|pnpm-lock)\"\n```\n\n**Regla**: quedate con `pnpm-lock.yaml`. Borrá los otros del repo.\n\n```bash\ngit rm package-lock.json yarn.lock bun.lockb 2>/dev/null\ngit commit -m \"chore(COENXT-XXX): rm lockfiles no-pnpm\"\n```\n\n---\n\n## 4. Campo `packageManager` en package.json\n\nNext.js 16 + corepack esperan que `package.json` declare el manager:\n\n```json\n{\n  \"packageManager\": \"pnpm@9.x.x\"\n}\n```\n\nChequear la versión usada en modo-landing como referencia:\n```bash\ncat /ruta/a/modo-landing/package.json | grep packageManager\n```\n\nSi falta el campo, corepack puede elegir una versión incompatible en CI.\n\n---\n\n## 5. Checklist de salida antes de seguir\n\n- [ ] Stack actual identificado (Vite / Next 12 / Next 13+ / HTML)\n- [ ] Confirmado target: `next start`, sin `output: 'export'`\n- [ ] Un solo lockfile (`pnpm-lock.yaml`)\n- [ ] Campo `packageManager` declarado en `package.json`\n- [ ] Node ≥20.9 en `.nvmrc` (requerimiento Next 16)\n\n```bash\nnode -v  # debe ser ≥20.9\ncat .nvmrc 2>/dev/null || echo \"falta .nvmrc\"\n```\n\n> Siguiente: [01 · Estrategia](01-estrategia.md)\n"},{"id":"01","num":"01","title":"Estrategia","eyebrow":"Lección 01 · Pages Router server-rendered","file":"01-estrategia.md","md":"# 01 · Estrategia — Pages Router server-rendered\n\n> Objetivo: entender la estructura de integration branch + stacked sub-PRs, por qué server-rendered en EKS, cómo manejar `basePath` y `NEXT_PUBLIC_*` en runtime.\n\n---\n\n## Integration branch + sub-PRs apilados\n\n**Regla fundamental**: nunca migrar directo a `main`. Toda la migración vive en un integration branch:\n\n```\nmain\n └─► feat/COENXT-XXX-nextjs-12-to-16-migration   ← integration branch\n       ├─► feat/COENXT-XXX-step-01-codemod-new-link\n       │    └─► feat/COENXT-XXX-step-02-image-legacy\n       │         └─► feat/COENXT-XXX-step-03-next14-bump\n       │              └─► feat/COENXT-XXX-step-04-next15-bump\n       │                   └─► feat/COENXT-XXX-step-05-react19\n       │                        └─► feat/COENXT-XXX-step-06-next16-turbopack\n```\n\nCada sub-PR usa el anterior como base. Cuando el sub-PR N mergea a integration, GitHub re-targetea N+1 automático.\n\n### Merge strategy\n\n| Dirección | Estrategia |\n|-----------|-----------|\n| Sub-PR → integration | Squash (1 commit por step) |\n| Integration → main | Merge-commit (preserva historia para `git bisect`) |\n\n### Crear el integration branch\n\n```bash\ngit fetch origin main\ngit worktree add /private/tmp/wt-next-integration \\\n  -b feat/COENXT-XXX-nextjs-12-to-16-migration \\\n  origin/main\n\n# Desde ese worktree, crear el primer sub-PR:\ngit worktree add /private/tmp/wt-next-step-01 \\\n  -b feat/COENXT-XXX-step-01-codemod-new-link \\\n  origin/feat/COENXT-XXX-nextjs-12-to-16-migration\n```\n\n> **Trampa**: nunca en el checkout principal. Siempre en worktrees. Si editás `main` directo y hay un deploy automático, podés romper develop/QA.\n\n---\n\n## Por qué server-rendered en EKS\n\nLa infra MODO corre los frontends en Kubernetes (EKS + Istio) con `next start`. Las razones:\n\n1. **ISR real**: necesitás `getServerSideProps` / `getStaticProps` con `revalidate` para que el CMS (Storyblok) actualice sin rebuild.\n2. **Runtime env**: las variables de entorno se inyectan en SSM al momento de boot, no en build. Con `output: 'export'` no hay runtime — todo se bakea en el bundle.\n3. **Probes k8s**: liveness y readiness apuntan a la ruta real del pod. Si el pod no responde 200, nunca queda Ready.\n4. **Deep links iOS/Android**: los rewrites de `next.config.js` para `apple-app-site-association` requieren el servidor Node corriendo.\n\n### Contrato mínimo con la infra\n\n```\nnext start -p 3000\nGET /<basePath>      → 200\nGET /                → 404  (cuando hay basePath configurado)\n```\n\nSi el probe de k8s pega a `/` en un repo con `basePath: '/modo'`, el pod nunca queda Ready. Más en [04 · Build + test + smoke](04-build-test-smoke.md).\n\n---\n\n## basePath\n\nCuando el frontend no vive en la raíz del dominio sino bajo un prefijo:\n\n```js\n// next.config.js\nmodule.exports = {\n  basePath: '/modo',\n}\n```\n\nQué cambia:\n- `next/link` y assets estáticos resuelven el prefijo solos.\n- `router.push('/algo')` resulta en `/modo/algo` sin que lo escribas.\n- El smoke test debe pegar a `http://localhost:3000/modo`, no a `http://localhost:3000/`.\n\n> **Trampa**: con `basePath`, `GET /` da **404**. Los probes de k8s/Istio deben apuntar a `/<basePath>`. Caso real: aprendeatumodo — los primeros deployos fallaban porque el liveness probe seguía en `/`.\n\n---\n\n## Runtime env — `NEXT_PUBLIC_*`\n\n### El problema del bakeo\n\nEn Next.js, `NEXT_PUBLIC_*` se reemplaza en build time por el valor presente en ese momento. Con `next build` en CI, si el valor cambia entre ambientes (develop / QA / preprod / prod), necesitarías builds separados. La infra MODO usa **una imagen, N ambientes**.\n\n### La solución: `next-runtime-env`\n\n```bash\npnpm add next-runtime-env\n```\n\n```tsx\n// app/layout.tsx o pages/_app.tsx\nimport { PublicEnvScript } from 'next-runtime-env';\n\n// En el <head> o dentro del componente:\n<PublicEnvScript />\n```\n\n```ts\n// Donde necesitás el valor:\nimport { env } from 'next-runtime-env';\nconst apiUrl = env('NEXT_PUBLIC_API_BASE_URL');\n```\n\nEl script inyecta los `NEXT_PUBLIC_*` presentes en `process.env` al momento de `next start` (no de `next build`). Una imagen se inicia con distintos SSM params por ambiente, sin rebuild.\n\n> **No bakear `NEXT_PUBLIC_*` en build**. Verificar con `grep -rn \"process.env.NEXT_PUBLIC_\"` — si encontrás referencias fuera de `next-runtime-env` y fuera de `next.config.js`, son candidatos a migrar.\n\n---\n\n## Coexistencia Pages Router + App Router (opcional, avanzado)\n\nSi en el futuro querés migrar páginas a App Router sin big-bang:\n\n- `src/pages/` y `src/app/` coexisten en Next 13+.\n- Las páginas nuevas van a `src/app/`, las viejas quedan en `src/pages/`.\n- `_app.js` providers (Redux, Theme) eventualmente se mueven a `src/app/layout.tsx`.\n- `_document.js` con `ServerStyleSheet` (styled-components) debe resolverse antes de mover páginas a App Router.\n\nEste curso se enfoca en completar la migración de versión con Pages Router intacto. La migración a App Router es Phase 04 separada.\n\n---\n\n## Checklist de salida\n\n- [ ] Integration branch creado con naming `feat/COENXT-XXX-nextjs-N-to-M-migration`\n- [ ] Primer sub-PR apilado sobre integration (no sobre main)\n- [ ] `basePath` documentado si aplica\n- [ ] Decisión sobre `next-runtime-env` tomada (¿lo usás o no?)\n- [ ] `.nvmrc` con Node ≥20.9\n\n> Siguiente: [02 · Breaking changes](02-breaking-changes.md)\n"},{"id":"02","num":"02","title":"Breaking changes","eyebrow":"Lección 02 · 12→16","file":"02-breaking-changes.md","md":"# 02 · Breaking changes — Next 12 → 16\n\n> Objetivo: conocer cada cambio rotoso por step antes de aplicarlo. Cada sub-PR toca un step. No saltar versiones.\n\n> **Regla del equipo**: no migrar 12→16 en un solo commit. El codemod oficial es per-step y mezclar breaking changes hace el debug exponencialmente más costoso.\n\n---\n\n## Step 1: Next 12 → 13\n\n### Codemods a aplicar (non-interactive)\n\n```bash\npnpm add next@13.x eslint-config-next@13.x\npnpm dlx @next/codemod@canary new-link --force ./\npnpm dlx @next/codemod@canary next-image-to-legacy-image --force ./\n# Si usabas @next/font:\npnpm dlx @next/codemod@canary built-in-next-font --force ./\n```\n\n> **Trampa codemods interactivos**: `pnpm dlx @next/codemod@canary upgrade 13` pide selección manual. En automation y agentes usar codemods individuales con `--force`.\n\n### Cambios manuales en `next.config.js`\n\n```js\n// ANTES (Next 12)\nmodule.exports = {\n  images: {\n    domains: ['cdn.modo.com.ar', 'a.storyblok.com'],\n    experimental: { allowFutureImage: true },\n  },\n}\n\n// DESPUÉS (Next 13+)\nmodule.exports = {\n  images: {\n    remotePatterns: [\n      { protocol: 'https', hostname: 'cdn.modo.com.ar' },\n      { protocol: 'https', hostname: 'a.storyblok.com' },\n    ],\n  },\n}\n```\n\n- `images.domains` → `images.remotePatterns`\n- Quitar `experimental.images` completo (incluye `allowFutureImage`)\n- `swcMinify: true` es default — podés sacarlo del config\n\n### `next/image` → `next/legacy/image` (temporal)\n\nEl codemod renombra todos los imports. Es **intencional y temporal** — el paso final (ver \"Re-migrar a moderno\" más abajo) los devuelve a `next/image`.\n\n### Jest setup: bloqueante con `new-link`\n\nCuando aplicás `new-link`, `<Link>` usa `useRouter()` internamente. Sin mock global, **100% de las suites fallan** con \"NextRouter was not mounted\".\n\nAgregar en `jest.setup.js`:\n\n```js\njest.mock('next/router', () => {\n  const noop = () => undefined;\n  const router = {\n    push: jest.fn().mockResolvedValue(true),\n    replace: jest.fn().mockResolvedValue(true),\n    prefetch: jest.fn().mockResolvedValue(undefined),\n    reload: noop, back: noop, forward: noop,\n    beforePopState: noop,\n    isLocaleDomain: false,\n    pathname: '/', route: '/', asPath: '/', basePath: '',\n    query: {}, isReady: true, isPreview: false, isFallback: false,\n  };\n  const ReactLocal = jest.requireActual('react');\n  return {\n    __esModule: true,\n    useRouter: () => router,\n    default: router,\n    withRouter: (C) => (props) =>\n      ReactLocal.createElement(C, { ...props, router }),\n  };\n});\n```\n\nTambién mockear ambas versiones de image:\n\n```js\njest.mock('next/image', () => ({\n  __esModule: true,\n  default: (props) => <img {...props} />,\n}));\njest.mock('next/legacy/image', () => ({\n  __esModule: true,\n  default: (props) => <img {...props} />,\n}));\n```\n\n---\n\n## Step 2: Next 13 → 14\n\n**Pages Router: sin breaking changes.** Bump pasivo:\n\n```bash\npnpm add next@14.x eslint-config-next@14.x\n```\n\nLos codemods de Next 14 son todos App Router only. Si estás en Pages Router puro, este step es el más corto.\n\n---\n\n## Step 3: Next 14 → 15\n\n### React 18 → pin explícito\n\nNext 15 soporta React 19 pero también React 18. Aislar el bump de React en un sub-PR aparte. Mientras tanto, pinear React 18:\n\n```json\n\"pnpm\": {\n  \"overrides\": {\n    \"react\": \"^18.3.1\",\n    \"react-dom\": \"^18.3.1\"\n  }\n}\n```\n\n### `experimental.typedRoutes`\n\nSi tenés `experimental.typedRoutes: true` en `next.config.js`, **quitalo**. Next 15 lo promovió a strict `RouteImpl<string>` que rompe `<Link href={string}>` con paths dinámicos como `/comercios/[slug]`.\n\n```js\n// Sacar esto:\nexperimental: {\n  typedRoutes: true,\n}\n```\n\n### `next-usequerystate` → `nuqs`\n\nSi el repo usa `next-usequerystate`, en Next 15 debe migrarse a `nuqs`:\n\n```bash\npnpm remove next-usequerystate\npnpm add nuqs\n```\n\n---\n\n## Step 4: Next 15 → 16\n\n### Node ≥20.9 obligatorio\n\n```bash\nnode -v  # ≥20.9\n# Si no: nvm install 22 && nvm use 22\necho \"22\" > .nvmrc\n```\n\n### `images.qualities` — rompe imágenes en prod (NO en build)\n\n> **Trampa silenciosa**: Next 15/16 valida el query `quality` del optimizer contra una whitelist. Default whitelist = solo `[75]`. Cualquier `<Image quality={95}/>` o `<Image quality={100}/>` → el optimizer devuelve **400 \"q parameter (quality) of 95 is not allowed\"** → la imagen no se ve en producción. No falla en build ni en smoke local si no renderizás esa imagen en el check.\n\nCaso real: modo-landing PR #1482 — 19 imágenes de Storyblok del home (CMSImage q=95) rotas en preprod.\n\n```bash\n# Inventariar todas las qualities usadas\ngrep -rhoE \"quality=\\{?[0-9]+\\}?\" src/ | grep -oE \"[0-9]+\" | sort -un\n```\n\nWhitelistear en `next.config.js`:\n\n```js\nmodule.exports = {\n  images: {\n    qualities: [75, 95, 100],  // 75 = default + las que usás\n  },\n}\n```\n\n### `--webpack` flag en build si tenés callback custom\n\nSi `next.config.js` tiene un callback `webpack(config, options)`, Next 16 default es Turbopack y puede ignorar ese callback. Para el sub-PR de Next 15→16, agregar el flag temporalmente:\n\n```json\n\"scripts\": {\n  \"build\": \"next lint && next build --webpack\"\n}\n```\n\nEl sub-PR de Turbopack (siguiente) lo quita.\n\n### `dangerouslyAllowSVG` — no agregar por reflejo\n\nSolo hace falta si la app pasa SVG **por el optimizer de Next** (`<Image src=\"algo.svg\">`). Si los SVG se sirven como `<img>` raw o `unoptimized`, el flag no aplica. Agregarlo sin verificar relaja seguridad sin beneficio. Verificar primero:\n\n```bash\ngrep -rn \"\\.svg\" src/ | grep -i \"<Image\\|next/image\"\n```\n\n---\n\n## Step 5: Turbopack default\n\nUna vez que el build con `--webpack` pasa:\n\n```js\n// next.config.js — declarar intención explícita\nmodule.exports = {\n  turbopack: {},  // config vacío, silencia warnings de coexistencia\n  // mantener el callback webpack como fallback para builds con --webpack explícito\n}\n```\n\n```json\n\"scripts\": {\n  \"build\": \"next lint && next build\"  // sin --webpack\n}\n```\n\n### CSS spec strictness (Turbopack)\n\nTurbopack parser rechaza selectores no estándar. Si tenés:\n\n```css\n.clase::after[attr=\"x\"] { }    /* INVÁLIDO */\n```\n\nReordenarlo:\n\n```css\n.clase[attr=\"x\"]::after { }    /* VÁLIDO */\n```\n\nEl attribute selector debe preceder al pseudo-element.\n\n---\n\n## Re-migrar `next/legacy/image` → `next/image` moderno\n\nEl codemod del Step 1 es temporal. El estado final correcto es `next/image` moderno. SonarCloud levanta **S1874** (\"Symbol deprecated\") en cada `<Image>` de `next/legacy/image` — en un repo con muchas imágenes rompe el quality gate.\n\n```bash\n# Swap masivo del import\nfor f in $(grep -rln \"next/legacy/image\" src); do\n  sed -i '' \"s#from 'next/legacy/image'#from 'next/image'#g\" \"$f\"\ndone\n\n# Detectar props legacy que necesitan conversión manual\ngrep -rnE \"(layout|objectFit|objectPosition|lazyBoundary|lazyRoot|onLoadingComplete)=\" src \\\n  | grep -v \"style=\"\n```\n\n### Conversión de props legacy → moderno\n\n| Legacy | Moderno | Nota |\n|--------|---------|------|\n| `layout=\"fill\"` | `fill` (sin valor) | El contenedor padre DEBE ser `position: relative/absolute/fixed` + dimensionado |\n| `layout=\"fixed\"` / `\"intrinsic\"` | (nada) | Default con `width`/`height` numéricos |\n| `objectFit=\"cover\"` | `style={{ objectFit: 'cover' }}` | |\n| `objectPosition=\"x\"` | `style={{ objectPosition: 'x' }}` | |\n| `onLoadingComplete` | `onLoad` | |\n| `lazyBoundary` / `lazyRoot` | (eliminar) | No existen en moderno |\n\n### Gotchas post-swap\n\n- `alt` es **obligatorio** en moderno. Las `.tsx` fallan en `tsc`, las `.jsx` tiran error en runtime.\n- `width`/`height` deben ser **numéricos**. `width=\"100%\"` es inválido → usar número o `fill`.\n- `fill` + `width`/`height` juntos = error. Elegir uno.\n\n### Verify-grep antes de declarar done\n\n```bash\ngrep -rln \"next/legacy/image\" src | wc -l                    # → 0\ngrep -rnE \"(layout=|objectFit=|lazyBoundary=)\" src | grep -v \"style=\"   # → vacío\ngrep -rnE 'width=\"[^0-9]|height=\"[^0-9]' src | grep -i image # → vacío\n```\n\n---\n\n## React 18 → 19 (sub-PR separado, post-Next 16)\n\n```bash\n# Remover los overrides de React 18 del package.json primero\npnpm add react@19.2 react-dom@19.2 @types/react@^19 @types/react-dom@^19\n```\n\nCambios relevantes en tests:\n\n- React 19 hoist `<title>/<meta>/<link>` al `document.head` real. Tests que inspeccionaban el mock de `next/head` deben ahora inspeccionar `document.head.innerHTML`.\n- **NO usar** `afterEach(() => document.head.innerHTML = '')` — rompe la reconciliación de React 19. `RTL cleanup()` automático ya maneja el unmount.\n\n---\n\n## Checklist de salida\n\n- [ ] Step 12→13: codemods aplicados, `jest.setup.js` actualizado, `images.remotePatterns`\n- [ ] Step 13→14: bump pasivo, suites verdes\n- [ ] Step 14→15: `typedRoutes` removido, React 18 pineado si no migraste React aún\n- [ ] Step 15→16: `images.qualities` configuradas, Node ≥20.9\n- [ ] `next/legacy/image` → `next/image` moderno, verify-grep 0 residuos\n- [ ] Turbopack: `turbopack: {}` declarado, CSS selectors válidos\n\n> Siguiente: [03 · Routing + data](03-routing-data.md)\n"},{"id":"03","num":"03","title":"Routing + data","eyebrow":"Lección 03 · SSR/ISR","file":"03-routing-data.md","md":"# 03 · Routing + data — SSR / ISR / catch-all / rewrites\n\n> Objetivo: entender los patterns de fetching de datos en Pages Router y cómo operan en la infra MODO. Sin inventar — todo lo que aparece acá está verificado en modo-landing.\n\n---\n\n## `getServerSideProps` — SSR por request\n\nEjecuta en cada request en el servidor. Usar cuando:\n- El contenido cambia frecuentemente y no podés cachear.\n- Necesitás headers/cookies de la request (autenticación, A/B por cookie).\n- El CMS devuelve contenido personalizado por usuario.\n\n```tsx\n// src/pages/promos.tsx\nimport type { GetServerSideProps, NextPage } from 'next';\n\ntype Props = { promos: Promo[] };\n\nconst PromosPage: NextPage<Props> = ({ promos }) => (\n  <main>{/* render */}</main>\n);\n\nexport const getServerSideProps: GetServerSideProps<Props> = async (ctx) => {\n  const data = await fetch(`${process.env.API_BASE_PROMOS_URL}/promos`);\n  const promos = await data.json();\n  return { props: { promos } };\n};\n\nexport default PromosPage;\n```\n\n> En modo-landing, las páginas de promos y comercios usan `getServerSideProps` porque el contenido cambia por sesión y los filtros vienen como query params.\n\n---\n\n## `getStaticProps` + ISR — generación estática con revalidación\n\nGenera el HTML en build y lo regenera en background cada N segundos cuando llega una request.\n\n```tsx\nexport const getStaticProps: GetStaticProps = async () => {\n  const data = await fetchCMSData();\n  return {\n    props: { data },\n    revalidate: 60,  // segundos — regenera en background cada 60s\n  };\n};\n```\n\nUsar cuando:\n- El contenido cambia poco (landing pages, páginas de marketing).\n- Querés el LCP lo más bajo posible (HTML precalculado).\n- El CMS (Storyblok) sirve contenido no personalizado.\n\n### ISR + Storyblok\n\nEn modo-landing, el catch-all `[[...slug]].jsx` usa `getServerSideProps` (no ISR) porque Storyblok necesita el `preview` token diferente según el ambiente. Para páginas menos dinámicas, ISR es válido con el `revalidate` ajustado.\n\n> **Trampa `fallback: true`**: en Next 12, `fallback: true` en `getStaticPaths` retornaba una página en blanco mientras generaba. En Next 13+, el comportamiento cambió levemente. Si tenés `fallback: true` y ves páginas en blanco al navegar a slugs nuevos, revisar si necesitás `fallback: 'blocking'`.\n\n```tsx\nexport const getStaticPaths: GetStaticPaths = async () => {\n  // En modo-landing: catálogo de slugs del CMS\n  const slugs = await fetchAllSlugs();\n  return {\n    paths: slugs.map((s) => ({ params: { slug: s.split('/') } })),\n    fallback: 'blocking',  // espera la generación en lugar de retornar vacío\n  };\n};\n```\n\n---\n\n## Catch-all route — `[[...slug]]`\n\nEl patrón principal de modo-landing para páginas CMS-driven:\n\n```\nsrc/pages/[[...slug]].jsx\n```\n\n- `[[...slug]]` (doble corchete) es **opcional** — también matchea `/` (raíz).\n- `[...slug]` (simple corchete) es **requerido** — no matchea `/`.\n\nEn modo-landing, la raíz `/` y todas las páginas de Storyblok pasan por este catch-all. Las páginas con rutas dedicadas (`/promos`, `/comercios`) se resuelven antes del catch-all por orden de prioridad de Next.\n\n```tsx\n// src/pages/[[...slug]].jsx (simplificado)\nexport const getServerSideProps = async ({ params, preview }) => {\n  const slug = params?.slug?.join('/') ?? '';\n  const story = await storyblokClient.get(`cdn/stories/${slug}`, {\n    version: preview ? 'draft' : 'published',\n  });\n  if (!story) return { notFound: true };\n  return { props: { story: story.data.story } };\n};\n```\n\n---\n\n## Rewrites — deep links iOS/Android\n\nmodo-landing usa rewrites en `next.config.js` para servir `apple-app-site-association` y links de iOS/Android:\n\n```js\nmodule.exports = {\n  async rewrites() {\n    return [\n      {\n        source: '/apple-app-site-association',\n        destination: '/api/apple-app-site-association',\n      },\n      {\n        source: '/.well-known/apple-app-site-association',\n        destination: '/api/apple-app-site-association',\n      },\n    ];\n  },\n};\n```\n\n> **Importante**: los rewrites requieren el servidor Node corriendo (`next start`). Con `output: 'export'` no funcionan. Es otra razón para no usar static export.\n\n### Rewrites con `basePath`\n\nCon `basePath: '/modo'`, los rewrites aplican **después** del basePath. Si necesitás un path que NO tenga el basePath (ej. `/.well-known/` en la raíz), usar `skipMiddlewareUrlNormalize` no es la solución — los rewrites sí aplican a la raíz aunque haya basePath configurado.\n\n---\n\n## Variables de entorno en SSR\n\nEn `getServerSideProps` y rutas API, podés usar variables sin `NEXT_PUBLIC_`:\n\n```tsx\nexport const getServerSideProps = async () => {\n  // Solo disponible en el servidor — no se expone al cliente\n  const data = await fetch(process.env.API_BASE_URL + '/endpoint');\n  // ...\n};\n```\n\nLas `NEXT_PUBLIC_*` sí están disponibles en ambos lados (server + client), pero con el caveat de runtime env explicado en [01 · Estrategia](01-estrategia.md).\n\n---\n\n## `head` — Document Metadata\n\nEn Pages Router, el metadata de cada página va en el componente `<Head>` de `next/head`:\n\n```tsx\nimport Head from 'next/head';\n\nconst Page = () => (\n  <>\n    <Head>\n      <title>Título de la página</title>\n      <meta name=\"description\" content=\"...\" />\n    </Head>\n    <main>{/* contenido */}</main>\n  </>\n);\n```\n\nCon React 19 (sub-PR separado), estos elementos se hoist al `document.head` real. Los tests que inspeccionan `document.head.innerHTML` pueden requerir ajustes — ver [02 · Breaking changes](02-breaking-changes.md).\n\n---\n\n## Checklist de salida\n\n- [ ] Cada página usa el método de fetching correcto (`getServerSideProps` vs `getStaticProps + ISR`)\n- [ ] El catch-all `[[...slug]]` resuelve correctamente (sin conflictos con rutas dedicadas)\n- [ ] `fallback: 'blocking'` si se usa `getStaticPaths` con slugs dinámicos\n- [ ] Rewrites definidos para deep links si aplica\n- [ ] Variables de entorno sin `NEXT_PUBLIC_` no expuestas en el cliente\n\n> Siguiente: [04 · Build + test + smoke](04-build-test-smoke.md)\n"},{"id":"04","num":"04","title":"Build + test + smoke","eyebrow":"Lección 04 · Contrato verde","file":"04-build-test-smoke.md","md":"# 04 · Build + test + smoke — Contrato verde\n\n> Objetivo: `pnpm build` verde + contrato de rutas verificado + suites de Jest pasando. Sin claim sin verify.\n\n---\n\n## El contrato mínimo\n\nAntes de abrir un PR a integration, el sub-PR debe cumplir:\n\n| Check | Comando | Esperado |\n|-------|---------|---------|\n| Lint | `pnpm lint` | 0 errores (warnings aceptables) |\n| Build | `pnpm build` | Exit 0, sin errores TS ni webpack/turbopack |\n| Tests | `pnpm test` | Todas las suites verdes |\n| Smoke raíz | `curl -s -o /dev/null -w \"%{http_code}\" http://localhost:3000/` | `404` si hay basePath, `200` si no hay |\n| Smoke basePath | `curl -s -o /dev/null -w \"%{http_code}\" http://localhost:3000/<basePath>` | `200` |\n\n---\n\n## `pnpm build` verde\n\n### `corepack` + TTY trap\n\n> **Trampa**: bajo corepack, `pnpm build` puede correr un pre-script `runDepsStatusCheck` que aborta con `ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY` cuando no hay TTY (en agentes/CI).\n\nSi el build falla con ese error, usar el workaround:\n\n```bash\n# Opción A: flag CI\nCI=true pnpm build\n\n# Opción B: llamar next build directo (skipea el wrapper)\n./node_modules/.bin/next build\n```\n\n### `pnpm.overrides` para safe-chain\n\nEl pre-push hook `check-safe-chain-age.mjs` bloquea deps con <7 días (168h). Al bumpear Next/React major llegan deps transitivas frescas. Fix: pinear las flagged via `pnpm.overrides`:\n\n```json\n\"pnpm\": {\n  \"overrides\": {\n    \"handlebars\": \"4.7.9\",\n    \"semver\": \"7.7.4\",\n    \"enhanced-resolve\": \"5.21.6\"\n  }\n}\n```\n\nVerificar la age de cada candidata:\n\n```bash\nnpm view <pkg> time --json | python3 -c \"\nimport sys, json\nfrom datetime import datetime\nt = json.load(sys.stdin)\nnow = datetime.utcnow()\nfor v, ts in t.items():\n    if v in ('created','modified'): continue\n    d = datetime.fromisoformat(ts.replace('Z',''))\n    age = (now-d).days\n    if age >= 7: print(v, age, 'days')\n\" | tail -10\n```\n\n---\n\n## Tests: política no-snapshots\n\nLa política MODO elimina los Jest snapshots. Post-codemod `new-link`, los class names cambian y los snapshots se rompen de todas formas.\n\n```bash\n# Inventariar snapshots existentes\nfind src -name \"*.snap\" -type f\nfind src -type d -name \"__snapshots__\"\n```\n\n**No regenerar** (`pnpm test:update-snap`). Reemplazar con assertions semánticas RTL:\n\n```ts\n// En lugar de: expect(container).toMatchSnapshot()\nexpect(screen.getByRole('button', { name: /Aceptar/i })).toBeInTheDocument();\nexpect(screen.getByText('Título')).toBeVisible();\n```\n\nCaso real modo-landing: 26 archivos `.snap` + 57 `toMatchSnapshot` → −6204 líneas netas eliminadas.\n\n### Correr tests por path\n\n> **Trampa de flags pnpm**: `pnpm test -- --testPathPattern=src/...` se come el flag. Usar:\n\n```bash\n# Opción A: npx directo\nnpx jest src/components/MiComponente\n\n# Opción B: script dedicado\npnpm test:specific -t \"MiComponente\"\n```\n\n---\n\n## Smoke test: contrato de rutas\n\nUna vez que el build pasa, arrancar `next start` y verificar el contrato:\n\n```bash\n# En una terminal:\npnpm build && ./node_modules/.bin/next start -p 3000 &\nSERVER_PID=$!\n\n# Smoke básico (sin basePath):\ncurl -s -o /dev/null -w \"%{http_code}\\n\" http://localhost:3000/\n# Espera: 200\n\n# Smoke con basePath (ej. basePath: '/modo'):\ncurl -s -o /dev/null -w \"%{http_code}\\n\" http://localhost:3000/modo\n# Espera: 200\ncurl -s -o /dev/null -w \"%{http_code}\\n\" http://localhost:3000/\n# Espera: 404\n\n# Cleanup\nkill $SERVER_PID\n```\n\n> **Por qué `GET /` debe dar 404 con basePath**: los probes de liveness/readiness en k8s/Istio apuntan a la ruta real del pod. Si tu deploy tiene `basePath: '/modo'` y el probe sigue pegando a `/`, el pod nunca queda Ready y el rollout falla silenciosamente.\n\n### Verificar que `NEXT_PUBLIC_*` llega al HTML\n\nSi usás `next-runtime-env`:\n\n```bash\n# Arrancá con una var de prueba\nNEXT_PUBLIC_API_BASE_URL=https://test.modo.com.ar \\\n  ./node_modules/.bin/next start -p 3000 &\n\n# El script inline debe aparecer en el HTML\ncurl -s http://localhost:3000/<basePath> | grep \"__ENV\"\n# Debe salir algo como: window.__ENV = {\"NEXT_PUBLIC_API_BASE_URL\":\"https://test.modo.com.ar\"}\n```\n\n---\n\n## Verify-greps antes de declarar done\n\n```bash\n# Sin residuos de legacy/image\ngrep -rln \"next/legacy/image\" src | wc -l   # → 0\n\n# Sin props legacy de image\ngrep -rnE \"(layout=|objectFit=|lazyBoundary=)\" src | grep -v \"style=\"   # → vacío\n\n# Sin import.meta.env de Vite (si venías de Vite)\ngrep -rn \"import.meta.env\" src app 2>/dev/null   # → vacío\n\n# Sin react-router (si venías de Vite)\ngrep -rln \"react-router\" src | grep -v test   # → vacío o solo tests\n\n# Sin snapshots\nfind src -name \"*.snap\" | wc -l   # → 0\n\n# Sin console.log/error/warn en prod\ngrep -rn \"console\\.\\(log\\|error\\|warn\\)\" src | grep -v test | grep -v \".test.\" | grep -v \"spec\"\n```\n\n---\n\n## SonarCloud: smells a prevenir por step\n\n| Step | Smell probable | Fix |\n|------|---------------|-----|\n| new-link aplicado | S1874 si `next/legacy/image` quedó | Re-migrar a moderno |\n| Archivo `.jsx` tocado | S6774 (props sin validar) | Agregar `Component.propTypes = {}` |\n| Código nuevo con `any` | S4325 | Tipar o `// @ts-expect-error` documentado |\n\n---\n\n## Checklist de salida\n\n- [ ] `pnpm lint` — 0 errores\n- [ ] `pnpm build` (o `CI=true pnpm build`) — exit 0\n- [ ] `pnpm test` — todas las suites verdes, 0 snapshots\n- [ ] Smoke `GET /<basePath>` = 200\n- [ ] Smoke `GET /` = 404 (si hay basePath), 200 (si no)\n- [ ] Verify-greps: 0 legacy/image, 0 import.meta.env, 0 snapshots\n- [ ] `NEXT_PUBLIC_*` aparece en el HTML inline (si usás next-runtime-env)\n\n> Siguiente: [05 · Deploy](05-deploy.md)\n"},{"id":"05","num":"05","title":"Deploy","eyebrow":"Lección 05 · Alpha","file":"05-deploy.md","md":"# 05 · Deploy — Alpha a playsistemico\n\n> Objetivo: disparar el primer deploy de la migración a QA y verificar que el pod levanta.\n\n---\n\n## ci-alpha — el workflow de QA\n\nmodo-landing tiene `.github/workflows/ci-alpha.yaml` con `workflow_dispatch` que acepta cualquier `ref`. Cuando termina exitoso, dispara automático `Frontend CD` que deploya a QA.\n\n```bash\ngh workflow run ci-alpha.yaml \\\n  --repo playsistemico/modo-landing \\\n  --ref feat/COENXT-XXX-nextjs-12-to-16-migration \\\n  -f environment=qa\n```\n\n> **Nota**: el `headBranch` que muestra el CD run aparece como `main` porque el workflow `cd.yaml` está en main, pero el deploy usa el artifact del builder alpha contra la branch indicada. Es el comportamiento esperado.\n\n---\n\n## Stop-the-line si en QA se cumple alguna de estas\n\nNo mergear el sub-PR a integration si:\n\n- LCP empeora >200ms respecto al baseline.\n- Sentry error rate >2× el baseline.\n- Bundle crece >10% acumulado.\n- Storyblok ISR no revalida (páginas CMS desactualizadas).\n- Deep links iOS/Android no resuelven.\n- El pod no queda Ready (probe fallando — revisar basePath en el probe config).\n\n---\n\n## Rollback strategy\n\n| Nivel | Acción | ETA |\n|-------|--------|-----|\n| Sub-PR en integration | `git revert <squash-commit>` + push → ci-alpha redeploya QA | <10 min |\n| Integration en main | `git revert <merge-commit>` en main → CD redeploya develop/QA | <10 min |\n| Producción | `helm rollback modo-landing-prod <prev-revision>` | <5 min |\n\n---\n\n## Para el deploy completo a playsistemico (infra MODO EKS)\n\nLa migración produce un build que la infra arrancar con `next start`. El setup completo de infra (SOPS, SSM, Helm, ingress ALB, tickets JSM) está en el curso dedicado:\n\n> Ver **[Curso: Deploy a playsistemico](https://soyernomodo.github.io/erno-modo/capacitaciones/deploy-playsistemico/)** para el workflow completo de infra MODO EKS.\n\nEse curso cubre:\n- Clonar la infra de `promos-hub-site` como base.\n- Configurar parámetros en SSM por ambiente.\n- Tickets JSM para apertura de subdominio y certificado.\n- Configurar los probes de liveness/readiness al `basePath` correcto.\n- Pipeline CD: develop → QA → preprod → prod.\n\n---\n\n## Checklist de salida\n\n- [ ] ci-alpha disparado contra la branch de la migración\n- [ ] Deploy QA exitoso — pod Ready\n- [ ] Smoke en QA URL: `GET /<basePath>` = 200\n- [ ] No hay regresos de LCP, error rate ni bundle size\n- [ ] Deep links y rewrites verificados\n- [ ] Sub-PR mergeado a integration (squash)\n\n> Curso completo de deploy: [deploy-playsistemico](https://soyernomodo.github.io/erno-modo/capacitaciones/deploy-playsistemico/)\n>\n> Volver al [inicio](#intro) o hacer el [Lab integrador](exercises/README.md).\n"},{"id":"lab","num":"🧪","title":"Lab: migrar una page","eyebrow":"Lab integrador","file":"","md":"# Lab · Migrar una page a server-rendered y verificar el contrato\n\n> Lab integrador del curso [Migrar a Next.js 16](../README.md).\n>\n> Duracion estimada: 45-60 min con Claude Code abierto.\n\n---\n\n## Objetivo\n\nTomás una page existente en el repo (Vite o Next viejo), la migrás a Pages Router server-rendered en Next 16, y verificás el contrato de rutas.\n\n---\n\n## Contexto del lab\n\nPara practicar sin tocar producción, vas a trabajar en un **worktree dedicado**:\n\n```bash\n# Desde la raíz del repo\ngit fetch origin main\ngit worktree add /private/tmp/wt-lab-next16 \\\n  -b feat/lab-next16-page-migration \\\n  origin/main\ncd /private/tmp/wt-lab-next16\n```\n\n---\n\n## Paso 1 — Elegir la page a migrar\n\nElegí una page que:\n- No sea el catch-all `[[...slug]]` (ese es complejo, para el lab no).\n- No tenga muchas dependencias externas.\n- Tenga al menos un fetch de datos.\n\nBuenas candidatas: `/pagar`, `/recargas`, una página de feature simple.\n\n```bash\n# Ver las páginas disponibles\nls src/pages/\n```\n\nAnotá el path elegido: `src/pages/________________.tsx`\n\n---\n\n## Paso 2 — Auditar la page actual\n\nAntes de tocar algo, entender qué hace hoy:\n\n- [ ] ¿Usa `getServerSideProps`, `getStaticProps`, o ninguno (client-only)?\n- [ ] ¿Tiene `next/image`? ¿Con qué props?\n- [ ] ¿Importa algo de `next/legacy/image`?\n- [ ] ¿Tiene algún fetch client-side (`useEffect` + fetch)?\n- [ ] ¿Tiene `console.log/error/warn`?\n\n```bash\ngrep -n \"getServerSideProps\\|getStaticProps\\|useEffect\\|console\\.\" src/pages/TU-PAGE.tsx\ngrep -n \"next/image\\|next/legacy\" src/pages/TU-PAGE.tsx\n```\n\n---\n\n## Paso 3 — Resolver el fetching de datos\n\nSegún lo que encontraste en el paso 2:\n\n### Si es client-only (`useEffect` + fetch):\n\nMover el fetch a `getServerSideProps`:\n\n```tsx\nexport const getServerSideProps: GetServerSideProps<Props> = async (ctx) => {\n  const res = await fetch(`${process.env.API_BASE_URL}/endpoint`);\n  if (!res.ok) return { notFound: true };\n  const data = await res.json();\n  return { props: { data } };\n};\n```\n\nBorrar el `useEffect` de fetching inicial. El componente recibe los datos como props.\n\n### Si ya tiene `getServerSideProps` o `getStaticProps`:\n\nVerificar que el tipo esté correcto:\n\n```tsx\nimport type { GetServerSideProps, NextPage } from 'next';\n```\n\n---\n\n## Paso 4 — Migrar `next/image` si aplica\n\nSi la page usa `next/legacy/image`:\n\n```bash\n# Swap del import\nsed -i '' \"s#from 'next/legacy/image'#from 'next/image'#g\" src/pages/TU-PAGE.tsx\n\n# Revisar props legacy\ngrep -n \"layout=\\|objectFit=\\|lazyBoundary=\" src/pages/TU-PAGE.tsx\n```\n\nConvertir props según la tabla de [02 · Breaking changes](../02-breaking-changes.md).\n\nVerificar que `alt` esté presente en todos los `<Image>`.\n\n---\n\n## Paso 5 — Build y tests\n\n```bash\n# Build\npnpm lint && pnpm build\n# o si hay problema de TTY:\nCI=true pnpm build\n\n# Tests relacionados a la page\nnpx jest src/pages/TU-PAGE\n# o\nnpx jest src/components/ComponenteDeLaPage\n```\n\n- [ ] `pnpm lint` — 0 errores\n- [ ] `pnpm build` — exit 0\n- [ ] Tests de la page — verdes\n\nSi hay snapshots en los tests de esta page:\n\n```bash\nfind src -name \"*.snap\" | xargs grep -l \"TU-PAGE\\|ComponenteDeLaPage\"\n```\n\nReemplazarlos con assertions RTL semánticas.\n\n---\n\n## Paso 6 — Smoke del contrato\n\n```bash\n# Arrancar el servidor\n./node_modules/.bin/next start -p 3000 &\nSERVER_PID=$!\n\n# Esperar a que levante\nsleep 3\n\n# Smoke de la page migrada (ajustar path según tu page)\ncurl -s -o /dev/null -w \"HTTP %{http_code}\\n\" http://localhost:3000/TU-RUTA\n# Espera: HTTP 200\n\n# Smoke de la raíz (sin basePath configurado: 200 / con basePath: 404)\ncurl -s -o /dev/null -w \"HTTP %{http_code}\\n\" http://localhost:3000/\n# Ajustar expectativa según tu config\n\n# Verificar que la page tiene contenido real (no loading spinner vacío)\ncurl -s http://localhost:3000/TU-RUTA | grep -c \"<main\\|<h1\\|<section\"\n\n# Cleanup\nkill $SERVER_PID\n```\n\n---\n\n## Checklist final del lab\n\n- [ ] Page migrada a server-rendered (`getServerSideProps` o `getStaticProps`)\n- [ ] Sin client-only fetching en `useEffect` para datos iniciales\n- [ ] `next/legacy/image` → `next/image` moderno (si aplica)\n- [ ] `alt` presente en todos los `<Image>`\n- [ ] Sin `console.log/error/warn`\n- [ ] `pnpm lint` — 0 errores\n- [ ] `pnpm build` — exit 0\n- [ ] Tests de la page — verdes, sin snapshots\n- [ ] Smoke `GET /TU-RUTA` = 200\n- [ ] Smoke raíz = comportamiento esperado según basePath\n\n---\n\n## Limpiar el worktree cuando terminás\n\n```bash\n# Desde la raíz del repo (no desde el worktree)\ngit worktree remove /private/tmp/wt-lab-next16\ngit branch -d feat/lab-next16-page-migration\n```\n\n> Volver al [inicio del curso](../README.md) · Ver [04 · Build + test + smoke](../04-build-test-smoke.md) para referencia de comandos.\n"}];</script>
