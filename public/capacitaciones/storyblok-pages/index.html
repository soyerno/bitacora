  <script>window.LESSONS = [{"id":"intro","num":"·","title":"Introducción","eyebrow":"Capacitación interactiva","file":"","md":"# Capacitación · Crear páginas Storyblok-managed en modo-landing\n\n> **Harness = agentes.** Este no es un manual para leer y olvidar. Es un curso que se hace **con Claude Code abierto**, donde cada paso lo guía y verifica un skill MODO. Vos seguís, Claude orquesta, los gates te dicen si está bien.\n>\n> Autor: Hernán De Souza · Sr AI Engineer · MODO\n\n---\n\n## Para quién\n\nDev frontend que se suma a modo-landing y necesita crear/editar páginas administradas por Storyblok: desde levantar el ambiente hasta dejar la página corriendo en un alpha de playsistemico, pasando por los gates de calidad reales del equipo.\n\n## Qué vas a saber hacer al terminar\n\n1. Levantar modo-landing local con auth a GitHub Packages y vars de Storyblok.\n2. Diseñar la página con SDD y el design system MODO antes de tocar código.\n3. Crear una **story** en Storyblok y wirear su **blok** al registry de React (`CMS_COMPONENTS`).\n4. Escribir el test **primero** (red→green→refactor, RTL semántico, sin snapshots).\n5. Pasar los 4 gates: **TDD · Code review + SDD · Performance + CSP · a11y + SEO/GEO**.\n6. Documentar y disparar un **deploy alpha** a develop/qa/preprod en playsistemico.\n\n## Cómo está organizado el pipeline real (mapa mental)\n\n```\nStoryblok story (slug = URL)\n        │ getServerSideProps  ── src/pages/[[...slug]].jsx\n        ▼\n   cdn/stories/<slug>  (SSR, resolve_relations)\n        │ story.content.body[]\n        ▼\n   DynamicCMSComponent ── getCMSComponent(element) ── src/CMS/utils/utils.tsx\n        │ lookup\n        ▼\n   CMS_COMPONENTS[element.component] ── src/CMS/utils/availableComponents.tsx\n        │ render\n        ▼\n   <CMSHeroPrimary> … blok React con @playsistemico/modo-ui-lib-web + tokens tailwind\n```\n\n**Crear una página = autorar la story + (si el blok no existe) crear el componente y registrarlo.**\n\n## Learning path\n\n| # | Lección | Skill harness | Gate que toca |\n|---|---------|---------------|---------------|\n| 00 | [Setup de ambiente](00-setup-ambiente.md) | `modo-team-onboarding`, `github-packages-auth` | — |\n| 01 | [Diseño: SDD + design system](01-diseno-sdd-design-system.md) | `sdd-*`, `modo-design-system` | SDD |\n| 02 | [Crear la página: story + blok](02-crear-pagina-storyblok.md) | `modo-storyblok` | — |\n| 03 | [TDD red→green](03-tdd-red-green.md) | `test-driven-development` | TDD |\n| 04 | [Gates de validación](04-gates-validacion.md) | `guardia`, `frontend-security-checklist`, `modo-seo-geo-audit` | Code review · Perf · CSP · a11y · SEO |\n| 05 | [Deploy alpha a playsistemico](05-deploy-alpha-playsistemico.md) | `modo-frontend-deploy`, `modo-frontend-onboarding` | — |\n| 🧪 | [Lab: blok SectionPromoBanner](exercises/README.md) | todos | los 4 |\n\n## Atajo: el agente orquestador\n\nSi ya entendés el flujo y querés que un agente lo maneje punta a punta:\n\n```\n/modo-landing-page-builder\n```\n\nTriple-layer skill que orquesta scaffold → TDD → gates (en paralelo) → deploy-alpha → verify. Internamente dispara el Workflow [`harness/page-builder.workflow.js`](harness/page-builder.workflow.js). Ver [`harness/gates.md`](harness/gates.md) para el criterio de cada gate.\n\n## Reglas del equipo que el curso respeta\n\n- **Sin `console.log/error/warn`** en prod.\n- **Sin snapshots** — RTL semántico o Playwright.\n- **Tokens del design system**, no hex hardcodeados.\n- **Tipos** en todos los props.\n- **Commits**: `type(SCOPE-XXX): Subject` (scope = Jira, ej. `COENXT-123`).\n- **SonarCloud**: 0 new smells, 0 hotspots, ≤3% duplicación.\n\n> Empezá por [00 · Setup de ambiente](00-setup-ambiente.md).\n"},{"id":"00","num":"00","title":"Setup de ambiente","eyebrow":"Lección 00 · Harness: onboarding + GH Packages","file":"00-setup-ambiente.md","md":"# 00 · Setup de ambiente\n\n> Objetivo: modo-landing corriendo en `localhost`, autenticado a GitHub Packages, leyendo Storyblok. Sin esto, nada de lo que sigue funciona.\n\n## Harness\n\n- `modo-team-onboarding` — si recién te sumás al ecosistema MODO con Claude Code, corré el onboarding para tener skills/MCPs/memoria al día.\n- `github-packages-auth` — inyecta el token de GH Packages cuando corrés `pnpm install/build`.\n\n## 1. Prerrequisitos\n\n| Qué | Versión | Cómo |\n|-----|---------|------|\n| Node | 22.22.2 | `nvm use 22.22.2` |\n| Package manager | pnpm | `corepack enable && corepack prepare pnpm@latest --activate` |\n| Token GH Packages | `read:packages` | en `~/.npmrc` (abajo) |\n\n> modo-landing es **Next.js 12** con TypeScript loose (`strict: false`). El dev server corre `node server.js`, no `next dev` pelado.\n\n## 2. `.npmrc` para `@playsistemico`\n\nLas libs internas (incluida `@playsistemico/modo-ui-lib-web`, el design system) viven en GitHub Packages. Necesitás un token con `read:packages`:\n\n```\n//npm.pkg.github.com/:_authToken=<TU_TOKEN>\n@playsistemico:registry=https://npm.pkg.github.com/\n```\n\nEl skill `github-packages-auth` lo inyecta automáticamente al correr pnpm. Manual:\n\n```bash\nexport NODE_AUTH_TOKEN=\"$(grep -m1 'npm.pkg.github.com/:_authToken=' ~/.npmrc | sed 's/.*_authToken=//')\"\n```\n\n## 3. Instalar + variables\n\n```bash\ncd modo-landing\npnpm install\ncp .env.example .env.local   # completá con valores reales (no inventes)\n```\n\nGrupos de vars en `.env.example`. Para **Storyblok** te importan:\n\n| Var | Para qué |\n|-----|----------|\n| `STORYBLOK_API_KEY` | token de lectura del space (Content Delivery API) |\n| `ISR_REVALIDATE_TOKEN` | revalidación de ISR (cuando aplica) |\n\n> El cliente Storyblok se inicializa en [`src/CMS/config.ts`](../../../) con `region: 'eu'`. **Verificá el region/space que te asignen**: si tu token es de un space en otra región, ajustá. El código productivo hoy usa `eu`; confirmá antes de autorar para no pegarle a un space equivocado.\n\n## 4. Levantar\n\n```bash\npnpm dev      # node server.js → http://localhost:3000\n```\n\nAbrí una ruta CMS conocida (ej. `/bancos`) para confirmar que trae contenido de Storyblok.\n\n## 5. Paridad con CI (importante)\n\n`pnpm dev` **no lintea**. Antes de pushear, reproducí lo que corre el Frontend CI:\n\n```bash\npnpm lint      # ESLint\npnpm build     # lint + next build → /dist\npnpm test      # Jest\n```\n\nSi `pnpm build` pasa local, el CI de build casi seguro pasa. Esto te evita el ciclo push→falla→fix.\n\n## Checklist de salida\n\n- [ ] `node -v` → 22.22.2\n- [ ] `pnpm install` sin errores de auth (`@playsistemico` resuelve)\n- [ ] `.env.local` con `STORYBLOK_API_KEY` real + region confirmado\n- [ ] `pnpm dev` levanta y una ruta CMS trae contenido\n- [ ] `pnpm build` verde local\n\n> Siguiente: [01 · Diseño: SDD + design system](01-diseno-sdd-design-system.md)\n"},{"id":"01","num":"01","title":"Diseño: SDD + design system","eyebrow":"Lección 01 · Harness: sdd-* + design system","file":"01-diseno-sdd-design-system.md","md":"# 01 · Diseño: SDD + design system\n\n> Objetivo: antes de tocar código, definir QUÉ página y CON QUÉ piezas. Spec primero, design system después.\n\n## Por qué diseñar antes\n\nUna página Storyblok no es \"tirar componentes\". Es decidir qué bloks la componen, qué datos consume cada uno, y qué comportamiento verificable tiene. SDD te obliga a escribir eso antes — y los gates de la lección 04 verifican contra esa spec.\n\n## Harness · SDD lifecycle\n\nEl ciclo SDD vive como skills encadenados. Para una página nueva:\n\n```\nsdd-explore   → mapear lo que ya existe (bloks reusables, páginas similares)\nsdd-propose   → intent + scope + approach\nsdd-design    → decisiones técnicas (qué bloks, datos, SSR vs estático)\nsdd-spec      → requirements + scenarios (GIVEN/WHEN/THEN) verificables\nsdd-tasks     → checklist de implementación\n```\n\nTodo vive en `openspec/changes/<tu-pagina>/`. Reglas del equipo:\n\n- Toda spec bajo `openspec/changes/<slug>/` — nunca `docs/specs` ni ad-hoc.\n- Tildá las tasks a medida que cerrás bloques (`sdd-track`), no todo al final.\n\n> Para /comercios y rutas sensibles el equipo exige SDD + TDD por task. Para una landing simple, un proposal + spec liviano alcanza — pero **siempre** hay spec.\n\n## Decidí: ¿blok nuevo o reusás?\n\nAntes de crear un componente, mirá el registry. Quizás ya existe el blok que necesitás:\n\n```bash\n# qué bloks hay disponibles\nsed -n '/export const CMS_COMPONENTS/,/^};/p' src/CMS/utils/availableComponents.tsx\n```\n\nBloks actuales (no exhaustivo): `HeroPrimary`, `HeroSecondary`, `SectionBannerWithImage`, `SectionBannerWithoutImage`, `SectionGrid`, `SectionRounded`, `SectionBannerIcon`, `SectionCarousel`, `SectionCarouselGroup`, `SectionDualInfo`, `SectionDualList`, `SectionVideo`, `SectionBankList`, `SectionBlog`, `SectionCollapsible`, `Download`, `Navbar`, `Footer`.\n\n**Regla:** si un blok existente cubre el caso, **reusalo** (solo autorás la story). Creás componente nuevo solo si ningún blok encaja.\n\n## Harness · design system MODO\n\nEl skill `modo-design-system` codifica las reglas de marca MODO para páginas SDK Next/Astro. Lo que importa para un blok:\n\n- Componentes base vienen de `@playsistemico/modo-ui-lib-web` (ej. `HeroPrimary`, `SectionDualVariants`). **No** reimplementes UI que la lib ya da.\n- Colores/tipografía: tokens en `tailwind.config.js` (paleta SDK MODO, Red Hat Display). **Nunca hex hardcodeado.**\n- El blok React es un **adaptador fino**: toma `data` de Storyblok y se la pasa al componente de la lib. Mirá [`src/CMS/components/CMSHeroPrimary/index.tsx`](../../../) — 30 líneas, mapea `data` → `<HeroPrimary>`.\n\n## Output de esta lección\n\n- `openspec/changes/<tu-pagina>/proposal.md` + `spec-delta.md` con scenarios verificables.\n- Lista de bloks: cuáles reusás, cuál(es) creás.\n- Para el blok nuevo: qué componente de `modo-ui-lib-web` lo respalda y qué campos de Storyblok consume.\n\n## Checklist de salida\n\n- [ ] Proposal + spec con scenarios GIVEN/WHEN/THEN\n- [ ] Decisión reusar-vs-crear por cada blok, justificada\n- [ ] Blok nuevo mapeado a un componente de `modo-ui-lib-web` + tokens (sin hex)\n\n> Siguiente: [02 · Crear la página: story + blok](02-crear-pagina-storyblok.md)\n"},{"id":"02","num":"02","title":"Crear la página: story + blok","eyebrow":"Lección 02 · Harness: modo-storyblok","file":"02-crear-pagina-storyblok.md","md":"# 02 · Crear la página: story + blok\n\n> Objetivo: la página existe en Storyblok (story) y, si lleva un blok nuevo, ese blok rinde en React. Esta es la lección central.\n\n## Harness\n\n- `modo-storyblok` — autoría de stories, schema de bloks, folder/startpage pattern, PUT vía MCP o curl JSON-RPC.\n\n## Parte A · La story en Storyblok\n\nUna **story** es la página. Su `full_slug` es la URL (`/promos/black-friday` → story con slug `promos/black-friday`). El campo clave es `content.body`: un array de bloks.\n\n```\nstory\n └─ content\n     ├─ seo[]            → CMSSEO (title, description, og)\n     ├─ seo_structured_data[]  → JSON-LD extra (bancos, service)\n     └─ body[]           → los bloks que se renderizan en orden\n         ├─ { component: \"HeroPrimary\", title, subtitle, ... }\n         ├─ { component: \"SectionGrid\", ... }\n         └─ ...\n```\n\nCada item de `body` tiene `component` (el nombre que matchea el registry), `_uid` y sus campos. **El `component` string es el contrato** entre Storyblok y React.\n\nCómo se trae (no lo escribís vos, pero entendelo) — [`src/pages/[[...slug]].jsx`](../../../):\n\n```js\nconst Storyblok = getStoryblok();\nconst { data } = await Storyblok.get(`cdn/stories/${slug}`, {\n  version: 'published',                 // 'draft' solo en low-env con ?preview=true\n  resolve_relations: storyblokResolveRelations,\n});\n// data.story.content.body[] → se mapea a componentes\n```\n\n> `version: 'published'` = la story tiene que estar **publicada** para verse en prod. En develop/qa con `?preview=true` se ve el draft.\n\n### Autorar con el harness\n\nCon `modo-storyblok` podés crear/editar la story por MCP o curl. Mínimo para una página:\n\n1. Crear la story con `full_slug` = tu ruta.\n2. Setear `content.body` con los bloks (cada uno con su `component` válido).\n3. Setear `content.seo[0]` (title/description) — la lección 04 lo audita.\n4. **Publicar**.\n\n> Folder + `is_startpage` child pattern: para una sección con subpáginas, creás un folder y la home del folder es la story `is_startpage`. Ver `modo-storyblok` para el detalle.\n\n## Parte B · El blok en React (solo si es nuevo)\n\nSi tu `body` usa un `component` que **no está** en el registry, `getCMSComponent` devuelve `undefined` y el blok no rinde. Hay que crearlo. Tres archivos + un registro.\n\n### Cómo se resuelve un blok\n\n[`src/CMS/utils/utils.tsx`](../../../):\n\n```ts\nexport const getCMSComponent = (element: IDefaultFields): JSX.Element | undefined => {\n  const component = CMS_COMPONENTS[element.component];   // lookup por nombre\n  if (component) return component(element);              // undefined si no existe\n};\n```\n\n### Anatomía de un blok (patrón canónico)\n\nMirá `CMSHeroPrimary` como molde. Un blok es un **adaptador fino**: `data` de Storyblok → componente de `modo-ui-lib-web`.\n\n`src/CMS/components/CMSMiBlok/types.ts`:\n```ts\nimport { IMiComponenteProps } from '@playsistemico/modo-ui-lib-web';\nimport { IDefaultFields } from '../../types';\n\nexport interface ICMSMiBlok extends IDefaultFields, Omit<IMiComponenteProps, 'className'> {\n  // campos que vienen de Storyblok\n  title: string;\n  ctaUrl?: string;\n}\n```\n\n`src/CMS/components/CMSMiBlok/index.tsx`:\n```tsx\nimport React from 'react';\nimport { MiComponente } from '@playsistemico/modo-ui-lib-web';\nimport { ICMSMiBlok } from './types';\n\ninterface Props {\n  data: ICMSMiBlok;\n}\n\nexport default function CMSMiBlok({ data }: Readonly<Props>) {\n  return (\n    <div className=\"cms-mi-blok\">\n      <MiComponente title={data.title} ctaUrl={data.ctaUrl} />\n    </div>\n  );\n}\n```\n\n### Registrar el blok (3 puntos, sino no rinde)\n\n1. **Tipo en la interface** — `src/CMS/types.ts`, agregá a `IAvailableComponents`:\n   ```ts\n   MiBlok: (data: ICMSMiBlok) => JSX.Element;\n   ```\n2. **Entrada en el registry** — `src/CMS/utils/availableComponents.tsx`:\n   ```ts\n   import CMSMiBlok from '../components/CMSMiBlok';\n   import { ICMSMiBlok } from '../components/CMSMiBlok/types';\n\n   export const CMS_COMPONENTS: IAvailableComponents = {\n     // ...existentes\n     MiBlok: (data: ICMSMiBlok) => <CMSMiBlok data={data} />,\n   };\n   ```\n3. **El `component` en Storyblok** debe ser exactamente `MiBlok` (case-sensitive). Mismatch silencioso = blok que no aparece.\n\n> ¿El blok necesita resolver una relación a otra story (referencia)? Agregá `MiBlok.reference` a `storyblokResolveRelations` en `src/CMS/constants/storyblok.ts`.\n\n## Trampa conocida · HMR / dev server zombie\n\nSi editás el blok y el browser sigue mostrando lo viejo sin actualizar, antes de culpar al código:\n\n```bash\nps aux | grep -E \"next dev|node server\" | grep -v grep\n```\n\nMás de un proceso o un path bajo `.claude/worktrees/agent-*` (borrado) = dev server zombie sirviendo bundle viejo. Matá por PID y relanzá `pnpm dev` desde la raíz.\n\n## Checklist de salida\n\n- [ ] Story creada con `full_slug`, `body[]`, `seo[0]` y **publicada**\n- [ ] Si blok nuevo: `index.tsx` + `types.ts` (adaptador fino sobre `modo-ui-lib-web`)\n- [ ] Registrado en los 3 puntos (interface + registry + `component` string exacto)\n- [ ] La ruta rinde el blok en `pnpm dev` (`?preview=true` para draft)\n\n> Siguiente: [03 · TDD red→green](03-tdd-red-green.md)\n"},{"id":"03","num":"03","title":"TDD red→green","eyebrow":"Lección 03 · Harness: test-driven-development","file":"03-tdd-red-green.md","md":"# 03 · TDD red→green\n\n> Objetivo: el blok tiene un test que falla primero (red), pasa con la implementación mínima (green) y queda verde tras refactor. **Gate TDD.**\n\n## Harness\n\n- `test-driven-development` — disciplina red→green→refactor.\n\n## La regla del equipo\n\n- **TDD obligatorio** cuando hay lógica condicional, reglas o cálculos (`if`, `map` con variantes, validaciones). Test primero.\n- **Test-after** aceptable para delegación trivial (un adaptador que solo pasa props). Pero el test **siempre existe**.\n- **Sin snapshots.** El equipo quiere eliminar los Jest snapshots. Usá RTL semántico (`getByRole`, `getByText`) o Playwright. No propongas `toMatchSnapshot`.\n\n## El ciclo\n\n```\nRED    → escribí un test que falle (la feature no existe todavía)\nGREEN  → mínimo código para que pase\nREFACTOR → mejorá sin romper; el test queda verde\n```\n\n**Nunca saltees el red.** Si el test pasa en la primera corrida, no está probando nada nuevo.\n\n## Para un blok CMS\n\nUn blok adaptador fino (solo pasa props) → test-after liviano: que rinde el contenido esperado. Un blok con lógica (mapea variantes, condiciona por `data`, arma listas) → TDD real.\n\n### RED — test primero (RTL semántico)\n\n`src/CMS/components/CMSMiBlok/CMSMiBlok.test.tsx`:\n```tsx\nimport { render, screen } from '@testing-library/react';\nimport CMSMiBlok from './index';\n\ndescribe('CMSMiBlok', () => {\n  it('renderiza el título que viene de Storyblok', () => {\n    const data = { component: 'MiBlok', _uid: '1', _editable: '', title: 'Black Friday' };\n    render(<CMSMiBlok data={data} />);\n    expect(screen.getByText('Black Friday')).toBeInTheDocument();\n  });\n\n  it('muestra el CTA solo cuando hay ctaUrl', () => {\n    const data = { component: 'MiBlok', _uid: '2', _editable: '', title: 'X', ctaUrl: '/promos' };\n    render(<CMSMiBlok data={data} />);\n    expect(screen.getByRole('link', { name: /promos/i })).toHaveAttribute('href', '/promos');\n  });\n});\n```\n\nCorré y mirá fallar:\n```bash\nnpx jest src/CMS/components/CMSMiBlok --watch\n# o, por el passthrough de pnpm (ojo, \"pnpm test -- --testPathPattern\" se come el flag):\npnpm test:specific -t \"CMSMiBlok\"\n```\n\n> Trampa de flags: `pnpm test -- --testPathPattern=` no pasa bien el flag. Usá `npx jest <path>` o `pnpm test:specific`.\n\n### GREEN — implementación mínima\n\nEl blok de la lección 02. Lo justo para que los dos tests pasen. Nada más.\n\n### REFACTOR\n\nExtraé un `useMemo` si mapeás listas (como hace `CMSHeroPrimary` con `pills`), limpiá nombres. Los tests siguen verdes.\n\n## Deriva los casos de la spec\n\nLos scenarios GIVEN/WHEN/THEN de tu `spec-delta.md` (lección 01) son tus casos de test. Un scenario = al menos un `it(...)`. Si un scenario no tiene test, el gate SDD de la lección 04 lo marca.\n\n## Qué NO testear (no infles coverage)\n\n- Adaptadores 1:1 sin transformación (cubierto por el render test).\n- Que React renderice (eso lo prueba React).\n- Snapshots (prohibidos).\n\n## Checklist de salida\n\n- [ ] Test escrito **antes** de la implementación, visto fallar (red)\n- [ ] Implementación mínima → verde\n- [ ] RTL semántico (`getByRole`/`getByText`), **sin snapshots**\n- [ ] Cada scenario de la spec tiene su `it(...)`\n- [ ] `pnpm test` verde\n\n> Siguiente: [04 · Gates de validación](04-gates-validacion.md)\n"},{"id":"04","num":"04","title":"Gates de validación","eyebrow":"Lección 04 · Harness: guardia · security · seo-geo","file":"04-gates-validacion.md","md":"# 04 · Gates de validación\n\n> Objetivo: la página/blok pasa los 4 gates antes de cualquier deploy. Un gate rojo bloquea. Sin \"ya lo arreglo después\".\n\nEsta lección es la que el Workflow [`harness/page-builder.workflow.js`](harness/page-builder.workflow.js) corre en paralelo. Acá lo hacés a mano para entender cada uno. Criterio completo en [`harness/gates.md`](harness/gates.md).\n\n## Gate 1 · TDD red→green\n\nYa cubierto en la [lección 03](03-tdd-red-green.md). Criterio: test escrito primero, `pnpm test` verde, sin snapshots, cada scenario de la spec con su `it`.\n\n```bash\npnpm test\n```\n\n## Gate 2 · Code review + SDD\n\n**Harness:** `guardia` (review paralelo multi-subagente) + SonarCloud MCP + `sdd-verify`.\n\n```\n/guardia            # review completo del PR (Sonar, tests, React, security, CI, bundle)\n```\n\nCriterio:\n- SonarCloud Quality Gate: **0 new smells, 0 hotspots, ≤3% duplicación**.\n- Sin `console.log/error/warn` en código de prod.\n- Sin hex hardcodeado (tokens del design system).\n- Tipos en todos los props.\n- `sdd-verify`: implementación matchea spec + tasks tildadas.\n\n> Sonar corre en olas: un fix puede activar otra regla. No declares \"done\" sin esperar el scan completo.\n\n## Gate 3 · Performance + CSP\n\n**Harness:** `chrome-devtools` (`lighthouse_audit`) + `frontend-security-checklist` (Layer 3, CSP post-deploy).\n\n### Performance\n```\n# con chrome-devtools MCP, contra la ruta local o el alpha:\nlighthouse_audit  → LCP, CLS, TBT\n```\nCriterio: LCP y CLS dentro de umbral. **Trampa modo-landing:** los bloks se rinden con `dynamic({ ssr:false })` ([`[[...slug]].jsx`](../../../) `DynamicCMSComponent`). Si tu blok es el LCP (hero), el `ssr:false` lo empeora — evaluá `priority`/SSR para el hero. No metas imágenes pesadas sin AVIF/`quality` ajustado.\n\n### CSP\n```\n/modo-security-csp   # o frontend-security-checklist Layer 3\n```\nCriterio: CSP/security headers OK contra el edge live. Si tu blok carga assets de un dominio nuevo (CDN, fonts, media), agregalo a la directiva CSP correcta en `next.config.js`. Ojo con `data:`/`media-src` si usás Lottie/Remotion.\n\n> Si tocaste `next.config.js` CSP o `headers()`, validá con Layer 3 contra el ambiente después del deploy.\n\n## Gate 4 · a11y + SEO/GEO\n\n**Harness:** `modo-seo-geo-audit` + checklist WCAG.\n\n### a11y\nCriterio: sin barreras WCAG. Imágenes con `alt` descriptivo (**nunca `alt=\"\"`**), roles correctos, foco navegable, contraste con tokens MODO.\n\n### SEO/GEO\n```\n/modo-seo-geo-audit\n```\nCriterio:\n- `content.seo[0]` con title/description → lo rinde `CMSSEO`.\n- JSON-LD válido (Rich Results). El catch-all ya inyecta breadcrumb + FAQ (de `SectionCollapsible`) + structured data extra. Si tu página es de un tipo nuevo (Service, Collection), seguí el patrón de `buildExtraStructuredData` en [`[[...slug]].jsx`](../../../).\n- **URL-as-state**: si la página tiene filtros/categorías, cada estado debe ser una URL compartible e indexable.\n\n## Orden recomendado\n\n```\n1. TDD          (local, rápido)         → pnpm test\n2. Code review  (PR)                    → /guardia\n3. a11y + SEO   (local/PR)              → /modo-seo-geo-audit\n4. Perf + CSP   (contra alpha, lección 05) → lighthouse + Layer 3\n```\n\nPerf y CSP rinden mejor contra un ambiente desplegado → se cierran junto con el deploy alpha de la lección 05.\n\n## Atajo: todos en paralelo\n\n```\n/modo-landing-page-builder    # corre el Workflow: gates en paralelo + barrier pre-deploy\n```\n\n## Checklist de salida\n\n- [ ] `pnpm test` verde (TDD)\n- [ ] `/guardia` + Sonar Quality Gate verde · `sdd-verify` OK\n- [ ] Lighthouse dentro de umbral · CSP/headers OK\n- [ ] a11y sin barreras · JSON-LD válido · SEO ok\n\n> Siguiente: [05 · Deploy alpha a playsistemico](05-deploy-alpha-playsistemico.md)\n"},{"id":"05","num":"05","title":"Deploy alpha a playsistemico","eyebrow":"Lección 05 · Harness: modo-frontend-deploy","file":"05-deploy-alpha-playsistemico.md","md":"# 05 · Deploy alpha a playsistemico\n\n> Objetivo: tu cambio corriendo en un ambiente alpha (develop/qa/preprod) de la infra MODO, listo para verificar perf+CSP contra el edge.\n\n## Harness\n\n- `modo-frontend-deploy` — ejecuta el runbook de publicación k8s paso a paso.\n- `modo-frontend-onboarding` — solo si el front es **nuevo** en playsistemico (no es el caso de modo-landing, que ya está montado).\n\n## modo-landing ya está en la plataforma\n\nmodo-landing ya tiene su infra (helm, parameters SOPS, workflows reusables de `playsistemico/workflows`). Para una página/blok nuevo **no** abrís tickets de provisioning ni tocás helm. Solo disparás un alpha.\n\n> Si alguna vez subís un front **nuevo** a playsistemico, ahí sí aplica `modo-frontend-onboarding` (6 tickets JSM canónicos, helm/catalog/parameters clonando promos-hub). Está fuera del alcance de esta capacitación.\n\n## El deploy alpha\n\nEs un workflow manual: [`.github/workflows/ci-alpha.yaml`](../../../). `workflow_dispatch` con un input `environment`:\n\n```yaml\non:\n  workflow_dispatch:\n    inputs:\n      environment:\n        type: choice\n        options: [develop, qa, preprod]\njobs:\n  ci:\n    uses: playsistemico/workflows/.github/workflows/ci-ms.yaml@v1\n    with:\n      alpha: true\n      node-version: '22'\n```\n\nDispararlo desde tu rama:\n\n```bash\n# desde la rama del PR, elegí el ambiente\ngh workflow run ci-alpha.yaml -f environment=develop --ref <tu-rama>\n\n# seguir la corrida\ngh run list --workflow=ci-alpha.yaml --limit 3\ngh run watch <run-id>\n```\n\n> El flujo normal de modo-landing: push a `main` auto-deploya a develop+QA. Preprod y prod son workflows manuales. El **alpha** te deja probar tu rama sin mergear.\n\n## Cómo se configura el runtime (contexto)\n\nNo lo tocás para una página, pero saber cómo funciona evita sustos:\n\n1. **Imagen** = `modo-base:<ver>-node22` + tu código, arranca con `entrypoint.sh` (`exec` para que SIGTERM llegue a node).\n2. **Config runtime** = SOPS (`parameters/<env>/*.yaml`) → workflow `ssm-sops.yaml` → AWS SSM → `entrypoint.sh` la baja al boot. Acá viven `STORYBLOK_API_KEY` y demás por ambiente.\n3. **Deploy** = workflows reusables `ci-ms.yaml`/`cd-ms.yaml` que traen el Helm chart compartido. Tu repo solo aporta `helm/values.yaml`.\n\nDetalle completo: [`docs/runbook-publish-modo-frontend-k8s.md`](../../../) en modo-landing + skill `modo-frontend-deploy`.\n\n## Verificá en el alpha\n\nUna vez desplegado, cerrá los gates que rinden mejor contra el edge (lección 04):\n\n```bash\n# smoke de la ruta\ncurl -fsS -o /dev/null -w '%{http_code}\\n' https://<alpha-host>/<tu-slug>   # 200\n\n# perf + CSP contra el ambiente\nlighthouse_audit  https://<alpha-host>/<tu-slug>\n/modo-security-csp https://<alpha-host>\n```\n\nEl skill `modo-landing-smoke-test` valida rutas clave por ambiente y compara prod vs preprod si necesitás cazar regresiones.\n\n## ⚠️ Prod NO\n\nEsta capacitación llega hasta alpha. Promover a prod es decisión del equipo + gate GRC (`modo-stakeholder-gate`, ticket OFFSEC). **Nunca dispares prod desde el curso.**\n\n## Checklist de salida\n\n- [ ] `ci-alpha.yaml` disparado en develop/qa/preprod desde tu rama\n- [ ] Run verde\n- [ ] Smoke 200 en tu ruta\n- [ ] Perf + CSP cerrados contra el alpha\n\n> Cerraste el flujo. Ahora hacé el [🧪 Lab](exercises/README.md) para fijarlo, o dejá que el agente lo orqueste con `/modo-landing-page-builder`.\n"},{"id":"lab","num":"🧪","title":"Lab: SectionPromoBanner","eyebrow":"Lab integrador · los 4 gates","file":"","md":"# 🧪 Lab · Blok `SectionPromoBanner`\n\n> Ejercicio integrador. Construís un blok nuevo de punta a punta y le pasás los 4 gates. La solución de referencia está en [`solution/`](solution/) — no la mires hasta intentarlo.\n\n## El pedido (la spec)\n\nMarketing quiere un banner de promo configurable desde Storyblok para usar en varias landings. Comportamiento:\n\n1. Muestra un **título** y un **subtítulo** (ambos de Storyblok).\n2. Muestra una **lista de beneficios** (`items[]`), cada uno con texto.\n3. Muestra un **CTA** (botón con texto + URL) **solo si** `ctaUrl` está seteado. Si no, no hay botón.\n4. Acepta una variante de color (`variant: 'primary' | 'secondary'`) usando **tokens del design system** (sin hex).\n\n> Tiene lógica condicional (CTA) y mapeo de lista → **TDD obligatorio** (lección 03).\n\n## Tu trabajo\n\nSeguí el flujo completo del curso:\n\n### 1. Diseño (lección 01)\nEscribí la mini-spec: scenarios GIVEN/WHEN/THEN para cada punto del comportamiento. Decidí qué componente de `@playsistemico/modo-ui-lib-web` respalda el banner (o un `<section>` propio con tokens si no hay uno que encaje).\n\n### 2. RED — test primero (lección 03)\n`src/CMS/components/CMSSectionPromoBanner/CMSSectionPromoBanner.test.tsx`. Mínimo:\n- renderiza título y subtítulo\n- renderiza N items\n- **muestra CTA cuando hay `ctaUrl`**\n- **NO muestra CTA cuando falta `ctaUrl`**\n\nCorré, vela fallar.\n\n### 3. GREEN — el blok (lección 02)\n- `types.ts` — interface extendiendo `IDefaultFields`.\n- `index.tsx` — adaptador fino, condicional del CTA, `useMemo` para los items.\n- Registrá en los **3 puntos**: `IAvailableComponents` (types.ts), `CMS_COMPONENTS` (availableComponents.tsx), y el `component: \"SectionPromoBanner\"` en la story.\n\n### 4. La story (lección 02)\nCreá una story de prueba (ej. slug `lab/promo-banner`) con un `body` que use tu blok. Publicá (o `?preview=true` en develop). Confirmá que rinde en `pnpm dev`.\n\n### 5. Gates (lección 04)\n- `pnpm test` verde\n- `/guardia` — 0 smells, sin `console.*`, sin hex, tipos OK\n- `/modo-seo-geo-audit` — `alt` descriptivo, JSON-LD si aplica\n- Lighthouse + CSP contra el alpha (lección 05)\n\n### 6. Deploy alpha (lección 05) — opcional\n`gh workflow run ci-alpha.yaml -f environment=develop --ref <tu-rama>`, smoke 200.\n\n## Criterio de aprobado\n\n- [ ] Test escrito antes, visto fallar, luego verde\n- [ ] CTA condicional cubierto por test (los dos caminos)\n- [ ] Blok registrado en los 3 puntos · rinde en dev\n- [ ] Sin hex (tokens) · sin `console.*` · tipos en props · `alt` descriptivo\n- [ ] Los 4 gates verdes\n\n## Atajo\n\n```\n/modo-landing-page-builder\n```\nDejá que el agente orqueste el flujo y compará con lo que hiciste a mano.\n\n> Solución de referencia: [`solution/`](solution/).\n"},{"id":"solucion","num":"✅","title":"Solución del lab","eyebrow":"Lab · solución de referencia","file":"","md":"# Solución de referencia · `SectionPromoBanner`\n\nMirá esto **después** de intentar el lab. Compará con lo tuyo.\n\n## Archivos\n\n| Archivo | Va a (en modo-landing) | Qué muestra |\n|---------|------------------------|-------------|\n| `types.ts` | `src/CMS/components/CMSSectionPromoBanner/types.ts` | interface extendiendo `IDefaultFields` |\n| `index.tsx` | `src/CMS/components/CMSSectionPromoBanner/index.tsx` | adaptador fino + CTA condicional + `useMemo` |\n| `CMSSectionPromoBanner.test.tsx` | mismo dir | RTL semántico, 4 tests, sin snapshots |\n| `registry-snippet.md` | — | los 3 puntos de registro |\n| `story.json` | Storyblok (no es archivo del repo) | story de prueba con 2 bloks (con y sin CTA) |\n\n## Decisiones de la solución\n\n- **CTA condicional con `&&`** sobre `ctaUrl` — el scenario \"NO muestra CTA\" lo verifica con `queryByRole('link')` + `not.toBeInTheDocument()`.\n- **`useMemo` para `items`** — mismo patrón que `CMSHeroPrimary` con `pills`.\n- **Variante por mapa de clases token** (`VARIANT_CLASS`), no `style={{ background: '#...' }}`. Las clases `bg-sdk-*` son ilustrativas: reemplazalas por los tokens reales de `tailwind.config.js`.\n- **Sin `console.*`**, tipos en todo, `key` estable en la lista.\n\n## Por qué pasa los gates\n\n- **TDD**: 4 tests, los dos caminos del condicional, escritos antes (lo demostrás vos en RED).\n- **Code review**: sin smells obvios, sin hex, tipos completos, sin `console`.\n- **a11y**: `<h2>`, `<ul>/<li>`, link real con texto descriptivo. Si agregás imagen → `alt`.\n- **Perf**: componente liviano, sin imágenes pesadas; si fuera hero, evaluar SSR.\n\n## Lo que falta (a propósito)\n\nLa solución no incluye el `alt` de imágenes (el banner no tiene imagen) ni JSON-LD (no es un tipo schema.org puntual). Si tu variante del lab agrega imagen o es un tipo indexable, sumá `alt` descriptivo y seguí el patrón `buildExtraStructuredData` del catch-all.\n\n\n---\n\n## Código completo\n\n### types.ts\n\n```ts\n// SOLUCIÓN DE REFERENCIA — src/CMS/components/CMSSectionPromoBanner/types.ts\n// (vive en modo-landing; acá es material del lab)\n\nimport { IDefaultFields } from '../../types';\n\nexport interface IPromoItem {\n  text: string;\n}\n\nexport interface ICMSSectionPromoBanner extends IDefaultFields {\n  title: string;\n  subtitle?: string;\n  items?: IPromoItem[];\n  ctaText?: string;\n  ctaUrl?: string;\n  variant?: 'primary' | 'secondary';\n}\n```\n\n### index.tsx\n\n```tsx\n// SOLUCIÓN DE REFERENCIA — src/CMS/components/CMSSectionPromoBanner/index.tsx\n//\n// Adaptador fino: data de Storyblok → UI con tokens del design system.\n// NOTA: las clases de color (bg-sdk-*) son ilustrativas — usá los tokens REALES\n// definidos en tailwind.config.js de modo-landing. Nunca hex hardcodeado.\n// Si existe un componente de @playsistemico/modo-ui-lib-web que encaje, preferilo\n// sobre este <section> propio.\n\nimport React, { useMemo } from 'react';\nimport { ICMSSectionPromoBanner } from './types';\n\ninterface Props {\n  data: ICMSSectionPromoBanner;\n}\n\nconst VARIANT_CLASS: Record<NonNullable<ICMSSectionPromoBanner['variant']>, string> = {\n  primary: 'bg-sdk-primary text-sdk-on-primary',\n  secondary: 'bg-sdk-secondary text-sdk-on-secondary',\n};\n\nexport default function CMSSectionPromoBanner({ data }: Readonly<Props>) {\n  const { title, subtitle, items, ctaText, ctaUrl, variant = 'primary' } = data;\n\n  const itemList = useMemo(\n    () => (items ?? []).map((item, i) => <li key={`${item.text}-${i}`}>{item.text}</li>),\n    [items]\n  );\n\n  return (\n    <section className={`cms-promo-banner ${VARIANT_CLASS[variant]}`}>\n      <h2>{title}</h2>\n      {subtitle && <p>{subtitle}</p>}\n      {itemList.length > 0 && <ul>{itemList}</ul>}\n      {ctaUrl && (\n        <a href={ctaUrl} className=\"cms-promo-banner__cta\">\n          {ctaText ?? 'Ver más'}\n        </a>\n      )}\n    </section>\n  );\n}\n```\n\n### CMSSectionPromoBanner.test.tsx\n\n```tsx\n// SOLUCIÓN DE REFERENCIA — src/CMS/components/CMSSectionPromoBanner/CMSSectionPromoBanner.test.tsx\n//\n// RTL semántico, sin snapshots. Cada scenario de la spec = un it().\n\nimport { render, screen } from '@testing-library/react';\nimport CMSSectionPromoBanner from './index';\nimport { ICMSSectionPromoBanner } from './types';\n\nconst base: ICMSSectionPromoBanner = {\n  component: 'SectionPromoBanner',\n  _uid: 'lab-1',\n  _editable: '',\n  title: 'Black Friday',\n};\n\ndescribe('CMSSectionPromoBanner', () => {\n  it('renderiza título y subtítulo de Storyblok', () => {\n    render(<CMSSectionPromoBanner data={{ ...base, subtitle: 'Hasta 40% off' }} />);\n    expect(screen.getByRole('heading', { name: 'Black Friday' })).toBeInTheDocument();\n    expect(screen.getByText('Hasta 40% off')).toBeInTheDocument();\n  });\n\n  it('renderiza la lista de beneficios', () => {\n    render(\n      <CMSSectionPromoBanner\n        data={{ ...base, items: [{ text: 'Envío gratis' }, { text: 'Cuotas sin interés' }] }}\n      />\n    );\n    expect(screen.getAllByRole('listitem')).toHaveLength(2);\n    expect(screen.getByText('Cuotas sin interés')).toBeInTheDocument();\n  });\n\n  it('muestra el CTA cuando hay ctaUrl', () => {\n    render(<CMSSectionPromoBanner data={{ ...base, ctaText: 'Ver promos', ctaUrl: '/promos' }} />);\n    expect(screen.getByRole('link', { name: 'Ver promos' })).toHaveAttribute('href', '/promos');\n  });\n\n  it('NO muestra el CTA cuando falta ctaUrl', () => {\n    render(<CMSSectionPromoBanner data={base} />);\n    expect(screen.queryByRole('link')).not.toBeInTheDocument();\n  });\n});\n```\n\n# Registro del blok — los 3 puntos\n\nSin estos 3, el blok no rinde (`getCMSComponent` devuelve `undefined`).\n\n## 1 · Tipo en la interface — `src/CMS/types.ts`\n\n```ts\nimport { ICMSSectionPromoBanner } from './components/CMSSectionPromoBanner/types';\n\nexport interface IAvailableComponents {\n  // ...existentes\n  SectionPromoBanner: (data: ICMSSectionPromoBanner) => JSX.Element;\n}\n```\n\n## 2 · Entrada en el registry — `src/CMS/utils/availableComponents.tsx`\n\n```ts\nimport CMSSectionPromoBanner from '../components/CMSSectionPromoBanner';\nimport { ICMSSectionPromoBanner } from '../components/CMSSectionPromoBanner/types';\n\nexport const CMS_COMPONENTS: IAvailableComponents = {\n  // ...existentes\n  SectionPromoBanner: (data: ICMSSectionPromoBanner) => <CMSSectionPromoBanner data={data} />,\n};\n```\n\n## 3 · El `component` en la story (Storyblok)\n\nEl blok del `body` debe tener `component: \"SectionPromoBanner\"` — **exacto, case-sensitive**. Ver `story.json`.\n\n> No resuelve relaciones a otras stories → no hace falta tocar `storyblokResolveRelations`.\n\n\n### story.json\n\n```json\n{\n  \"_comment\": \"Story de prueba para el lab. Crear vía modo-storyblok (MCP o curl). full_slug = lab/promo-banner → ruta /lab/promo-banner. Publicar (o ?preview=true en develop).\",\n  \"story\": {\n    \"name\": \"Lab Promo Banner\",\n    \"slug\": \"promo-banner\",\n    \"full_slug\": \"lab/promo-banner\",\n    \"content\": {\n      \"component\": \"page\",\n      \"seo\": [\n        {\n          \"component\": \"Seo\",\n          \"title\": \"Lab · Promo Banner\",\n          \"description\": \"Página de prueba del lab de la capacitación Storyblok.\"\n        }\n      ],\n      \"body\": [\n        {\n          \"component\": \"SectionPromoBanner\",\n          \"_uid\": \"promo-1\",\n          \"title\": \"Black Friday MODO\",\n          \"subtitle\": \"Aprovechá los descuentos pagando con MODO\",\n          \"variant\": \"primary\",\n          \"items\": [\n            { \"text\": \"Hasta 40% de descuento\" },\n            { \"text\": \"Cuotas sin interés\" },\n            { \"text\": \"Reintegro en tu cuenta\" }\n          ],\n          \"ctaText\": \"Ver promos\",\n          \"ctaUrl\": \"/promos\"\n        },\n        {\n          \"component\": \"SectionPromoBanner\",\n          \"_uid\": \"promo-2\",\n          \"title\": \"Sin CTA\",\n          \"subtitle\": \"Este banner no define ctaUrl, así que no muestra botón\",\n          \"variant\": \"secondary\"\n        }\n      ]\n    }\n  }\n}\n```\n"},{"id":"gates","num":"⚙","title":"Harness: los 4 gates","eyebrow":"Referencia del Workflow","file":"","md":"# Harness · Los 4 gates\n\nReferencia ejecutable de [`page-builder.workflow.js`](page-builder.workflow.js). Cada gate retorna `{ gate, passed, findings, evidence }`. **El deploy alpha es un barrier: solo procede si todos `passed`.** Sin evidencia ≠ passed.\n\n| Gate | Skill / herramienta | Comando | Passed cuando | Evidencia |\n|------|---------------------|---------|---------------|-----------|\n| **TDD** | `test-driven-development` | `pnpm test` · `npx jest <path>` | test escrito antes (red visto), verde ahora, RTL semántico, **sin snapshots**, scenario↔it | salida jest + commit del test previo |\n| **Code review + SDD** | `guardia` + SonarCloud + `sdd-verify` | `/guardia` | 0 smells, 0 hotspots, ≤3% dup, sin `console.*`, sin hex, tipos; spec↔código; tasks tildadas | link Quality Gate + reporte |\n| **Performance + CSP** | `chrome-devtools` + `frontend-security-checklist` L3 | `lighthouse_audit <url>` · `/modo-security-csp` | LCP/CLS en umbral; CSP/headers OK; blok no es LCP con `ssr:false` | reporte lighthouse + validador CSP |\n| **a11y + SEO/GEO** | `modo-seo-geo-audit` | `/modo-seo-geo-audit` | sin barreras WCAG (alt, roles, foco, contraste); `seo[0]`; JSON-LD válido; URL-as-state | reporte audit + Rich Results |\n\n## Correr el Workflow\n\n```\n# vía el skill (recomendado)\n/modo-landing-page-builder\n\n# o directo con la tool Workflow, pasando args:\nWorkflow({\n  scriptPath: \".../harness/page-builder.workflow.js\",\n  args: {\n    repoPath: \"/ruta/modo-landing\",\n    slug: \"promos/black-friday\",\n    blok: \"SectionPromoBanner\",\n    alphaUrl: null,           // o \"https://<alpha-host>/promos/black-friday\"\n    prNumber: null            // o el número de PR\n  }\n})\n```\n\n## Flujo del Workflow\n\n```\nTDD ─► Gates (3 en paralelo) ─► Barrier ─► Eval (LLM-judge) ─► Deploy (gates+eval ok)\n                                  │              │\n                         failed>0 → blocked   under-threshold → blocked (fix + re-correr)\n```\n\n- **TDD** corre primero (gate liviano, local).\n- **Gates** (code-review+SDD ‖ perf+CSP ‖ a11y+SEO) corren en `parallel()` — barrier natural.\n- **Barrier** consolida. Si algún `passed:false` → `status: \"blocked\"` con findings + evidencia. NO deploy.\n- **Eval** (capa 6.5): un LLM-judge puntúa el **entregable** 1-5 por dimensión de la rúbrica MODO. Pass/fail dice \"¿pasa?\"; el eval dice \"¿cuán bien quedó?\".\n- **Deploy** solo **prepara** el comando alpha (no lo dispara sin confirmación). Prod siempre fuera.\n\n## El eval del entregable (capa 6.5)\n\nLos gates son binarios; el eval **puntúa calidad** en lo que el binario no ve. Rúbrica (1-5, `parallel()` un judge por dimensión, schema `EVAL_SCHEMA`):\n\n| Dimensión | Mide | `blocking` si… |\n|---|---|---|\n| `brand-voice` | copy en voz MODO + tokens/fidelidad de marca | hex hardcodeado o copy fuera de voz |\n| `ux-clarity` | jerarquía, flujo, carga cognitiva, mobile | hay una barrera de uso real |\n| `content-seo-quality` | calidad del contenido + completitud SEO/GEO | falta JSON-LD o metadata core |\n| `simplicity-scope` | mínimo que resuelve, diff quirúrgico (Principio 2) | un senior lo llamaría sobre-complicado |\n\n**Barrier del eval**: deploy solo si **cada dimensión ≥ 3 Y promedio ≥ 4**. Si no → `status: \"blocked\"` con los blockers + razones (los gates pasaron, pero la calidad no llega).\n\n> Calibración (Lección 10): comparar el score del eval contra tu veredicto humano 1-5. Cuando divergen, ahí está el aprendizaje. Para review adversarial más duro, cambiá el judge plano por el skill `judgment-day` (dual blind) o los agents `review-risk/readability/reliability/resilience`.\n\n## Por qué evidencia obligatoria\n\n`feedback_no_mentir_pedir_help`: no se declara un gate verde sin la salida del comando / link / verify-grep que lo prueba. Un gate \"passed\" sin `evidence` es prosa, no un veredicto.\n"},{"id":"orden","num":"🧭","title":"Orden óptimo del harness","eyebrow":"Referencia · idea→diseño→evaluación→integración","file":"","md":"# 🧭 Orden óptimo del harness\n\n> Las lecciones 00→05 te dieron las herramientas. Esta las **ordena** en un flujo: **idea → diseño → evaluación → integración**. Lo importante: el **diseño se resuelve con Claude** (no solo el código), y la integración es lo **último** — recién cuando el diseño está evaluado y aprobado. Fundamentado en las prácticas oficiales de Anthropic para Claude Code.\n\n## La columna vertebral: idea → diseño → evaluación → integración\n\n```\nIDEA            DISEÑO                 EVALUACIÓN            INTEGRACIÓN\nqué querés  →   con Claude Design  →   revisión/crítica  →  recién acá: código\n(brief)         + agents de diseño     del diseño            (story+blok, TDD, gates, deploy)\n                ANTES de codear        (gate de diseño)\n```\n\nLa trampa más común es saltar de la idea directo a la integración (“abro Storyblok y empiezo a tirar bloks”). Anthropic lo nombra explícito: *explorar y planear antes de codear* evita resolver el problema equivocado ([Claude Code best practices](https://code.claude.com/docs/en/best-practices)). Acá el **diseño es esa fase de planeo** — y la hacés con Claude, no a mano.\n\n## Diseñá con Claude, no solo codees con Claude\n\nLa invitación de este curso: resolvé el **diseño** apoyándote en agents/skills de diseño de Claude, con foco de marca, UX y frontend. Los agents MODO dedicados ya existen (`~/.claude/agents/`):\n\n| Agent | De qué es dueño |\n|----------------|--------------------|\n| `modo-branding` | Identidad de marca: paleta, tipografía, tono, consistencia con el sistema MODO |\n| `modo-ux` | Arquitectura de información, flujos, jerarquía, accesibilidad, copy UX |\n| `modo-frontend` | Traducción diseño→componentes: qué bloks, layout responsive, performance |\n\n> **Entrenados (2026-06-17).** Los agents `modo-branding`, `modo-ux` y `modo-frontend` ya existen en `~/.claude/agents/`, aterrizados en las reglas reales de `modo-landing` (branding oficial, `src/CMS/`, bloks reales). Se apoyan en el skill **`modo-design-system`** (reglas de marca) y en **`impeccable`** / **`ui-ux-pro-max`** (diseño/UX). El panel de evaluación es **`modo-design-review`** y el orquestador full es **`modo-page-pipeline`**.\n\n## El principio que ordena todo: el context window\n\nLa restricción base de Claude Code es el **context window**: se llena rápido y el rendimiento cae a medida que se llena. De ahí se derivan: **skills on-demand** (no meter todo en `CLAUDE.md`), **subagentes para investigar** (leer muchos archivos en contexto aparte) y **`/clear` entre fases**. Base: *Claude Code 101* y *Claude Code in Action* en [Anthropic Academy](https://anthropic.skilljar.com/).\n\n## La secuencia óptima, fase por fase\n\nCada fila mapea a un principio nombrado de Anthropic. Fijate que **integración** (fila 8 en adelante) no arranca hasta que el diseño pasó su evaluación.\n\n| Macro | Fase | Harness MODO | Principio Anthropic |\n|-------|------|--------------|---------------------|\n| **Idea** | 0 · Brief | `AskUserQuestion` (que Claude te entreviste) | *Let Claude interview you* → spec self-contained |\n| **Idea** | 1 · Ambiente (una vez) | `modo-team-onboarding`, `github-packages-auth`, `CLAUDE.md` | *Configure your environment* |\n| **Diseño** | 2 · Explorar | `sdd-explore` | *Explore first, then plan, then code* |\n| **Diseño** | 3 · Diseñar con Claude | agents `modo-branding` / `modo-ux` / `modo-frontend` + apoyo `modo-design-system`, `impeccable`, `ui-ux-pro-max` | *Reference existing patterns* |\n| **Evaluación** | 4 · Criticar el diseño | revisión adversarial del diseño: Brand Guardian + Accessibility Auditor + `impeccable` en contexto fresco | *Add an adversarial review step* aplicado al **diseño**, no solo al código |\n| **Evaluación** | 5 · Formalizar | `sdd-propose` · `sdd-design` · `sdd-spec` · `sdd-tasks` | *Explore→plan→code* (la spec es el contrato) |\n| **Evaluación** | — | **Gate de diseño**: ¿aprobado? Si no, volvé a la fase 3. | *Give Claude a way to verify its work* |\n| **Integración** | 6 · Construir | `modo-storyblok` | *Provide specific context* |\n| **Integración** | 7 · Verificar (TDD) | `test-driven-development` | *Give Claude a way to verify its work* |\n| **Integración** | 8 · Revisar código | `guardia` (subagentes ‖) · `sdd-verify` · SonarCloud (MCP) | *Use subagents for investigation* |\n| **Integración** | 9 · Gates ‖ | `chrome-devtools` · `frontend-security-checklist` · `modo-seo-geo-audit` | *Fan out* |\n| **Integración** | 10 · Deploy + smoke | `modo-frontend-deploy` · `modo-landing-smoke-test` · `modo-stakeholder-gate` | *Verify against the real edge* |\n| **Integración** | 11 · Orquestar | `modo-landing-page-builder` (Workflow) | *Run multiple sessions* · *Fan out* |\n\n> El **gate de diseño** entre Evaluación e Integración es la clave del flujo: no se escribe una línea de código hasta que el diseño está evaluado y aprobado. Integrar antes es construir sobre arena.\n\n## Cuándo usar qué\n\nAnthropic lo resume como *“match features to your goal”*. Aplicado al harness:\n\n| Si necesitás… | Usá | Ejemplo |\n|---------------|-----|---------|\n| Conocimiento/flujo reusable on-demand | **Skill** | `modo-storyblok`, `sdd-*`, `modo-design-system` |\n| Diseñar/criticar con foco aislado | **Agent de diseño** | `modo-branding` / `modo-ux` / `modo-frontend` (+ Brand Guardian / Accessibility Auditor en `modo-design-review`) |\n| Leer muchos archivos sin ensuciar el hilo | **Subagente** | revisores de `guardia` |\n| Hablar con un servicio externo | **MCP** | SonarCloud, `chrome-devtools` |\n| Algo determinístico que pase siempre | **Hook** | spec-first, pre-commit |\n| Fan-out de varias fases | **Workflow** | `modo-landing-page-builder` |\n\nProfundizá: *Introduction to agent skills*, *Introduction to subagents*, *Introduction to Model Context Protocol* en [Anthropic Academy](https://anthropic.skilljar.com/).\n\n## Reglas de contexto (de Anthropic, aplicadas)\n\n- **`/clear` entre fases** no relacionadas.\n- **Subagentes para investigación y crítica** — que lean/evalúen ellos.\n- **Verificá siempre, mostrá evidencia** — un gate “verde” sin la salida del comando es prosa. (Mismo criterio del harness MODO: sin evidencia ≠ passed.)\n- **Idea → diseño → evaluación → integración** — y nunca integres un diseño que no pasó su evaluación.\n\n## Recursos\n\n- **Anthropic — Claude Code best practices**: https://code.claude.com/docs/en/best-practices\n- **Match features to your goal** (skills vs subagents vs hooks vs MCP): https://code.claude.com/docs/en/features-overview\n- **Anthropic Academy**: https://anthropic.skilljar.com/ — *Claude Code 101* · *Claude Code in Action* · *Introduction to agent skills* · *Introduction to subagents* · *Introduction to Model Context Protocol*\n- Skills de diseño MODO/Claude hoy: `modo-design-system`, `impeccable`, `ui-ux-pro-max`, `frontend-design`, `web-design-guidelines`.\n\n> Con el orden claro, el [⚙ Harness: los 4 gates](#gates) te da el criterio de cada control; el atajo `modo-landing-page-builder` corre la integración por vos.\n"},{"id":"automatizacion","num":"🤖","title":"Automatización total: vos = QA","eyebrow":"Referencia · skills/agentes por fase","file":"","md":"# 🤖 Automatización total · vos sos el QA\n\n> El objetivo final del harness: que **todo lo operativo lo hagan skills y agentes**, y vos quedes como **QA** — el que valida, critica y aprueba en unos pocos gates, no el que ejecuta. Esta lección mapea el set completo de skills/agentes por fase, qué se automatiza, dónde decidís vos, y qué falta entrenar.\n>\n> Esta arquitectura se endureció en **5 pasadas de crítica** (completitud, gaps de automatización, claridad del QA, honestidad de lo-que-falta, y manejo de fallas). Lo que cambió en cada pasada está al final.\n\n## El modelo: humano como QA\n\nLa idea no es “Claude hace todo solo”. Es: **lo mecánico se automatiza; el juicio queda en vos**, concentrado en gates explícitos. En cada gate ves **evidencia** (no re-ejecutás: revisás la salida que el agente ya produjo — *evidence over assertion*, [Anthropic](https://code.claude.com/docs/en/best-practices)) y decidís **aprobar** o **rechazar → volver a la fase X**.\n\nTenés exactamente **4 gates humanos** en todo el pipeline. El resto corre solo.\n\n## El pipeline completo (skills/agentes por fase)\n\n| Fase | Qué la maneja (skill/agente) | Estado | ¿Gate humano? | Evidencia que ves · si rechazás |\n|------|------------------------------|--------|---------------|----------------------------------|\n| 0 · Brief de la idea | intake con `AskUserQuestion` (hoy `modo-planner`) | existe (parcial) | — | — |\n| 1 · Ambiente | `modo-team-onboarding`, `github-packages-auth`, `modo-services-monitor` | existe | — (auto; solo avisa si rompe) | — |\n| 2 · Diseño con Claude | `modo-branding` · `modo-ux` · `modo-frontend` (apoyo: `modo-design-system`, `impeccable`, `ui-ux-pro-max`) | **existe** ✅ | ✅ **GATE 1 — gusto/marca** | mockup + lista de bloks + tokens · → vuelve a fase 2 |\n| 3 · Assets | `imagegen-frontend-web` + optimización de imágenes (peso/AVIF) | existe (parcial) | — | — |\n| 4 · Evaluación del diseño | `modo-design-review` (panel: Brand Guardian + Accessibility Auditor + `impeccable`) | **existe** ✅ | ✅ **GATE 2 — veredicto de diseño** | findings + verdict por lente · → vuelve a fase 2 |\n| 5 · Spec / tasks | `sdd-propose` · `sdd-design` · `sdd-spec` · `sdd-tasks` | existe | — (spot-check opcional) | spec con scenarios |\n| 6 · Construir | `modo-storyblok` (story + blok + registro 3 puntos) | existe | — | — |\n| 7 · Verificar (TDD) | `test-driven-development` | existe | — (el test es el check) | salida de tests |\n| 8 · Revisión de código | `guardia` (subagentes ‖) · `sdd-verify` · SonarCloud (MCP) | existe | ✅ **GATE 3 — calidad** | reporte + Quality Gate · → vuelve a fase 6 |\n| 9 · Gates ‖ | `chrome-devtools` (perf) · `frontend-security-checklist` (CSP) · `modo-seo-geo-audit` (a11y+SEO) | existe | (incluido en GATE 3) | lighthouse + CSP + audit |\n| 10 · Deploy alpha + smoke | `modo-frontend-deploy` · `modo-landing-smoke-test` | existe | — (auto contra alpha) | smoke 200 + perf/CSP del edge |\n| 11 · Observabilidad | `modo-services-monitor` · Datadog (MCP) | existe | — (auto; alerta si degrada) | estado post-deploy |\n| 12 · Pre-prod | `modo-stakeholder-gate` + `modo-pr-author` | existe | ✅ **GATE 4 — prod (humano + GRC)** | PR + validación de owners · → no promueve |\n| — · Orquestación | `modo-page-pipeline` (full idea→prod, los 4 gates) + `modo-landing-page-builder` (integración 6→10) | **existe** ✅ | — | — |\n\n## Lo entrenado (2026-06-17) y lo que falta\n\nLas piezas que faltaban para que sea **un solo comando con vos solo en los 4 gates** ya están entrenadas:\n\n1. ✅ **Agentes de diseño MODO** — `modo-branding`, `modo-ux`, `modo-frontend` (agents en `~/.claude/agents/`), aterrizados en las reglas reales de `modo-landing` (branding oficial, `src/CMS/`, bloks reales). Apoyo: `modo-design-system`, `impeccable`, `ui-ux-pro-max`.\n2. ✅ **Panel de crítica de diseño** — `modo-design-review` (skill) compone Brand Guardian + Accessibility Auditor + `impeccable` en contexto fresco y emite veredicto (GATE 2).\n3. ✅ **Orquestador full-pipeline** — `modo-page-pipeline` (skill) encadena idea→diseño→evaluación→integración→deploy parando en los 4 gates; delega la integración a `modo-landing-page-builder`.\n\nFalta todavía (gap honesto):\n\n- **Handoff diseño→storyblok** — automatizar que la salida aprobada de diseño (bloks + tokens + contenido) alimente directo a `modo-storyblok`, sin re-tipear.\n- **Branding oficial en `modo-design-system`** — el skill canónico todavía documenta tokens `sdk-*` (legacy); hay que actualizarlo al branding oficial para que los agents lo citen sin caveats.\n\n## Reglas para que “vos = QA” funcione de verdad\n\n- **Cada gate trae evidencia, no promesas.** Un gate sin la salida del comando/reporte no es aprobable. (Sin evidencia ≠ passed.)\n- **Rechazar siempre tiene destino.** El gate dice a qué fase volver; el orquestador hace loop-back, no skip.\n- **Falla de gate = bloqueo, no “lo arreglo después”.** Si un control da rojo, el pipeline para en ese punto.\n- **Nada de caps silenciosos.** Si el orquestador saltea algo (top-N, sin retry), lo **declara**; saltear en silencio se lee como “cubrí todo” cuando no.\n- **Contexto limpio entre fases** (`/clear`, subagentes para investigar) — base de Anthropic para que la cadena larga no degrade.\n\n## Cómo se endureció (las 5 pasadas)\n\n1. **Completitud** → faltaban *assets* (fase 3) y *observabilidad post-deploy* (fase 11). Agregadas.\n2. **Gaps de automatización** → se marcó explícito qué **no** se puede full-automatizar (gusto de marca, aprobación prod) como gates humanos obligatorios, sin fingir que son automáticos.\n3. **Claridad del QA** → cada gate ahora dice **qué evidencia ves** y **a qué fase volvés si rechazás**.\n4. **Honestidad** → columna *estado: existe / a entrenar*; no se implica automatización que no existe todavía.\n5. **Manejo de fallas/orden** → loop-back explícito, falla = bloqueo, y regla anti-cap-silencioso.\n\n## Recursos\n\n- **Claude Code best practices** (verify, subagentes, fan-out, contexto): https://code.claude.com/docs/en/best-practices\n- **Anthropic Academy**: https://anthropic.skilljar.com/ — *Claude Code in Action*, *Introduction to subagents*, *Introduction to agent skills*.\n\n> Esta es la foto del destino: vos validás, criticás y aprobás; el harness ejecuta. El [🧭 Orden óptimo del harness](#orden) es el camino para llegar; el [⚙ Harness: los 4 gates](#gates), el criterio de cada control.\n"}];</script>
