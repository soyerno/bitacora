  <script>window.LESSONS = [{"id":"intro","num":"В·","title":"IntroducciГіn","eyebrow":"CapacitaciГіn interactiva","file":"","md":"# CapacitaciГіn В· Crear pГЎginas Storyblok-managed en modo-landing\n\n> **Harness = agentes.** Este no es un manual para leer y olvidar. Es un curso que se hace **con Claude Code abierto**, donde cada paso lo guГ­a y verifica un skill MODO. Vos seguГ­s, Claude orquesta, los gates te dicen si estГЎ bien.\n>\n> Autor: HernГЎn De Souza В· Sr AI Engineer В· MODO\n\n---\n\n## Para quiГ©n\n\nDev frontend que se suma a modo-landing y necesita crear/editar pГЎginas administradas por Storyblok: desde levantar el ambiente hasta dejar la pГЎgina corriendo en un alpha de playsistemico, pasando por los gates de calidad reales del equipo.\n\n## QuГ© vas a saber hacer al terminar\n\n1. Levantar modo-landing local con auth a GitHub Packages y vars de Storyblok.\n2. DiseГ±ar la pГЎgina con SDD y el design system MODO antes de tocar cГіdigo.\n3. Crear una **story** en Storyblok y wirear su **blok** al registry de React (`CMS_COMPONENTS`).\n4. Escribir el test **primero** (redв†’greenв†’refactor, RTL semГЎntico, sin snapshots).\n5. Pasar los 4 gates: **TDD В· Code review + SDD В· Performance + CSP В· a11y + SEO/GEO**.\n6. Documentar y disparar un **deploy alpha** a develop/qa/preprod en playsistemico.\n\n## CГіmo estГЎ organizado el pipeline real (mapa mental)\n\n```\nStoryblok story (slug = URL)\n        в”‚ getServerSideProps  в”Ђв”Ђ src/pages/[[...slug]].jsx\n        в–ј\n   cdn/stories/<slug>  (SSR, resolve_relations)\n        в”‚ story.content.body[]\n        в–ј\n   DynamicCMSComponent в”Ђв”Ђ getCMSComponent(element) в”Ђв”Ђ src/CMS/utils/utils.tsx\n        в”‚ lookup\n        в–ј\n   CMS_COMPONENTS[element.component] в”Ђв”Ђ src/CMS/utils/availableComponents.tsx\n        в”‚ render\n        в–ј\n   <CMSHeroPrimary> вЂ¦ blok React con @playsistemico/modo-ui-lib-web + tokens tailwind\n```\n\n**Crear una pГЎgina = autorar la story + (si el blok no existe) crear el componente y registrarlo.**\n\n## Learning path\n\n| # | LecciГіn | Skill harness | Gate que toca |\n|---|---------|---------------|---------------|\n| 00 | [Setup de ambiente](00-setup-ambiente.md) | `modo-team-onboarding`, `github-packages-auth` | вЂ” |\n| 01 | [DiseГ±o: SDD + design system](01-diseno-sdd-design-system.md) | `sdd-*`, `modo-design-system` | SDD |\n| 02 | [Crear la pГЎgina: story + blok](02-crear-pagina-storyblok.md) | `modo-storyblok` | вЂ” |\n| 03 | [TDD redв†’green](03-tdd-red-green.md) | `test-driven-development` | TDD |\n| 04 | [Gates de validaciГіn](04-gates-validacion.md) | `guardia`, `frontend-security-checklist`, `modo-seo-geo-audit` | Code review В· Perf В· CSP В· a11y В· SEO |\n| 05 | [Deploy alpha a playsistemico](05-deploy-alpha-playsistemico.md) | `modo-frontend-deploy`, `modo-frontend-onboarding` | вЂ” |\n| рџ§Є | [Lab: blok SectionPromoBanner](exercises/README.md) | todos | los 4 |\n\n## Atajo: el agente orquestador\n\nSi ya entendГ©s el flujo y querГ©s que un agente lo maneje punta a punta:\n\n```\n/modo-landing-page-builder\n```\n\nTriple-layer skill que orquesta scaffold в†’ TDD в†’ gates (en paralelo) в†’ deploy-alpha в†’ verify. Internamente dispara el Workflow [`harness/page-builder.workflow.js`](harness/page-builder.workflow.js). Ver [`harness/gates.md`](harness/gates.md) para el criterio de cada gate.\n\n## Reglas del equipo que el curso respeta\n\n- **Sin `console.log/error/warn`** en prod.\n- **Sin snapshots** вЂ” RTL semГЎntico o Playwright.\n- **Tokens del design system**, no hex hardcodeados.\n- **Tipos** en todos los props.\n- **Commits**: `type(SCOPE-XXX): Subject` (scope = Jira, ej. `COENXT-123`).\n- **SonarCloud**: 0 new smells, 0 hotspots, в‰¤3% duplicaciГіn.\n\n> EmpezГЎ por [00 В· Setup de ambiente](00-setup-ambiente.md).\n"},{"id":"00","num":"00","title":"Setup de ambiente","eyebrow":"LecciГіn 00 В· Harness: onboarding + GH Packages","file":"00-setup-ambiente.md","md":"# 00 В· Setup de ambiente\n\n> Objetivo: modo-landing corriendo en `localhost`, autenticado a GitHub Packages, leyendo Storyblok. Sin esto, nada de lo que sigue funciona.\n\n## Harness\n\n- `modo-team-onboarding` вЂ” si reciГ©n te sumГЎs al ecosistema MODO con Claude Code, corrГ© el onboarding para tener skills/MCPs/memoria al dГ­a.\n- `github-packages-auth` вЂ” inyecta el token de GH Packages cuando corrГ©s `pnpm install/build`.\n\n## 1. Prerrequisitos\n\n| QuГ© | VersiГіn | CГіmo |\n|-----|---------|------|\n| Node | 22.22.2 | `nvm use 22.22.2` |\n| Package manager | pnpm | `corepack enable && corepack prepare pnpm@latest --activate` |\n| Token GH Packages | `read:packages` | en `~/.npmrc` (abajo) |\n\n> modo-landing es **Next.js 12** con TypeScript loose (`strict: false`). El dev server corre `node server.js`, no `next dev` pelado.\n\n## 2. `.npmrc` para `@playsistemico`\n\nLas libs internas (incluida `@playsistemico/modo-ui-lib-web`, el design system) viven en GitHub Packages. NecesitГЎs un token con `read:packages`:\n\n```\n//npm.pkg.github.com/:_authToken=<TU_TOKEN>\n@playsistemico:registry=https://npm.pkg.github.com/\n```\n\nEl skill `github-packages-auth` lo inyecta automГЎticamente al correr pnpm. Manual:\n\n```bash\nexport NODE_AUTH_TOKEN=\"$(grep -m1 'npm.pkg.github.com/:_authToken=' ~/.npmrc | sed 's/.*_authToken=//')\"\n```\n\n## 3. Instalar + variables\n\n```bash\ncd modo-landing\npnpm install\ncp .env.example .env.local   # completГЎ con valores reales (no inventes)\n```\n\nGrupos de vars en `.env.example`. Para **Storyblok** te importan:\n\n| Var | Para quГ© |\n|-----|----------|\n| `STORYBLOK_API_KEY` | token de lectura del space (Content Delivery API) |\n| `ISR_REVALIDATE_TOKEN` | revalidaciГіn de ISR (cuando aplica) |\n\n> El cliente Storyblok se inicializa en [`src/CMS/config.ts`](../../../) con `region: 'eu'`. **VerificГЎ el region/space que te asignen**: si tu token es de un space en otra regiГіn, ajustГЎ. El cГіdigo productivo hoy usa `eu`; confirmГЎ antes de autorar para no pegarle a un space equivocado.\n\n## 4. Levantar\n\n```bash\npnpm dev      # node server.js в†’ http://localhost:3000\n```\n\nAbrГ­ una ruta CMS conocida (ej. `/bancos`) para confirmar que trae contenido de Storyblok.\n\n## 5. Paridad con CI (importante)\n\n`pnpm dev` **no lintea**. Antes de pushear, reproducГ­ lo que corre el Frontend CI:\n\n```bash\npnpm lint      # ESLint\npnpm build     # lint + next build в†’ /dist\npnpm test      # Jest\n```\n\nSi `pnpm build` pasa local, el CI de build casi seguro pasa. Esto te evita el ciclo pushв†’fallaв†’fix.\n\n## Checklist de salida\n\n- [ ] `node -v` в†’ 22.22.2\n- [ ] `pnpm install` sin errores de auth (`@playsistemico` resuelve)\n- [ ] `.env.local` con `STORYBLOK_API_KEY` real + region confirmado\n- [ ] `pnpm dev` levanta y una ruta CMS trae contenido\n- [ ] `pnpm build` verde local\n\n> Siguiente: [01 В· DiseГ±o: SDD + design system](01-diseno-sdd-design-system.md)\n"},{"id":"01","num":"01","title":"DiseГ±o: SDD + design system","eyebrow":"LecciГіn 01 В· Harness: sdd-* + design system","file":"01-diseno-sdd-design-system.md","md":"# 01 В· DiseГ±o: SDD + design system\n\n> Objetivo: antes de tocar cГіdigo, definir QUГ‰ pГЎgina y CON QUГ‰ piezas. Spec primero, design system despuГ©s.\n\n## Por quГ© diseГ±ar antes\n\nUna pГЎgina Storyblok no es \"tirar componentes\". Es decidir quГ© bloks la componen, quГ© datos consume cada uno, y quГ© comportamiento verificable tiene. SDD te obliga a escribir eso antes вЂ” y los gates de la lecciГіn 04 verifican contra esa spec.\n\n## Harness В· SDD lifecycle\n\nEl ciclo SDD vive como skills encadenados. Para una pГЎgina nueva:\n\n```\nsdd-explore   в†’ mapear lo que ya existe (bloks reusables, pГЎginas similares)\nsdd-propose   в†’ intent + scope + approach\nsdd-design    в†’ decisiones tГ©cnicas (quГ© bloks, datos, SSR vs estГЎtico)\nsdd-spec      в†’ requirements + scenarios (GIVEN/WHEN/THEN) verificables\nsdd-tasks     в†’ checklist de implementaciГіn\n```\n\nTodo vive en `openspec/changes/<tu-pagina>/`. Reglas del equipo:\n\n- Toda spec bajo `openspec/changes/<slug>/` вЂ” nunca `docs/specs` ni ad-hoc.\n- TildГЎ las tasks a medida que cerrГЎs bloques (`sdd-track`), no todo al final.\n\n> Para /comercios y rutas sensibles el equipo exige SDD + TDD por task. Para una landing simple, un proposal + spec liviano alcanza вЂ” pero **siempre** hay spec.\n\n## DecidГ­: Вїblok nuevo o reusГЎs?\n\nAntes de crear un componente, mirГЎ el registry. QuizГЎs ya existe el blok que necesitГЎs:\n\n```bash\n# quГ© bloks hay disponibles\nsed -n '/export const CMS_COMPONENTS/,/^};/p' src/CMS/utils/availableComponents.tsx\n```\n\nBloks actuales (no exhaustivo): `HeroPrimary`, `HeroSecondary`, `SectionBannerWithImage`, `SectionBannerWithoutImage`, `SectionGrid`, `SectionRounded`, `SectionBannerIcon`, `SectionCarousel`, `SectionCarouselGroup`, `SectionDualInfo`, `SectionDualList`, `SectionVideo`, `SectionBankList`, `SectionBlog`, `SectionCollapsible`, `Download`, `Navbar`, `Footer`.\n\n**Regla:** si un blok existente cubre el caso, **reusalo** (solo autorГЎs la story). CreГЎs componente nuevo solo si ningГєn blok encaja.\n\n## Harness В· design system MODO\n\nEl skill `modo-design-system` codifica las reglas de marca MODO para pГЎginas SDK Next/Astro. Lo que importa para un blok:\n\n- Componentes base vienen de `@playsistemico/modo-ui-lib-web` (ej. `HeroPrimary`, `SectionDualVariants`). **No** reimplementes UI que la lib ya da.\n- Colores/tipografГ­a: tokens en `tailwind.config.js` (paleta SDK MODO, Red Hat Display). **Nunca hex hardcodeado.**\n- El blok React es un **adaptador fino**: toma `data` de Storyblok y se la pasa al componente de la lib. MirГЎ [`src/CMS/components/CMSHeroPrimary/index.tsx`](../../../) вЂ” 30 lГ­neas, mapea `data` в†’ `<HeroPrimary>`.\n\n## Output de esta lecciГіn\n\n- `openspec/changes/<tu-pagina>/proposal.md` + `spec-delta.md` con scenarios verificables.\n- Lista de bloks: cuГЎles reusГЎs, cuГЎl(es) creГЎs.\n- Para el blok nuevo: quГ© componente de `modo-ui-lib-web` lo respalda y quГ© campos de Storyblok consume.\n\n## Checklist de salida\n\n- [ ] Proposal + spec con scenarios GIVEN/WHEN/THEN\n- [ ] DecisiГіn reusar-vs-crear por cada blok, justificada\n- [ ] Blok nuevo mapeado a un componente de `modo-ui-lib-web` + tokens (sin hex)\n\n> Siguiente: [02 В· Crear la pГЎgina: story + blok](02-crear-pagina-storyblok.md)\n"},{"id":"02","num":"02","title":"Crear la pГЎgina: story + blok","eyebrow":"LecciГіn 02 В· Harness: modo-storyblok","file":"02-crear-pagina-storyblok.md","md":"# 02 В· Crear la pГЎgina: story + blok\n\n> Objetivo: la pГЎgina existe en Storyblok (story) y, si lleva un blok nuevo, ese blok rinde en React. Esta es la lecciГіn central.\n\n## Harness\n\n- `modo-storyblok` вЂ” autorГ­a de stories, schema de bloks, folder/startpage pattern, PUT vГ­a MCP o curl JSON-RPC.\n\n## Parte A В· La story en Storyblok\n\nUna **story** es la pГЎgina. Su `full_slug` es la URL (`/promos/black-friday` в†’ story con slug `promos/black-friday`). El campo clave es `content.body`: un array de bloks.\n\n```\nstory\n в””в”Ђ content\n     в”њв”Ђ seo[]            в†’ CMSSEO (title, description, og)\n     в”њв”Ђ seo_structured_data[]  в†’ JSON-LD extra (bancos, service)\n     в””в”Ђ body[]           в†’ los bloks que se renderizan en orden\n         в”њв”Ђ { component: \"HeroPrimary\", title, subtitle, ... }\n         в”њв”Ђ { component: \"SectionGrid\", ... }\n         в””в”Ђ ...\n```\n\nCada item de `body` tiene `component` (el nombre que matchea el registry), `_uid` y sus campos. **El `component` string es el contrato** entre Storyblok y React.\n\nCГіmo se trae (no lo escribГ­s vos, pero entendelo) вЂ” [`src/pages/[[...slug]].jsx`](../../../):\n\n```js\nconst Storyblok = getStoryblok();\nconst { data } = await Storyblok.get(`cdn/stories/${slug}`, {\n  version: 'published',                 // 'draft' solo en low-env con ?preview=true\n  resolve_relations: storyblokResolveRelations,\n});\n// data.story.content.body[] в†’ se mapea a componentes\n```\n\n> `version: 'published'` = la story tiene que estar **publicada** para verse en prod. En develop/qa con `?preview=true` se ve el draft.\n\n### Autorar con el harness\n\nCon `modo-storyblok` podГ©s crear/editar la story por MCP o curl. MГ­nimo para una pГЎgina:\n\n1. Crear la story con `full_slug` = tu ruta.\n2. Setear `content.body` con los bloks (cada uno con su `component` vГЎlido).\n3. Setear `content.seo[0]` (title/description) вЂ” la lecciГіn 04 lo audita.\n4. **Publicar**.\n\n> Folder + `is_startpage` child pattern: para una secciГіn con subpГЎginas, creГЎs un folder y la home del folder es la story `is_startpage`. Ver `modo-storyblok` para el detalle.\n\n## Parte B В· El blok en React (solo si es nuevo)\n\nSi tu `body` usa un `component` que **no estГЎ** en el registry, `getCMSComponent` devuelve `undefined` y el blok no rinde. Hay que crearlo. Tres archivos + un registro.\n\n### CГіmo se resuelve un blok\n\n[`src/CMS/utils/utils.tsx`](../../../):\n\n```ts\nexport const getCMSComponent = (element: IDefaultFields): JSX.Element | undefined => {\n  const component = CMS_COMPONENTS[element.component];   // lookup por nombre\n  if (component) return component(element);              // undefined si no existe\n};\n```\n\n### AnatomГ­a de un blok (patrГіn canГіnico)\n\nMirГЎ `CMSHeroPrimary` como molde. Un blok es un **adaptador fino**: `data` de Storyblok в†’ componente de `modo-ui-lib-web`.\n\n`src/CMS/components/CMSMiBlok/types.ts`:\n```ts\nimport { IMiComponenteProps } from '@playsistemico/modo-ui-lib-web';\nimport { IDefaultFields } from '../../types';\n\nexport interface ICMSMiBlok extends IDefaultFields, Omit<IMiComponenteProps, 'className'> {\n  // campos que vienen de Storyblok\n  title: string;\n  ctaUrl?: string;\n}\n```\n\n`src/CMS/components/CMSMiBlok/index.tsx`:\n```tsx\nimport React from 'react';\nimport { MiComponente } from '@playsistemico/modo-ui-lib-web';\nimport { ICMSMiBlok } from './types';\n\ninterface Props {\n  data: ICMSMiBlok;\n}\n\nexport default function CMSMiBlok({ data }: Readonly<Props>) {\n  return (\n    <div className=\"cms-mi-blok\">\n      <MiComponente title={data.title} ctaUrl={data.ctaUrl} />\n    </div>\n  );\n}\n```\n\n### Registrar el blok (3 puntos, sino no rinde)\n\n1. **Tipo en la interface** вЂ” `src/CMS/types.ts`, agregГЎ a `IAvailableComponents`:\n   ```ts\n   MiBlok: (data: ICMSMiBlok) => JSX.Element;\n   ```\n2. **Entrada en el registry** вЂ” `src/CMS/utils/availableComponents.tsx`:\n   ```ts\n   import CMSMiBlok from '../components/CMSMiBlok';\n   import { ICMSMiBlok } from '../components/CMSMiBlok/types';\n\n   export const CMS_COMPONENTS: IAvailableComponents = {\n     // ...existentes\n     MiBlok: (data: ICMSMiBlok) => <CMSMiBlok data={data} />,\n   };\n   ```\n3. **El `component` en Storyblok** debe ser exactamente `MiBlok` (case-sensitive). Mismatch silencioso = blok que no aparece.\n\n> ВїEl blok necesita resolver una relaciГіn a otra story (referencia)? AgregГЎ `MiBlok.reference` a `storyblokResolveRelations` en `src/CMS/constants/storyblok.ts`.\n\n## Trampa conocida В· HMR / dev server zombie\n\nSi editГЎs el blok y el browser sigue mostrando lo viejo sin actualizar, antes de culpar al cГіdigo:\n\n```bash\nps aux | grep -E \"next dev|node server\" | grep -v grep\n```\n\nMГЎs de un proceso o un path bajo `.claude/worktrees/agent-*` (borrado) = dev server zombie sirviendo bundle viejo. MatГЎ por PID y relanzГЎ `pnpm dev` desde la raГ­z.\n\n## Checklist de salida\n\n- [ ] Story creada con `full_slug`, `body[]`, `seo[0]` y **publicada**\n- [ ] Si blok nuevo: `index.tsx` + `types.ts` (adaptador fino sobre `modo-ui-lib-web`)\n- [ ] Registrado en los 3 puntos (interface + registry + `component` string exacto)\n- [ ] La ruta rinde el blok en `pnpm dev` (`?preview=true` para draft)\n\n> Siguiente: [03 В· TDD redв†’green](03-tdd-red-green.md)\n"},{"id":"03","num":"03","title":"TDD redв†’green","eyebrow":"LecciГіn 03 В· Harness: test-driven-development","file":"03-tdd-red-green.md","md":"# 03 В· TDD redв†’green\n\n> Objetivo: el blok tiene un test que falla primero (red), pasa con la implementaciГіn mГ­nima (green) y queda verde tras refactor. **Gate TDD.**\n\n## Harness\n\n- `test-driven-development` вЂ” disciplina redв†’greenв†’refactor.\n\n## La regla del equipo\n\n- **TDD obligatorio** cuando hay lГіgica condicional, reglas o cГЎlculos (`if`, `map` con variantes, validaciones). Test primero.\n- **Test-after** aceptable para delegaciГіn trivial (un adaptador que solo pasa props). Pero el test **siempre existe**.\n- **Sin snapshots.** El equipo quiere eliminar los Jest snapshots. UsГЎ RTL semГЎntico (`getByRole`, `getByText`) o Playwright. No propongas `toMatchSnapshot`.\n\n## El ciclo\n\n```\nRED    в†’ escribГ­ un test que falle (la feature no existe todavГ­a)\nGREEN  в†’ mГ­nimo cГіdigo para que pase\nREFACTOR в†’ mejorГЎ sin romper; el test queda verde\n```\n\n**Nunca saltees el red.** Si el test pasa en la primera corrida, no estГЎ probando nada nuevo.\n\n## Para un blok CMS\n\nUn blok adaptador fino (solo pasa props) в†’ test-after liviano: que rinde el contenido esperado. Un blok con lГіgica (mapea variantes, condiciona por `data`, arma listas) в†’ TDD real.\n\n### RED вЂ” test primero (RTL semГЎntico)\n\n`src/CMS/components/CMSMiBlok/CMSMiBlok.test.tsx`:\n```tsx\nimport { render, screen } from '@testing-library/react';\nimport CMSMiBlok from './index';\n\ndescribe('CMSMiBlok', () => {\n  it('renderiza el tГ­tulo que viene de Storyblok', () => {\n    const data = { component: 'MiBlok', _uid: '1', _editable: '', title: 'Black Friday' };\n    render(<CMSMiBlok data={data} />);\n    expect(screen.getByText('Black Friday')).toBeInTheDocument();\n  });\n\n  it('muestra el CTA solo cuando hay ctaUrl', () => {\n    const data = { component: 'MiBlok', _uid: '2', _editable: '', title: 'X', ctaUrl: '/promos' };\n    render(<CMSMiBlok data={data} />);\n    expect(screen.getByRole('link', { name: /promos/i })).toHaveAttribute('href', '/promos');\n  });\n});\n```\n\nCorrГ© y mirГЎ fallar:\n```bash\nnpx jest src/CMS/components/CMSMiBlok --watch\n# o, por el passthrough de pnpm (ojo, \"pnpm test -- --testPathPattern\" se come el flag):\npnpm test:specific -t \"CMSMiBlok\"\n```\n\n> Trampa de flags: `pnpm test -- --testPathPattern=` no pasa bien el flag. UsГЎ `npx jest <path>` o `pnpm test:specific`.\n\n### GREEN вЂ” implementaciГіn mГ­nima\n\nEl blok de la lecciГіn 02. Lo justo para que los dos tests pasen. Nada mГЎs.\n\n### REFACTOR\n\nExtraГ© un `useMemo` si mapeГЎs listas (como hace `CMSHeroPrimary` con `pills`), limpiГЎ nombres. Los tests siguen verdes.\n\n## Deriva los casos de la spec\n\nLos scenarios GIVEN/WHEN/THEN de tu `spec-delta.md` (lecciГіn 01) son tus casos de test. Un scenario = al menos un `it(...)`. Si un scenario no tiene test, el gate SDD de la lecciГіn 04 lo marca.\n\n## QuГ© NO testear (no infles coverage)\n\n- Adaptadores 1:1 sin transformaciГіn (cubierto por el render test).\n- Que React renderice (eso lo prueba React).\n- Snapshots (prohibidos).\n\n## Checklist de salida\n\n- [ ] Test escrito **antes** de la implementaciГіn, visto fallar (red)\n- [ ] ImplementaciГіn mГ­nima в†’ verde\n- [ ] RTL semГЎntico (`getByRole`/`getByText`), **sin snapshots**\n- [ ] Cada scenario de la spec tiene su `it(...)`\n- [ ] `pnpm test` verde\n\n> Siguiente: [04 В· Gates de validaciГіn](04-gates-validacion.md)\n"},{"id":"04","num":"04","title":"Gates de validaciГіn","eyebrow":"LecciГіn 04 В· Harness: guardia В· security В· seo-geo","file":"04-gates-validacion.md","md":"# 04 В· Gates de validaciГіn\n\n> Objetivo: la pГЎgina/blok pasa los 4 gates antes de cualquier deploy. Un gate rojo bloquea. Sin \"ya lo arreglo despuГ©s\".\n\nEsta lecciГіn es la que el Workflow [`harness/page-builder.workflow.js`](harness/page-builder.workflow.js) corre en paralelo. AcГЎ lo hacГ©s a mano para entender cada uno. Criterio completo en [`harness/gates.md`](harness/gates.md).\n\n## Gate 1 В· TDD redв†’green\n\nYa cubierto en la [lecciГіn 03](03-tdd-red-green.md). Criterio: test escrito primero, `pnpm test` verde, sin snapshots, cada scenario de la spec con su `it`.\n\n```bash\npnpm test\n```\n\n## Gate 2 В· Code review + SDD\n\n**Harness:** `guardia` (review paralelo multi-subagente) + SonarCloud MCP + `sdd-verify`.\n\n```\n/guardia            # review completo del PR (Sonar, tests, React, security, CI, bundle)\n```\n\nCriterio:\n- SonarCloud Quality Gate: **0 new smells, 0 hotspots, в‰¤3% duplicaciГіn**.\n- Sin `console.log/error/warn` en cГіdigo de prod.\n- Sin hex hardcodeado (tokens del design system).\n- Tipos en todos los props.\n- `sdd-verify`: implementaciГіn matchea spec + tasks tildadas.\n\n> Sonar corre en olas: un fix puede activar otra regla. No declares \"done\" sin esperar el scan completo.\n\n## Gate 3 В· Performance + CSP\n\n**Harness:** `chrome-devtools` (`lighthouse_audit`) + `frontend-security-checklist` (Layer 3, CSP post-deploy).\n\n### Performance\n```\n# con chrome-devtools MCP, contra la ruta local o el alpha:\nlighthouse_audit  в†’ LCP, CLS, TBT\n```\nCriterio: LCP y CLS dentro de umbral. **Trampa modo-landing:** los bloks se rinden con `dynamic({ ssr:false })` ([`[[...slug]].jsx`](../../../) `DynamicCMSComponent`). Si tu blok es el LCP (hero), el `ssr:false` lo empeora вЂ” evaluГЎ `priority`/SSR para el hero. No metas imГЎgenes pesadas sin AVIF/`quality` ajustado.\n\n### CSP\n```\n/modo-security-csp   # o frontend-security-checklist Layer 3\n```\nCriterio: CSP/security headers OK contra el edge live. Si tu blok carga assets de un dominio nuevo (CDN, fonts, media), agregalo a la directiva CSP correcta en `next.config.js`. Ojo con `data:`/`media-src` si usГЎs Lottie/Remotion.\n\n> Si tocaste `next.config.js` CSP o `headers()`, validГЎ con Layer 3 contra el ambiente despuГ©s del deploy.\n\n## Gate 4 В· a11y + SEO/GEO\n\n**Harness:** `modo-seo-geo-audit` + checklist WCAG.\n\n### a11y\nCriterio: sin barreras WCAG. ImГЎgenes con `alt` descriptivo (**nunca `alt=\"\"`**), roles correctos, foco navegable, contraste con tokens MODO.\n\n### SEO/GEO\n```\n/modo-seo-geo-audit\n```\nCriterio:\n- `content.seo[0]` con title/description в†’ lo rinde `CMSSEO`.\n- JSON-LD vГЎlido (Rich Results). El catch-all ya inyecta breadcrumb + FAQ (de `SectionCollapsible`) + structured data extra. Si tu pГЎgina es de un tipo nuevo (Service, Collection), seguГ­ el patrГіn de `buildExtraStructuredData` en [`[[...slug]].jsx`](../../../).\n- **URL-as-state**: si la pГЎgina tiene filtros/categorГ­as, cada estado debe ser una URL compartible e indexable.\n\n## Orden recomendado\n\n```\n1. TDD          (local, rГЎpido)         в†’ pnpm test\n2. Code review  (PR)                    в†’ /guardia\n3. a11y + SEO   (local/PR)              в†’ /modo-seo-geo-audit\n4. Perf + CSP   (contra alpha, lecciГіn 05) в†’ lighthouse + Layer 3\n```\n\nPerf y CSP rinden mejor contra un ambiente desplegado в†’ se cierran junto con el deploy alpha de la lecciГіn 05.\n\n## Atajo: todos en paralelo\n\n```\n/modo-landing-page-builder    # corre el Workflow: gates en paralelo + barrier pre-deploy\n```\n\n## Checklist de salida\n\n- [ ] `pnpm test` verde (TDD)\n- [ ] `/guardia` + Sonar Quality Gate verde В· `sdd-verify` OK\n- [ ] Lighthouse dentro de umbral В· CSP/headers OK\n- [ ] a11y sin barreras В· JSON-LD vГЎlido В· SEO ok\n\n> Siguiente: [05 В· Deploy alpha a playsistemico](05-deploy-alpha-playsistemico.md)\n"},{"id":"05","num":"05","title":"Deploy alpha a playsistemico","eyebrow":"LecciГіn 05 В· Harness: modo-frontend-deploy","file":"05-deploy-alpha-playsistemico.md","md":"# 05 В· Deploy alpha a playsistemico\n\n> Objetivo: tu cambio corriendo en un ambiente alpha (develop/qa/preprod) de la infra MODO, listo para verificar perf+CSP contra el edge.\n\n## Harness\n\n- `modo-frontend-deploy` вЂ” ejecuta el runbook de publicaciГіn k8s paso a paso.\n- `modo-frontend-onboarding` вЂ” solo si el front es **nuevo** en playsistemico (no es el caso de modo-landing, que ya estГЎ montado).\n\n## modo-landing ya estГЎ en la plataforma\n\nmodo-landing ya tiene su infra (helm, parameters SOPS, workflows reusables de `playsistemico/workflows`). Para una pГЎgina/blok nuevo **no** abrГ­s tickets de provisioning ni tocГЎs helm. Solo disparГЎs un alpha.\n\n> Si alguna vez subГ­s un front **nuevo** a playsistemico, ahГ­ sГ­ aplica `modo-frontend-onboarding` (6 tickets JSM canГіnicos, helm/catalog/parameters clonando promos-hub). EstГЎ fuera del alcance de esta capacitaciГіn.\n\n## El deploy alpha\n\nEs un workflow manual: [`.github/workflows/ci-alpha.yaml`](../../../). `workflow_dispatch` con un input `environment`:\n\n```yaml\non:\n  workflow_dispatch:\n    inputs:\n      environment:\n        type: choice\n        options: [develop, qa, preprod]\njobs:\n  ci:\n    uses: playsistemico/workflows/.github/workflows/ci-ms.yaml@v1\n    with:\n      alpha: true\n      node-version: '22'\n```\n\nDispararlo desde tu rama:\n\n```bash\n# desde la rama del PR, elegГ­ el ambiente\ngh workflow run ci-alpha.yaml -f environment=develop --ref <tu-rama>\n\n# seguir la corrida\ngh run list --workflow=ci-alpha.yaml --limit 3\ngh run watch <run-id>\n```\n\n> El flujo normal de modo-landing: push a `main` auto-deploya a develop+QA. Preprod y prod son workflows manuales. El **alpha** te deja probar tu rama sin mergear.\n\n## CГіmo se configura el runtime (contexto)\n\nNo lo tocГЎs para una pГЎgina, pero saber cГіmo funciona evita sustos:\n\n1. **Imagen** = `modo-base:<ver>-node22` + tu cГіdigo, arranca con `entrypoint.sh` (`exec` para que SIGTERM llegue a node).\n2. **Config runtime** = SOPS (`parameters/<env>/*.yaml`) в†’ workflow `ssm-sops.yaml` в†’ AWS SSM в†’ `entrypoint.sh` la baja al boot. AcГЎ viven `STORYBLOK_API_KEY` y demГЎs por ambiente.\n3. **Deploy** = workflows reusables `ci-ms.yaml`/`cd-ms.yaml` que traen el Helm chart compartido. Tu repo solo aporta `helm/values.yaml`.\n\nDetalle completo: [`docs/runbook-publish-modo-frontend-k8s.md`](../../../) en modo-landing + skill `modo-frontend-deploy`.\n\n## VerificГЎ en el alpha\n\nUna vez desplegado, cerrГЎ los gates que rinden mejor contra el edge (lecciГіn 04):\n\n```bash\n# smoke de la ruta\ncurl -fsS -o /dev/null -w '%{http_code}\\n' https://<alpha-host>/<tu-slug>   # 200\n\n# perf + CSP contra el ambiente\nlighthouse_audit  https://<alpha-host>/<tu-slug>\n/modo-security-csp https://<alpha-host>\n```\n\nEl skill `modo-landing-smoke-test` valida rutas clave por ambiente y compara prod vs preprod si necesitГЎs cazar regresiones.\n\n## вљ пёЏ Prod NO\n\nEsta capacitaciГіn llega hasta alpha. Promover a prod es decisiГіn del equipo + gate GRC (`modo-stakeholder-gate`, ticket OFFSEC). **Nunca dispares prod desde el curso.**\n\n## Checklist de salida\n\n- [ ] `ci-alpha.yaml` disparado en develop/qa/preprod desde tu rama\n- [ ] Run verde\n- [ ] Smoke 200 en tu ruta\n- [ ] Perf + CSP cerrados contra el alpha\n\n> Cerraste el flujo. Ahora hacГ© el [рџ§Є Lab](exercises/README.md) para fijarlo, o dejГЎ que el agente lo orqueste con `/modo-landing-page-builder`.\n"},{"id":"lab","num":"рџ§Є","title":"Lab: SectionPromoBanner","eyebrow":"Lab integrador В· los 4 gates","file":"","md":"# рџ§Є Lab В· Blok `SectionPromoBanner`\n\n> Ejercicio integrador. ConstruГ­s un blok nuevo de punta a punta y le pasГЎs los 4 gates. La soluciГіn de referencia estГЎ en [`solution/`](solution/) вЂ” no la mires hasta intentarlo.\n\n## El pedido (la spec)\n\nMarketing quiere un banner de promo configurable desde Storyblok para usar en varias landings. Comportamiento:\n\n1. Muestra un **tГ­tulo** y un **subtГ­tulo** (ambos de Storyblok).\n2. Muestra una **lista de beneficios** (`items[]`), cada uno con texto.\n3. Muestra un **CTA** (botГіn con texto + URL) **solo si** `ctaUrl` estГЎ seteado. Si no, no hay botГіn.\n4. Acepta una variante de color (`variant: 'primary' | 'secondary'`) usando **tokens del design system** (sin hex).\n\n> Tiene lГіgica condicional (CTA) y mapeo de lista в†’ **TDD obligatorio** (lecciГіn 03).\n\n## Tu trabajo\n\nSeguГ­ el flujo completo del curso:\n\n### 1. DiseГ±o (lecciГіn 01)\nEscribГ­ la mini-spec: scenarios GIVEN/WHEN/THEN para cada punto del comportamiento. DecidГ­ quГ© componente de `@playsistemico/modo-ui-lib-web` respalda el banner (o un `<section>` propio con tokens si no hay uno que encaje).\n\n### 2. RED вЂ” test primero (lecciГіn 03)\n`src/CMS/components/CMSSectionPromoBanner/CMSSectionPromoBanner.test.tsx`. MГ­nimo:\n- renderiza tГ­tulo y subtГ­tulo\n- renderiza N items\n- **muestra CTA cuando hay `ctaUrl`**\n- **NO muestra CTA cuando falta `ctaUrl`**\n\nCorrГ©, vela fallar.\n\n### 3. GREEN вЂ” el blok (lecciГіn 02)\n- `types.ts` вЂ” interface extendiendo `IDefaultFields`.\n- `index.tsx` вЂ” adaptador fino, condicional del CTA, `useMemo` para los items.\n- RegistrГЎ en los **3 puntos**: `IAvailableComponents` (types.ts), `CMS_COMPONENTS` (availableComponents.tsx), y el `component: \"SectionPromoBanner\"` en la story.\n\n### 4. La story (lecciГіn 02)\nCreГЎ una story de prueba (ej. slug `lab/promo-banner`) con un `body` que use tu blok. PublicГЎ (o `?preview=true` en develop). ConfirmГЎ que rinde en `pnpm dev`.\n\n### 5. Gates (lecciГіn 04)\n- `pnpm test` verde\n- `/guardia` вЂ” 0 smells, sin `console.*`, sin hex, tipos OK\n- `/modo-seo-geo-audit` вЂ” `alt` descriptivo, JSON-LD si aplica\n- Lighthouse + CSP contra el alpha (lecciГіn 05)\n\n### 6. Deploy alpha (lecciГіn 05) вЂ” opcional\n`gh workflow run ci-alpha.yaml -f environment=develop --ref <tu-rama>`, smoke 200.\n\n## Criterio de aprobado\n\n- [ ] Test escrito antes, visto fallar, luego verde\n- [ ] CTA condicional cubierto por test (los dos caminos)\n- [ ] Blok registrado en los 3 puntos В· rinde en dev\n- [ ] Sin hex (tokens) В· sin `console.*` В· tipos en props В· `alt` descriptivo\n- [ ] Los 4 gates verdes\n\n## Atajo\n\n```\n/modo-landing-page-builder\n```\nDejГЎ que el agente orqueste el flujo y comparГЎ con lo que hiciste a mano.\n\n> SoluciГіn de referencia: [`solution/`](solution/).\n"},{"id":"solucion","num":"вњ…","title":"SoluciГіn del lab","eyebrow":"Lab В· soluciГіn de referencia","file":"","md":"# SoluciГіn de referencia В· `SectionPromoBanner`\n\n> Miralo **despuГ©s** de intentar el lab. Comparalo con lo tuyo.\n\n\nMirГЎ esto **despuГ©s** de intentar el lab. ComparГЎ con lo tuyo.\n\n## Archivos\n\n| Archivo | Va a (en modo-landing) | QuГ© muestra |\n|---------|------------------------|-------------|\n| `types.ts` | `src/CMS/components/CMSSectionPromoBanner/types.ts` | interface extendiendo `IDefaultFields` |\n| `index.tsx` | `src/CMS/components/CMSSectionPromoBanner/index.tsx` | adaptador fino + CTA condicional + `useMemo` |\n| `CMSSectionPromoBanner.test.tsx` | mismo dir | RTL semГЎntico, 4 tests, sin snapshots |\n| `registry-snippet.md` | вЂ” | los 3 puntos de registro |\n| `story.json` | Storyblok (no es archivo del repo) | story de prueba con 2 bloks (con y sin CTA) |\n\n## Decisiones de la soluciГіn\n\n- **CTA condicional con `&&`** sobre `ctaUrl` вЂ” el scenario \"NO muestra CTA\" lo verifica con `queryByRole('link')` + `not.toBeInTheDocument()`.\n- **`useMemo` para `items`** вЂ” mismo patrГіn que `CMSHeroPrimary` con `pills`.\n- **Variante por mapa de clases token** (`VARIANT_CLASS`), no `style={{ background: '#...' }}`. Las clases `bg-sdk-*` son ilustrativas: reemplazalas por los tokens reales de `tailwind.config.js`.\n- **Sin `console.*`**, tipos en todo, `key` estable en la lista.\n\n## Por quГ© pasa los gates\n\n- **TDD**: 4 tests, los dos caminos del condicional, escritos antes (lo demostrГЎs vos en RED).\n- **Code review**: sin smells obvios, sin hex, tipos completos, sin `console`.\n- **a11y**: `<h2>`, `<ul>/<li>`, link real con texto descriptivo. Si agregГЎs imagen в†’ `alt`.\n- **Perf**: componente liviano, sin imГЎgenes pesadas; si fuera hero, evaluar SSR.\n\n## Lo que falta (a propГіsito)\n\nLa soluciГіn no incluye el `alt` de imГЎgenes (el banner no tiene imagen) ni JSON-LD (no es un tipo schema.org puntual). Si tu variante del lab agrega imagen o es un tipo indexable, sumГЎ `alt` descriptivo y seguГ­ el patrГіn `buildExtraStructuredData` del catch-all.\n\n\n---\n\n## CГіdigo completo\n\n\n### types.ts\n\n```ts\n// SOLUCIГ“N DE REFERENCIA вЂ” src/CMS/components/CMSSectionPromoBanner/types.ts\n// (vive en modo-landing; acГЎ es material del lab)\n\nimport { IDefaultFields } from '../../types';\n\nexport interface IPromoItem {\n  text: string;\n}\n\nexport interface ICMSSectionPromoBanner extends IDefaultFields {\n  title: string;\n  subtitle?: string;\n  items?: IPromoItem[];\n  ctaText?: string;\n  ctaUrl?: string;\n  variant?: 'primary' | 'secondary';\n}\n```\n\n### index.tsx\n\n```tsx\n// SOLUCIГ“N DE REFERENCIA вЂ” src/CMS/components/CMSSectionPromoBanner/index.tsx\n//\n// Adaptador fino: data de Storyblok в†’ UI con tokens del design system.\n// NOTA: las clases de color (bg-sdk-*) son ilustrativas вЂ” usГЎ los tokens REALES\n// definidos en tailwind.config.js de modo-landing. Nunca hex hardcodeado.\n// Si existe un componente de @playsistemico/modo-ui-lib-web que encaje, preferilo\n// sobre este <section> propio.\n\nimport React, { useMemo } from 'react';\nimport { ICMSSectionPromoBanner } from './types';\n\ninterface Props {\n  data: ICMSSectionPromoBanner;\n}\n\nconst VARIANT_CLASS: Record<NonNullable<ICMSSectionPromoBanner['variant']>, string> = {\n  primary: 'bg-sdk-primary text-sdk-on-primary',\n  secondary: 'bg-sdk-secondary text-sdk-on-secondary',\n};\n\nexport default function CMSSectionPromoBanner({ data }: Readonly<Props>) {\n  const { title, subtitle, items, ctaText, ctaUrl, variant = 'primary' } = data;\n\n  const itemList = useMemo(\n    () => (items ?? []).map((item, i) => <li key={`${item.text}-${i}`}>{item.text}</li>),\n    [items]\n  );\n\n  return (\n    <section className={`cms-promo-banner ${VARIANT_CLASS[variant]}`}>\n      <h2>{title}</h2>\n      {subtitle && <p>{subtitle}</p>}\n      {itemList.length > 0 && <ul>{itemList}</ul>}\n      {ctaUrl && (\n        <a href={ctaUrl} className=\"cms-promo-banner__cta\">\n          {ctaText ?? 'Ver mГЎs'}\n        </a>\n      )}\n    </section>\n  );\n}\n```\n\n### CMSSectionPromoBanner.test.tsx\n\n```tsx\n// SOLUCIГ“N DE REFERENCIA вЂ” src/CMS/components/CMSSectionPromoBanner/CMSSectionPromoBanner.test.tsx\n//\n// RTL semГЎntico, sin snapshots. Cada scenario de la spec = un it().\n\nimport { render, screen } from '@testing-library/react';\nimport CMSSectionPromoBanner from './index';\nimport { ICMSSectionPromoBanner } from './types';\n\nconst base: ICMSSectionPromoBanner = {\n  component: 'SectionPromoBanner',\n  _uid: 'lab-1',\n  _editable: '',\n  title: 'Black Friday',\n};\n\ndescribe('CMSSectionPromoBanner', () => {\n  it('renderiza tГ­tulo y subtГ­tulo de Storyblok', () => {\n    render(<CMSSectionPromoBanner data={{ ...base, subtitle: 'Hasta 40% off' }} />);\n    expect(screen.getByRole('heading', { name: 'Black Friday' })).toBeInTheDocument();\n    expect(screen.getByText('Hasta 40% off')).toBeInTheDocument();\n  });\n\n  it('renderiza la lista de beneficios', () => {\n    render(\n      <CMSSectionPromoBanner\n        data={{ ...base, items: [{ text: 'EnvГ­o gratis' }, { text: 'Cuotas sin interГ©s' }] }}\n      />\n    );\n    expect(screen.getAllByRole('listitem')).toHaveLength(2);\n    expect(screen.getByText('Cuotas sin interГ©s')).toBeInTheDocument();\n  });\n\n  it('muestra el CTA cuando hay ctaUrl', () => {\n    render(<CMSSectionPromoBanner data={{ ...base, ctaText: 'Ver promos', ctaUrl: '/promos' }} />);\n    expect(screen.getByRole('link', { name: 'Ver promos' })).toHaveAttribute('href', '/promos');\n  });\n\n  it('NO muestra el CTA cuando falta ctaUrl', () => {\n    render(<CMSSectionPromoBanner data={base} />);\n    expect(screen.queryByRole('link')).not.toBeInTheDocument();\n  });\n});\n```\n\n# Registro del blok вЂ” los 3 puntos\n\nSin estos 3, el blok no rinde (`getCMSComponent` devuelve `undefined`).\n\n## 1 В· Tipo en la interface вЂ” `src/CMS/types.ts`\n\n```ts\nimport { ICMSSectionPromoBanner } from './components/CMSSectionPromoBanner/types';\n\nexport interface IAvailableComponents {\n  // ...existentes\n  SectionPromoBanner: (data: ICMSSectionPromoBanner) => JSX.Element;\n}\n```\n\n## 2 В· Entrada en el registry вЂ” `src/CMS/utils/availableComponents.tsx`\n\n```ts\nimport CMSSectionPromoBanner from '../components/CMSSectionPromoBanner';\nimport { ICMSSectionPromoBanner } from '../components/CMSSectionPromoBanner/types';\n\nexport const CMS_COMPONENTS: IAvailableComponents = {\n  // ...existentes\n  SectionPromoBanner: (data: ICMSSectionPromoBanner) => <CMSSectionPromoBanner data={data} />,\n};\n```\n\n## 3 В· El `component` en la story (Storyblok)\n\nEl blok del `body` debe tener `component: \"SectionPromoBanner\"` вЂ” **exacto, case-sensitive**. Ver `story.json`.\n\n> No resuelve relaciones a otras stories в†’ no hace falta tocar `storyblokResolveRelations`.\n\n\n### story.json\n\n```json\n{\n  \"_comment\": \"Story de prueba para el lab. Crear vГ­a modo-storyblok (MCP o curl). full_slug = lab/promo-banner в†’ ruta /lab/promo-banner. Publicar (o ?preview=true en develop).\",\n  \"story\": {\n    \"name\": \"Lab Promo Banner\",\n    \"slug\": \"promo-banner\",\n    \"full_slug\": \"lab/promo-banner\",\n    \"content\": {\n      \"component\": \"page\",\n      \"seo\": [\n        {\n          \"component\": \"Seo\",\n          \"title\": \"Lab В· Promo Banner\",\n          \"description\": \"PГЎgina de prueba del lab de la capacitaciГіn Storyblok.\"\n        }\n      ],\n      \"body\": [\n        {\n          \"component\": \"SectionPromoBanner\",\n          \"_uid\": \"promo-1\",\n          \"title\": \"Black Friday MODO\",\n          \"subtitle\": \"AprovechГЎ los descuentos pagando con MODO\",\n          \"variant\": \"primary\",\n          \"items\": [\n            { \"text\": \"Hasta 40% de descuento\" },\n            { \"text\": \"Cuotas sin interГ©s\" },\n            { \"text\": \"Reintegro en tu cuenta\" }\n          ],\n          \"ctaText\": \"Ver promos\",\n          \"ctaUrl\": \"/promos\"\n        },\n        {\n          \"component\": \"SectionPromoBanner\",\n          \"_uid\": \"promo-2\",\n          \"title\": \"Sin CTA\",\n          \"subtitle\": \"Este banner no define ctaUrl, asГ­ que no muestra botГіn\",\n          \"variant\": \"secondary\"\n        }\n      ]\n    }\n  }\n}\n```\n"},{"id":"gates","num":"вљ™","title":"Harness: los 4 gates","eyebrow":"Referencia del Workflow","file":"","md":"# Harness В· Los 4 gates\n\nReferencia ejecutable de [`page-builder.workflow.js`](page-builder.workflow.js). Cada gate retorna `{ gate, passed, findings, evidence }`. **El deploy alpha es un barrier: solo procede si todos `passed`.** Sin evidencia в‰  passed.\n\n| Gate | Skill / herramienta | Comando | Passed cuando | Evidencia |\n|------|---------------------|---------|---------------|-----------|\n| **TDD** | `test-driven-development` | `pnpm test` В· `npx jest <path>` | test escrito antes (red visto), verde ahora, RTL semГЎntico, **sin snapshots**, scenarioв†”it | salida jest + commit del test previo |\n| **Code review + SDD** | `guardia` + SonarCloud + `sdd-verify` | `/guardia` | 0 smells, 0 hotspots, в‰¤3% dup, sin `console.*`, sin hex, tipos; specв†”cГіdigo; tasks tildadas | link Quality Gate + reporte |\n| **Performance + CSP** | `chrome-devtools` + `frontend-security-checklist` L3 | `lighthouse_audit <url>` В· `/modo-security-csp` | LCP/CLS en umbral; CSP/headers OK; blok no es LCP con `ssr:false` | reporte lighthouse + validador CSP |\n| **a11y + SEO/GEO** | `modo-seo-geo-audit` | `/modo-seo-geo-audit` | sin barreras WCAG (alt, roles, foco, contraste); `seo[0]`; JSON-LD vГЎlido; URL-as-state | reporte audit + Rich Results |\n\n## Correr el Workflow\n\n```\n# vГ­a el skill (recomendado)\n/modo-landing-page-builder\n\n# o directo con la tool Workflow, pasando args:\nWorkflow({\n  scriptPath: \".../harness/page-builder.workflow.js\",\n  args: {\n    repoPath: \"/ruta/modo-landing\",\n    slug: \"promos/black-friday\",\n    blok: \"SectionPromoBanner\",\n    alphaUrl: null,           // o \"https://<alpha-host>/promos/black-friday\"\n    prNumber: null            // o el nГєmero de PR\n  }\n})\n```\n\n## Flujo del Workflow\n\n```\nTDD в”Ђв”Ђв–є Gates (3 en paralelo) в”Ђв”Ђв–є Barrier в”Ђв”Ђв–є Deploy (solo si todos passed)\n                                     в”‚\n                            failed > 0 в†’ status: \"blocked\" (fix + re-correr)\n```\n\n- **TDD** corre primero (gate liviano, local).\n- **Gates** (code-review+SDD вЂ– perf+CSP вЂ– a11y+SEO) corren en `parallel()` вЂ” barrier natural.\n- **Barrier** consolida. Si algГєn `passed:false` в†’ `status: \"blocked\"` con findings + evidencia. NO deploy.\n- **Deploy** solo **prepara** el comando alpha (no lo dispara sin confirmaciГіn). Prod siempre fuera.\n\n## Por quГ© evidencia obligatoria\n\n`feedback_no_mentir_pedir_help`: no se declara un gate verde sin la salida del comando / link / verify-grep que lo prueba. Un gate \"passed\" sin `evidence` es prosa, no un veredicto.\n"}];</script>
