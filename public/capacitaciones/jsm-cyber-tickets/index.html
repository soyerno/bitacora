  <script>window.LESSONS = [{"id":"intro","num":"·","title":"Introducción","eyebrow":"Capacitación interactiva","file":"","md":"# Capacitación · Armar tickets en el JSM de MODO (Cyber/IAM incluido)\n\n> **Harness = agente.** Este curso se hace **con Claude Code abierto**, usando el skill `modo-jsm-ticket`. Cada paso tiene un payload real que podés copiar, parametrizar y — con confirmación tuya — crear en el portal.\n>\n> Autor: Hernán De Souza · Sr AI Engineer · MODO\n\n---\n\n## Para quién\n\nDev, QA, analyst o moder que necesite abrir tickets en el JSM de MODO: accesos, GitHub teams, 1Password, Cyber/IAM, OFFSEC, repos, o cualquiera de los 29 service desks catalogados. No necesitás saber de APIs ni de Jira internals.\n\n## Qué vas a saber hacer al terminar\n\n1. Encontrar el service desk y request type correcto en los 29 desks / 318 forms.\n2. Mapear los campos requeridos sin inventar valores ni `customfield_*` IDs.\n3. Armar el JSON payload completo y verificarlo antes de POSTear.\n4. Crear el ticket vía REST API (browser session o API token) con confirmación explícita.\n5. Entender los casos Cyber/IAM más comunes: GitHub team, 1Password, GRC Hub, repos ABM, PEA.\n6. Darle seguimiento: URL del portal, SLA, estado, comentarios.\n\n## Learning path\n\n| # | Lección | Skill harness | Qué cubrís |\n|---|---------|---------------|------------|\n| 00 | [El JSM de MODO](00-el-jsm-modo.md) | `modo-jsm-ticket` | Portal, 29 desks, 318 forms, cuándo ticket vs PR |\n| 01 | [Descubrir el portal](01-descubrir-portal.md) | `modo-jsm-ticket` | Buscar service desk + request type; sd/rt IDs |\n| 02 | [Mapear campos](02-mapear-campos.md) | `modo-jsm-ticket` | Schema de campos, aprobador obligatorio, no inventar |\n| 03 | [Payload + POST](03-payload-post.md) | `modo-jsm-ticket` | Armar el JSON, confirmar, POSTear vía REST |\n| 04 | [Casos canónicos](04-casos-canonicos.md) | `modo-jsm-ticket` | GitHub team, 1Password, GRC Hub, repos ABM, PEA |\n| 05 | [Confirmación + tracking](05-confirmacion-tracking.md) | `modo-jsm-ticket` | Preview obligatorio, URL del portal, seguimiento SLA |\n| 🧪 | [Lab: armar un ticket](exercises/README.md) | todos | Ejercicio integrador · GitHub team access · dry-run |\n\n## Atajo: el agente\n\nCon Claude Code abierto, escribís:\n\n```\n/modo-jsm-ticket acceso a GitHub team modo-landing-dev para juan@modo.com.ar\n```\n\nEl skill busca en el catálogo, fetchea el schema del form, te pregunta los campos que faltan y muestra el payload para tu confirmación antes de crear nada.\n\n## Reglas del skill que el curso respeta\n\n> **Nunca POSTear sin confirmación explícita.** Preview siempre.\n\n- `customfield_*` IDs no se hardcodean — fetch en runtime desde el form schema.\n- Campos de tipo `option` → usar el `id` del `validValues`, no el `value` string.\n- Campos `user` → resolver `accountId` vía `lookupJiraAccountId`, no poner email directo.\n- Fechas en el portal: formato `D/mmm/YY` (ej. `2/jun/26`) para evitar ambigüedad MM/DD.\n- Voz rioplatense en `summary` y `description`. Sin buzzwords.\n\n> Empezá por [00 · El JSM de MODO](00-el-jsm-modo.md).\n"},{"id":"00","num":"00","title":"El JSM de MODO","eyebrow":"Lección 00 · El portal","file":"00-el-jsm-modo.md","md":"# 00 · El JSM de MODO\n\n> Objetivo: entendés qué es el JSM, para qué sirve cada portal y cuándo abrís un ticket en vez de hacer un PR o mandarle un mensaje a alguien.\n\n## ¿Qué es el JSM de MODO?\n\nEl **Jira Service Management (JSM)** de Play Digital es el sistema de tickets para pedidos internos: accesos, hardware, software, Cyber/IAM, OFFSEC, Rendición de Gastos, Legal, y más. Vivís en `https://play-sistemico.atlassian.net/servicedesk/customer/portals`.\n\nNo es el mismo Jira donde van las tareas de desarrollo (COENXT, EXA, etc.). Acá no hay sprints ni epics — hay **pedidos** que siguen un flujo de aprobación y tienen SLA.\n\n## Los 29 service desks\n\nCada \"portal\" es un service desk con sus formularios. Los más relevantes para un dev MODO:\n\n| Código | Nombre | sd | Forms | Cuándo |\n|--------|--------|----|-------|--------|\n| HD | IT-Solicitudes | 1 | 47 | Accesos generales, hardware, software, GitHub repo ABM |\n| CYBS | Cyber · Solicitudes IAM | 24 | 100 | GitHub teams, AWS, Amplitude, 1Password, Datadog, Google |\n| ACR | Cyber · GRC Solicitudes | 126 | 5 | Autoevaluaciones, auditorías |\n| OFFSEC | Cyber · Offensive Security | 192 | 6 | Pentesting, Threat Modeling, GRC Hub |\n| CSMYR | Cyber · Monitoreo y Respuesta | 225 | 7 | Análisis phishing, USB exceptions, SIEM |\n| DSOSH | DSO Security Hub | 6 | 17 | DevSecOps findings, AWS Security Hub |\n| PEA | Platform-Assistant | 23 | 2 | Investigar problemas de plataforma |\n| RDG | Rendición de Gastos | 8 | 15 | Capacitaciones, viáticos, tarjeta corporativa |\n| FIN | Finance | 14 | 8 | FP&A, PAYROLL, reintegros |\n| LEGOPS | Legal Ops | 159 | 5 | Consultas legales, documentación de promo |\n| LT | LCA-TRUST | 27 | 6 | Operaciones desconocidas, robo de celular |\n| PEOP | People · Compensaciones | 13 | 3 | Beneficios, sueldo |\n| NFSC | Infosec | 20 | 1 | Gestión de identidades |\n| IH | Infosec-HD | 17 | 3 | Incidentes de seguridad |\n\n> El total del catálogo (snapshot 2026-05-21): 29 service desks · 318 request types. Algunos desks son de prueba o internos (TS, AAA, ITDMS) — no abrís tickets ahí.\n\n## Las 318 formas de pedirte algo\n\nDentro de cada service desk hay **request types** — los formularios concretos. Cada uno tiene:\n\n- Un **nombre** legible (ej. \"Github - Agregar Usuario a Team\").\n- Un **sd** (service desk id) y **rt** (request type id). Esos dos números son el contrato con la API.\n- Un schema de **campos** (algunos requeridos, algunos opcionales), que varía por form y no podés asumir.\n\nEjemplo:\n\n```\n\"Github - Agregar Usuario a Team\"   →  sd=24  rt=1577\n\"ABM de Repositorios de GitHub\"     →  sd=1   rt=1404\n\"Cyber & GRC Hub\"                   →  sd=192 rt=14111\n\"1Password\"                         →  sd=24  rt=1042\n```\n\n## Cuándo abrís ticket vs otras acciones\n\n| Situación | Acción |\n|-----------|--------|\n| Necesitás acceso a una herramienta (GitHub, Datadog, AWS...) | Ticket en CYBS o HD |\n| Querés que creen/borren/modifiquen un repo de GitHub | Ticket HD, rt=1404 (ABM de Repos) |\n| Querés agregar alguien a un GitHub team | Ticket CYBS, rt=1577 |\n| Querés crear un GitHub team nuevo | Ticket CYBS, rt=1576 |\n| Bug en código → PR | PR en el repo, no ticket |\n| Tarea de desarrollo planificada | Issue en COENXT/EXA |\n| Incidente de seguridad urgente | IH · sd=17 · rt=217 (Submit request or incident) |\n| Necesitás un pentest o threat modeling | OFFSEC · sd=192 |\n| Problema con plataforma interna | PEA · sd=23 · rt=10936 |\n| Querés reportar gasto | RDG · sd=8 |\n\n> **Regla práctica**: si necesitás que alguien de IT/Cyber/Infra haga algo en un sistema externo al código, es un ticket JSM. Si es trabajo en el código, es un issue Jira o PR.\n\n## ¿Cómo entrás al portal?\n\n```\nhttps://play-sistemico.atlassian.net/servicedesk/customer/portals\n```\n\nAutenticás con Google SSO (`@modo.com.ar`). Si no ves algún portal, es porque no sos customer de ese service desk todavía — el equipo de IT lo puede habilitar.\n\n---\n\n> Siguiente: [01 · Descubrir el portal](01-descubrir-portal.md)\n"},{"id":"01","num":"01","title":"Descubrir el portal","eyebrow":"Lección 01 · service desk + request type","file":"01-descubrir-portal.md","md":"# 01 · Descubrir el portal\n\n> Objetivo: dado un pedido en palabras, encontrás el service desk y request type correcto — con su `sd` y `rt` — antes de tocar ningún campo.\n\n## Por qué importa elegir bien\n\nLos `customfield_*` que pide un form **son únicos por request type**. Si elegís el form equivocado, los campos requeridos no van a matchear y el ticket va a ser rechazado o redirigido. La búsqueda es barata — hacela primero.\n\n## Camino A: buscar en el catálogo local (offline, rápido)\n\nEl skill tiene el catálogo indexado en `~/.claude/skills/modo-jsm-ticket/reference/catalog.md` (29 desks / 318 forms, snapshot 2026-05-21).\n\nCon Claude Code:\n```\n/modo-jsm-ticket acceso a GitHub team\n```\n\nO buscar directo en bash:\n```bash\ngrep -i \"github\" ~/.claude/skills/modo-jsm-ticket/reference/catalog.md\n```\n\nResultado típico:\n```\n- **Github - Agregar Usuario a Team**     · sd=24 rt=1577\n- **Github - Alta de Usuario**            · sd=24 rt=1146\n- **Github - Creación de Team**           · sd=24 rt=1576\n- **Github - Eliminar Usuario de Team**   · sd=24 rt=1579\n- **Github - Cambio de Miembros en un Grupo** · sd=24 rt=1578\n- **Github - Alta de Copilot**            · sd=24 rt=1580\n- **ABM de Repositorios de GitHub**       · sd=1  rt=1404\n```\n\nTenés más de un match razonable → el skill te los muestra y te pregunta cuál. Elegís uno.\n\n## Camino B: búsqueda live en el JSM\n\nSi el catálogo puede estar stale (o el form es nuevo), buscás live desde el browser:\n\n```js\n// Desde evaluate_script en la página https://play-sistemico.atlassian.net/...\nfetch(\"/rest/servicedeskapi/requesttype?searchQuery=github&limit=20\", {\n  headers: { \"X-ExperimentalApi\": \"opt-in\", \"Accept\": \"application/json\" }\n}).then(r => r.json())\n```\n\nResponse: array de `{ id, name, serviceDeskId, ... }`.\n\n> El header `X-ExperimentalApi: opt-in` es **obligatorio** para este endpoint. Sin él, responde HTML/403.\n\n## Referencia rápida: los forms más pedidos\n\n### IT-Solicitudes (HD · sd=1)\n\n| Request type | rt | Cuándo |\n|--------------|----|--------|\n| ABM de Repositorios de GitHub | 1404 | Crear / archivar / cambiar visibilidad de un repo |\n| Acceso a Datadog | 62 | Alta en Datadog desde IT (sin rol específico) |\n| Acceso a Amplitude | 165 | Alta en Amplitude |\n| 1Password | 71 | Acceso a 1Password desde IT |\n| Solicitud de permisos | 31 | Acceso genérico a una herramienta |\n\n### Cyber · Solicitudes IAM (CYBS · sd=24)\n\n| Request type | rt | Cuándo |\n|--------------|----|--------|\n| Github - Agregar Usuario a Team | 1577 | Sumar alguien a un team existente |\n| Github - Creación de Team | 1576 | Team nuevo en la org |\n| Github - Eliminar Usuario de Team | 1579 | Dar de baja de un team |\n| Github - Alta de Usuario | 1146 | Usuario nuevo en la org GitHub |\n| 1Password | 1042 | Alta de usuario en 1Password vía CYBS |\n| 1Password - Asignar vaults | 1476 | Dar acceso a un vault existente |\n| Datadog - Alta de Usuario | 1144 | Alta con rol en Datadog |\n| Datadog - Cambio de Rol | 1570 | Cambiar rol existente en Datadog |\n| Licencias de Claude | 3474 | Licencias de Claude Code / API |\n| AWS - Alta de Usuario | 1139 | Alta en AWS |\n| Amplitude - Alta de usuario | 1107 | Alta en Amplitude vía CYBS |\n| API Key | 4706 | **SOLO** para Gemini/Claude — no para otros servicios |\n\n### Cyber · Offensive Security (OFFSEC · sd=192)\n\n| Request type | rt | Cuándo |\n|--------------|----|--------|\n| Cyber & GRC Hub | 14111 | Consultas / pedidos generales de ciberseguridad |\n| Pentesting (WebSec / AppSec / Cloud) | 11620 | Solicitar pentest |\n| Security Design Review (Threat Modeling) | 11619 | Threat modeling de un sistema |\n| Vulnerability Disclosure | 11623 | Reportar vulnerabilidad |\n\n### Cyber · GRC Solicitudes (ACR · sd=126)\n\n| Request type | rt | Cuándo |\n|--------------|----|--------|\n| Autoevaluación de Activos | 11579 | — |\n| Autoevaluación de Riesgos | 11578 | — |\n| Solicitudes de auditoria | 12203 | — |\n\n### Platform-Assistant (PEA · sd=23)\n\n| Request type | rt | Cuándo |\n|--------------|----|--------|\n| Investigar un problema | 10936 | Problema en plataforma interna |\n\n## Gotchas de selección de form\n\n- **Crear repo** → HD rt=1404, **no** CYBS. CYBS solo tiene team/access (1576, 1577, 1578, 1579, 1580).\n- **API Key para Datadog** → **no** usar CYBS rt=4706 (ese form es solo Gemini/Claude). Usar CYBS rt=1144 \"Datadog - Alta de Usuario\" y aclarar en descripción que es para API key.\n- **Acceso a GitHub** ambiguo: ¿alta de usuario en la org? → rt=1146. ¿Agregar a un team? → rt=1577. ¿Crear team? → rt=1576.\n- Si el catálogo local no tiene el form → correr `scripts/sync-catalog.sh` antes de concluir que no existe.\n\n## Verificar que el form existe con `get-fields.sh`\n\nConfirmado el `sd` y `rt`, pedile al skill (o corrés vos) el schema del form:\n\n```bash\n~/.claude/skills/modo-jsm-ticket/scripts/get-fields.sh 24 1577\n```\n\nSi devuelve `requestTypeFields[]` con los campos → el form existe y está activo. Si devuelve 404 o lista vacía → el `rt` puede estar deprecado, buscar alternativa.\n\n---\n\n> Siguiente: [02 · Mapear campos](02-mapear-campos.md)\n"},{"id":"02","num":"02","title":"Mapear campos","eyebrow":"Lección 02 · Requeridos + aprobador","file":"02-mapear-campos.md","md":"# 02 · Mapear campos\n\n> Objetivo: dado un `sd` + `rt`, fetcheás el schema de campos y sabés qué preguntar, qué es requerido y cómo no inventar nada.\n\n## Por qué nunca hardcodear `customfield_*`\n\nLos IDs de campos custom cambian por service desk. `customfield_10897` en HD es distinto a `customfield_10897` en CYBS. Si copiás un payload de un ticket anterior de otro portal y mandás los mismos `customfield_*`, el JSM puede rechazarlo con un 400 silencioso o — peor — aceptarlo y guardar valores en el campo equivocado.\n\n> Regla: **siempre fetcheá el schema en runtime**. Nunca asumas un `fieldId`.\n\n## Fetch del schema de campos\n\n```bash\n# API token\nEMAIL=$(cat ~/.atlassian/email)\nTOKEN=$(cat ~/.atlassian/jsm-token)\ncurl -sS -u \"$EMAIL:$TOKEN\" \\\n  \"https://play-sistemico.atlassian.net/rest/servicedeskapi/servicedesk/24/requesttype/1577/field\" \\\n  -H \"Accept: application/json\" | jq .\n```\n\n```js\n// Browser session (evaluate_script)\nfetch(\"/rest/servicedeskapi/servicedesk/24/requesttype/1577/field\", {\n  headers: { \"Accept\": \"application/json\" }\n}).then(r => r.json())\n```\n\nResponse: `{ \"requestTypeFields\": [ { \"fieldId\", \"name\", \"required\", \"jiraSchema\", \"validValues\", \"defaultValues\" } ] }`\n\n## Anatomía de un campo\n\n```json\n{\n  \"fieldId\": \"customfield_10341\",\n  \"name\": \"Empresa o Área Solicitante\",\n  \"required\": true,\n  \"jiraSchema\": { \"type\": \"string\" },\n  \"validValues\": [],\n  \"defaultValues\": []\n}\n```\n\n- `fieldId` → la key que va en `requestFieldValues`.\n- `required: true` → obligatorio; el POST falla sin él.\n- `jiraSchema.type` → determina el shape del valor (ver tabla abajo).\n- `validValues` → si no está vacío, son las opciones válidas (usar `id`, no `value`).\n- `defaultValues` → si el form ya propone un default, podés usarlo sin preguntar.\n\n## Mapping tipo → shape del valor\n\n| Tipo (`jiraSchema.type`) | Shape en el payload | Notas |\n|--------------------------|---------------------|-------|\n| `string` | `\"valor plano\"` | Texto libre, summary, description |\n| `number` | `12500` | Sin comillas, sin separadores |\n| `date` | `\"2026-06-30\"` | ISO 8601 (`YYYY-MM-DD`). En portal web: `D/mmm/YY` |\n| `option` | `{ \"id\": \"10325\" }` | Usar `id` de `validValues`. Si da 400, probar `{ \"value\": \"...\" }` |\n| `array` de `option` | `[{ \"id\": \"10325\" }, { \"id\": \"10326\" }]` | Multi-select |\n| `user` | `{ \"accountId\": \"557058:abc-123\" }` | Resolver con `lookupJiraAccountId` |\n| `array` de `user` | `[{ \"accountId\": \"...\" }]` | Multi-user picker |\n| `priority` | `{ \"name\": \"Medium\" }` | Valores: Highest / High / Medium / Low / Lowest |\n| `attachment` | `[\"TEMP-ID-1\"]` | Dos pasos: subir temp primero |\n| `labels` | `[\"etiqueta-1\", \"etiqueta-2\"]` | Array de strings libres |\n\n## Campo aprobador: cómo identificarlo\n\nEn muchos forms CYBS el aprobador es un campo `user` requerido. Se llama de distintas formas según el form:\n\n- \"Aprobador\"\n- \"Manager / Aprobador\"\n- \"Autorizador\"\n\n> **Es obligatorio y no lo podés inventar.** El JSM no acepta un nombre libre en ese campo — necesitás el `accountId` real del aprobador.\n\n### Cómo resolver el accountId del aprobador\n\n```\n/modo-jsm-ticket lookup fernando.garade@modo.com.ar\n```\n\nO con MCP Atlassian:\n```\nmcp__claude_ai_Atlassian__lookupJiraAccountId  →  emailAddress: \"fernando.garade@modo.com.ar\"\n```\n\nDevuelve `accountId` tipo `\"557058:abc-def-123\"`. Ese es el valor que va en el payload.\n\n> Si hay dos personas con el mismo nombre (ej. Fernando Garade vs Fernando Vega en el user-picker del portal), confirmá el email/displayName exacto antes de seleccionar.\n\n## Campos especiales · validaciones MODO\n\n| Campo | Validación |\n|-------|-----------|\n| CBU (`customfield_10845`) | 22 dígitos exactos |\n| CUIT (`customfield_10795`) | 11 dígitos |\n| Email `user` | Dominio `modo.com.ar` para empleados internos |\n| Fecha de vencimiento (`customfield_10651`) | No anterior a hoy |\n| Adjunto PDF (SDV-375 Solicitar contratación) | PDF, no texto plano |\n\nSi una validación falla, el skill lo dice y pide corrección **antes** del POST. No manda y deja que el JSM rebote.\n\n## Campos opcionales: qué hacer\n\nSi un campo tiene `required: false` y el user no lo aclaró → **no lo incluyas** en el payload. No inventes valores, no pongas `\"\"` o `null`. La API acepta payloads incompletos siempre que los requeridos estén.\n\n## Checklist de mapeo\n\n- [ ] Fetcheé el schema del form (`/servicedesk/{sd}/requesttype/{rt}/field`)\n- [ ] Identifiqué los campos con `required: true`\n- [ ] Para cada `option`: tengo el `id` de `validValues`, no el string display\n- [ ] Para cada campo `user`: resolví el `accountId` con `lookupJiraAccountId`\n- [ ] El aprobador tiene `accountId` real (no nombre libre)\n- [ ] Fechas en formato `YYYY-MM-DD` (API) o `D/mmm/YY` (portal web)\n- [ ] Los campos opcionales no rellenados quedan **fuera** del payload\n\n---\n\n> Siguiente: [03 · Payload + POST](03-payload-post.md)\n"},{"id":"03","num":"03","title":"Payload + POST","eyebrow":"Lección 03 · REST API","file":"03-payload-post.md","md":"# 03 · Payload + POST\n\n> Objetivo: armás el JSON completo, lo revisás y — con confirmación tuya — lo mandás a la API. Sin secretos en el payload, sin POST sorpresa.\n\n## Shape del payload\n\nTodo ticket JSM se crea con `POST /rest/servicedeskapi/request`. El body siempre tiene la misma estructura raíz:\n\n```json\n{\n  \"serviceDeskId\": \"24\",\n  \"requestTypeId\": \"1577\",\n  \"requestFieldValues\": {\n    \"summary\": \"Agregar a modo-landing-dev team — Juan Pérez\",\n    \"description\": \"Necesito agregar a Juan Pérez al GitHub team modo-landing-dev para que trabaje en el próximo sprint.\",\n    \"customfield_XXXXX\": \"...\",\n    \"customfield_YYYYY\": { \"id\": \"10325\" }\n  }\n}\n```\n\nCampos raíz opcionales:\n\n```json\n{\n  \"serviceDeskId\": \"24\",\n  \"requestTypeId\": \"1577\",\n  \"raiseOnBehalfOf\": \"<accountId del beneficiario — solo si pedís por otra persona>\",\n  \"requestParticipants\": [\"<accountId>\"],\n  \"requestFieldValues\": { ... }\n}\n```\n\n> `raiseOnBehalfOf` solo cuando el ticket es para otra persona y el user lo pidió explícito. Default: el ticket queda a nombre tuyo.\n\n## Endpoints\n\n| Verbo | Path | Qué hace |\n|-------|------|----------|\n| POST | `/rest/servicedeskapi/request` | Crear el ticket |\n| GET | `/rest/servicedeskapi/servicedesk/{sd}/requesttype/{rt}/field` | Fetchear schema de campos |\n| GET | `/rest/servicedeskapi/request?requestOwnership=OWNED_REQUESTS` | Tus tickets abiertos |\n| GET | `/rest/servicedeskapi/request/{issueKey}` | Estado de un ticket |\n\nBase URL: `https://play-sistemico.atlassian.net`\n\nHeaders siempre necesarios:\n```http\nAccept: application/json\nContent-Type: application/json\n```\n\nPara búsqueda global de request types: agregar `X-ExperimentalApi: opt-in`.\n\n## Método A: Browser session (preferido, interactivo)\n\nCon Chrome logueado en `play-sistemico.atlassian.net`, el skill ejecuta desde la página:\n\n```js\nconst payload = {\n  \"serviceDeskId\": \"24\",\n  \"requestTypeId\": \"1577\",\n  \"requestFieldValues\": {\n    \"summary\": \"Agregar a modo-landing-dev — Juan Pérez\",\n    \"description\": \"...\",\n    \"customfield_11958\": { \"accountId\": \"557058:abc-def\" }\n  }\n};\n\nconst response = await fetch(\"/rest/servicedeskapi/request\", {\n  method: \"POST\",\n  credentials: \"include\",\n  headers: {\n    \"Content-Type\": \"application/json\",\n    \"Accept\": \"application/json\"\n  },\n  body: JSON.stringify(payload)\n});\nreturn { status: response.status, body: await response.json() };\n```\n\nVentajas: sin token, sin credenciales en disco, refleja exactamente lo que ve el portal.\n\n## Método B: cURL con API token (headless / CI)\n\n```bash\nEMAIL=$(cat ~/.atlassian/email)\nTOKEN=$(cat ~/.atlassian/jsm-token)\n\ncurl -sS -X POST \\\n  \"https://play-sistemico.atlassian.net/rest/servicedeskapi/request\" \\\n  -u \"$EMAIL:$TOKEN\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: application/json\" \\\n  -d '{\n    \"serviceDeskId\": \"24\",\n    \"requestTypeId\": \"1577\",\n    \"requestFieldValues\": {\n      \"summary\": \"Agregar a modo-landing-dev — Juan Pérez\",\n      \"description\": \"...\",\n      \"customfield_11958\": { \"accountId\": \"557058:abc-def\" }\n    }\n  }'\n```\n\n> Nunca pongas el token literal en el payload ni en el `summary`. El token va en el header `Authorization: Basic base64(email:token)`. El payload solo tiene datos del negocio.\n\n### Setup del API token (una vez)\n\n1. Ir a `https://id.atlassian.com/manage-profile/security/api-tokens`\n2. Crear token, copiar valor.\n3. Guardarlo con permisos seguros:\n\n```bash\nmkdir -p ~/.atlassian && chmod 700 ~/.atlassian\nprintf '%s' 'EL_TOKEN_AQUI' > ~/.atlassian/jsm-token\nchmod 600 ~/.atlassian/jsm-token\nprintf '%s' 'tu-email@modo.com.ar' > ~/.atlassian/email\nchmod 600 ~/.atlassian/email\n```\n\n## Preview obligatorio antes del POST\n\n> **Regla dura: nunca POSTear sin mostrarte el payload completo.**\n\nEl skill siempre muestra el JSON antes de crear. Ejemplo de preview:\n\n```\n=== PREVIEW · no se creó nada todavía ===\n\nPOST https://play-sistemico.atlassian.net/rest/servicedeskapi/request\n\n{\n  \"serviceDeskId\": \"24\",\n  \"requestTypeId\": \"1577\",\n  \"requestFieldValues\": {\n    \"summary\": \"Agregar a modo-landing-dev — Juan Pérez\",\n    \"description\": \"Necesito agregar a Juan Pérez (juan.perez@modo.com.ar) al team modo-landing-dev para el sprint de junio.\",\n    \"customfield_11958\": { \"accountId\": \"557058:abc-def-123\" }\n  }\n}\n\nPortal equivalente (crear manualmente):\n  https://play-sistemico.atlassian.net/servicedesk/customer/portal/24/group/-1/create/1577\n\n¿Creo el ticket? (confirmá con \"dale\", \"sí\", \"POST\" o \"crear\")\n```\n\nSolo después de tu confirmación explícita el skill ejecuta el POST.\n\n## Response exitosa (HTTP 201)\n\n```json\n{\n  \"issueId\": \"98765\",\n  \"issueKey\": \"CYBS-6900\",\n  \"requestTypeId\": \"1577\",\n  \"serviceDeskId\": \"24\",\n  \"_links\": {\n    \"jiraRest\": \"https://play-sistemico.atlassian.net/rest/api/2/issue/98765\",\n    \"web\": \"https://play-sistemico.atlassian.net/browse/CYBS-6900\",\n    \"self\": \"https://play-sistemico.atlassian.net/rest/servicedeskapi/request/CYBS-6900\"\n  }\n}\n```\n\nGuardá el `issueKey` (ej. `CYBS-6900`) — lo necesitás para seguimiento y comentarios.\n\n## Errores comunes\n\n| HTTP | Causa típica | Fix |\n|------|-------------|-----|\n| 400 | Campo requerido faltante o `fieldId` incorrecto | Re-fetchear schema y corregir payload |\n| 400 | Valor de `option` enviado como string en vez de `{ \"id\": \"...\" }` | Cambiar al shape correcto |\n| 401 | Token incorrecto o expirado | Regenerar en id.atlassian.com |\n| 403 | El user no es customer de ese portal | Hablar con IT para que te agreguen |\n| 303 → HTML | Sesión del browser expirada | Re-loguearse en play-sistemico.atlassian.net |\n\n---\n\n> Siguiente: [04 · Casos canónicos](04-casos-canonicos.md)\n"},{"id":"04","num":"04","title":"Casos canónicos","eyebrow":"Lección 04 · GitHub · 1Password · GRC","file":"04-casos-canonicos.md","md":"# 04 · Casos canónicos\n\n> Objetivo: los 5 casos más frecuentes para un dev MODO — sabés qué portal, qué `sd/rt`, qué campos pedir y dónde están los gotchas.\n\n## Caso 1 · GitHub: agregar usuario a un team (CYBS)\n\n**Pedido típico**: \"sumá a Juan al team `modo-landing-dev`\"\n\n| | |\n|--|--|\n| Service desk | CYBS · Cyber Solicitudes IAM |\n| sd | 24 |\n| rt | 1577 |\n| Portal | https://play-sistemico.atlassian.net/servicedesk/customer/portal/24/group/-1/create/1577 |\n| Validado live | Antecedente: CYBS-6841 (2026-05-21) |\n\n**Campos típicos** (fetcheá el schema — los `customfield_*` son orientativos):\n\n```json\n{\n  \"serviceDeskId\": \"24\",\n  \"requestTypeId\": \"1577\",\n  \"requestFieldValues\": {\n    \"summary\": \"Agregar a modo-landing-dev — Juan Pérez\",\n    \"description\": \"Pedido de incorporación al GitHub team modo-landing-dev para acceso a repos del squad frontend.\",\n    \"customfield_XXXXX\": \"modo-landing-dev\",\n    \"customfield_YYYYY\": { \"accountId\": \"<accountId_del_usuario>\" },\n    \"customfield_ZZZZZ\": { \"accountId\": \"<accountId_del_aprobador>\" }\n  }\n}\n```\n\n> **Los `customfield_*` reales los obtenés con** `get-fields.sh 24 1577`. No los copies de este ejemplo.\n\n**Campos relacionados**:\n- `sd=24 rt=1576` → Crear un team nuevo (necesitás un team que no existe).\n- `sd=24 rt=1578` → Cambiar miembros en un grupo.\n- `sd=24 rt=1579` → Eliminar usuario de un team.\n- `sd=24 rt=1146` → Alta de usuario nuevo en la org GitHub (si todavía no es miembro de la org).\n\n**Gotcha**: si el usuario no es miembro de la org de GitHub de MODO → primero rt=1146 (Alta de Usuario), después rt=1577 (Agregar a Team). No salteés el alta de org.\n\n**Gotcha**: crear/archivar/renombrar un **repo** no está en CYBS. Usá HD sd=1 rt=1404.\n\n---\n\n## Caso 2 · 1Password (CYBS)\n\n**Pedido típico**: \"necesito acceso a 1Password para la cuenta de modo\"\n\n| | |\n|--|--|\n| Service desk | CYBS · Cyber Solicitudes IAM |\n| sd | 24 |\n| rt | 1042 |\n| Portal | https://play-sistemico.atlassian.net/servicedesk/customer/portal/24/group/-1/create/1042 |\n\nFormas relacionadas según el pedido exacto:\n\n| Necesidad | rt |\n|-----------|-----|\n| Alta de usuario en 1Password | 1042 |\n| Alta como guest | 1041 |\n| Asignar vault existente | 1476 |\n| Crear vault nuevo | 1475 |\n| Generar API token para integraciones | 1474 |\n| Recupero de contraseña | 1469 |\n\n**Campos típicos** (orientativos — fetcheá el schema):\n\n```json\n{\n  \"serviceDeskId\": \"24\",\n  \"requestTypeId\": \"1042\",\n  \"requestFieldValues\": {\n    \"summary\": \"Alta 1Password — Juan Pérez\",\n    \"description\": \"Necesito acceso a 1Password para gestionar credenciales del proyecto modo-landing.\"\n  }\n}\n```\n\nEl form rt=1042 suele requerir solo `summary`. Verificá con el schema — puede pedir aprobador.\n\n---\n\n## Caso 3 · Cyber GRC Hub (OFFSEC)\n\n**Pedido típico**: \"necesito hablar con el equipo de Cyber sobre un diseño de seguridad\" / \"consulta al GRC Hub\"\n\n| | |\n|--|--|\n| Service desk | OFFSEC · Cyber Offensive Security |\n| sd | 192 |\n| rt | 14111 |\n| Portal | https://play-sistemico.atlassian.net/servicedesk/customer/portal/192/group/-1/create/14111 |\n\nEste form es el entry point general para consultas al equipo de Cyber/GRC. Otros forms de OFFSEC:\n\n| Necesidad | rt |\n|-----------|----|\n| Pentest (WebSec / AppSec / Cloud) | 11620 |\n| Threat Modeling / Security Design Review | 11619 |\n| Third-Party & Partner Offensive Audit | 11621 |\n| Vulnerability Disclosure | 11623 |\n\n**Campos típicos** (fetcheá el schema real):\n\n```json\n{\n  \"serviceDeskId\": \"192\",\n  \"requestTypeId\": \"14111\",\n  \"requestFieldValues\": {\n    \"summary\": \"Consulta de diseño de seguridad — nuevo MCP OAuth\",\n    \"description\": \"Estamos diseñando un flujo OAuth para un MCP interno. Queremos validar el modelo de amenazas antes de implementar. Sistema: Node.js + Vercel + KV store.\"\n  }\n}\n```\n\n**SLA**: Cyber-Solicitudes tiene 72h hábiles desde aprobación como referencia general. Verificá el SLA real post-creación con `GET /rest/servicedeskapi/request/{issueKey}/sla`.\n\n---\n\n## Caso 4 · ABM de Repositorios de GitHub (HD)\n\n**Pedido típico**: \"necesito crear el repo `modo-new-feature` en playsistemico\"\n\n| | |\n|--|--|\n| Service desk | HD · IT-Solicitudes |\n| sd | 1 |\n| rt | 1404 |\n| Portal | https://play-sistemico.atlassian.net/servicedesk/customer/portal/1/group/-1/create/1404 |\n| Validado live | HD-11623 (2026-05-26) via Chrome session |\n\nEste es el form para **crear, archivar, renombrar o cambiar visibilidad** de repos en la org GitHub de MODO. Los permisos de teams se piden en CYBS (sd=24).\n\n**Campos típicos** (fetcheá el schema — rt=1404 tiene 8+ campos):\n\n```json\n{\n  \"serviceDeskId\": \"1\",\n  \"requestTypeId\": \"1404\",\n  \"requestFieldValues\": {\n    \"summary\": \"Crear repo modo-new-feature en playsistemico\",\n    \"description\": \"Necesitamos un repo nuevo para el proyecto X. Visibilidad: privado. Template: ninguno.\",\n    \"customfield_10341\": \"Frontend\",\n    \"customfield_10651\": \"2026-12-31\"\n  }\n}\n```\n\n> `customfield_10651` (fecha de vencimiento) no puede ser anterior a hoy. Si la ponés pasada, el JSM rechaza con 400.\n\n**Gotcha**: hay tres request types con el mismo nombre \"ABM de Repositorios de GitHub\" en HD (rt=1175, rt=1403, rt=1404). El validado live es **rt=1404**. Si uno de los otros da 400 en campos, probar 1404.\n\n---\n\n## Caso 5 · Platform-Assistant (PEA)\n\n**Pedido típico**: \"hay algo raro en la plataforma interna, necesito que alguien investigue\"\n\n| | |\n|--|--|\n| Service desk | PEA · Platform-Assistant |\n| sd | 23 |\n| rt | 10936 |\n| Portal | https://play-sistemico.atlassian.net/servicedesk/customer/portal/23/group/-1/create/10936 |\n\n**Campos típicos** (fetcheá el schema):\n\n```json\n{\n  \"serviceDeskId\": \"23\",\n  \"requestTypeId\": \"10936\",\n  \"requestFieldValues\": {\n    \"summary\": \"Error 500 en endpoint /api/merchants — producción\",\n    \"description\": \"Desde las 14:30 ART el endpoint devuelve 500. Última release: v2.421.0. Logs adjuntos.\"\n  }\n}\n```\n\nEl otro form en PEA es `rt=10935` (Email request) — para contacto general.\n\n---\n\n## Tabla resumen\n\n| Caso | Service Desk | sd | rt |\n|------|-------------|----|----|\n| GitHub: agregar usuario a team | CYBS | 24 | 1577 |\n| GitHub: crear team nuevo | CYBS | 24 | 1576 |\n| GitHub: alta usuario en org | CYBS | 24 | 1146 |\n| GitHub: eliminar de team | CYBS | 24 | 1579 |\n| GitHub: repos ABM (crear/archivar) | HD | 1 | 1404 |\n| 1Password: alta usuario | CYBS | 24 | 1042 |\n| 1Password: asignar vault | CYBS | 24 | 1476 |\n| Cyber GRC Hub (consulta general) | OFFSEC | 192 | 14111 |\n| Pentest | OFFSEC | 192 | 11620 |\n| Threat Modeling | OFFSEC | 192 | 11619 |\n| Platform-Assistant | PEA | 23 | 10936 |\n| Datadog: alta usuario | CYBS | 24 | 1144 |\n| Licencias Claude | CYBS | 24 | 3474 |\n\n---\n\n> Siguiente: [05 · Confirmación + tracking](05-confirmacion-tracking.md)\n"},{"id":"05","num":"05","title":"Confirmación + tracking","eyebrow":"Lección 05 · Antes de crear","file":"05-confirmacion-tracking.md","md":"# 05 · Confirmación + tracking\n\n> Objetivo: confirmás el payload antes de crear, obtenés el issue key + URL, y sabés cómo darle seguimiento sin que el ticket se pierda.\n\n## Preview antes del POST: siempre\n\n> **El skill nunca crea un ticket sin mostrarte el payload completo y esperar tu \"dale\".**\n\nEl preview incluye:\n1. El JSON body completo (con los `customfield_*` resueltos y los `accountId` reales).\n2. La URL del portal equivalente para crear manualmente si preferís.\n3. La pregunta explícita de confirmación.\n\nEjemplo:\n\n```\n=== PREVIEW · no se creó nada todavía ===\n\nTicket: Github - Agregar Usuario a Team\nPortal: CYBS (sd=24, rt=1577)\n\n{\n  \"serviceDeskId\": \"24\",\n  \"requestTypeId\": \"1577\",\n  \"requestFieldValues\": {\n    \"summary\": \"Agregar a modo-landing-dev — Juan Pérez\",\n    \"description\": \"Incorporación al team para el sprint de junio.\",\n    \"customfield_11958\": { \"accountId\": \"557058:abc-def-123\" },\n    \"customfield_10341\": \"modo-landing-dev\",\n    \"customfield_10897\": \"Access requerido para trabajar en el squad frontend\"\n  }\n}\n\nURL portal (crear manualmente):\n  https://play-sistemico.atlassian.net/servicedesk/customer/portal/24/group/-1/create/1577\n\n¿Creo el ticket? → confirmá con \"dale\", \"sí\", \"POST\" o \"crear\"\n```\n\nPalabras que el skill reconoce como confirmación: `dale`, `sí`, `si`, `POST`, `crear`, `confirmar`, `ok`. Cualquier otra cosa es un \"no todavía\".\n\n## Output exitoso\n\nCon HTTP 201:\n\n```\nTicket creado ✓\n\n  Issue key : CYBS-6900\n  Portal    : https://play-sistemico.atlassian.net/browse/CYBS-6900\n  Estado    : Open (estado inicial)\n```\n\nEl skill **no** declara \"aprobado\" ni \"en progreso\" — solo confirma el `issueKey` y el estado inicial que devuelve la API. El estado real depende del flujo de aprobación del portal.\n\n## Seguimiento: endpoints útiles\n\n### Ver el estado del ticket\n\n```bash\nEMAIL=$(cat ~/.atlassian/email)\nTOKEN=$(cat ~/.atlassian/jsm-token)\n\ncurl -sS -u \"$EMAIL:$TOKEN\" \\\n  \"https://play-sistemico.atlassian.net/rest/servicedeskapi/request/CYBS-6900/status\" \\\n  -H \"Accept: application/json\" | jq .\n```\n\nResponse: `{ \"currentStatus\": { \"status\": \"Waiting for approval\", \"statusDate\": \"...\" } }`\n\n### Ver comentarios\n\n```bash\ncurl -sS -u \"$EMAIL:$TOKEN\" \\\n  \"https://play-sistemico.atlassian.net/rest/servicedeskapi/request/CYBS-6900/comment\" \\\n  -H \"Accept: application/json\" | jq '.values[].body'\n```\n\n### Ver SLA\n\n```bash\ncurl -sS -u \"$EMAIL:$TOKEN\" \\\n  \"https://play-sistemico.atlassian.net/rest/servicedeskapi/request/CYBS-6900/sla\" \\\n  -H \"Accept: application/json\" | jq '.values[] | { name: .name, completedCycles: .completedCycles }'\n```\n\n### Mis tickets abiertos\n\n```bash\ncurl -sS -u \"$EMAIL:$TOKEN\" \\\n  \"https://play-sistemico.atlassian.net/rest/servicedeskapi/request?requestOwnership=OWNED_REQUESTS&requestStatus=OPEN_REQUESTS&limit=20\" \\\n  -H \"Accept: application/json\" | jq '.values[] | { issueKey: .issueKey, summary: .requestFieldValues.summary }'\n```\n\n## Flujo de aprobación típico en CYBS\n\n```\nTicket creado (Open)\n    ↓\nWaiting for approval  ←── aprobador recibe notif por email/Slack\n    ↓ (aprueba)\nIn Progress           ←── IAM team procesa\n    ↓\nResolved / Done       ←── acceso concedido\n```\n\nSi el aprobador rechaza → el ticket pasa a \"Declined\". Te llega notificación. Podés crear uno nuevo con un aprobador correcto si fue un error de routing.\n\n## SLA de referencia por portal\n\n| Portal | SLA orientativo |\n|--------|----------------|\n| CYBS | 72h hábiles desde aprobación |\n| HD | Variable por form (hardware → varios días; accesos → ~24h) |\n| OFFSEC | Depende del form; Threat Modeling puede tomar semanas |\n| PEA | Sin SLA publicado en el catálogo — preguntar al equipo |\n\n> Verificá el SLA real con `GET /rest/servicedeskapi/request/{issueKey}/sla` — los valores del catálogo son orientativos.\n\n## Comentar en el ticket\n\nSi necesitás agregar información después de crear:\n\n```bash\ncurl -sS -X POST -u \"$EMAIL:$TOKEN\" \\\n  \"https://play-sistemico.atlassian.net/rest/servicedeskapi/request/CYBS-6900/comment\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: application/json\" \\\n  -d '{\n    \"body\": \"Aclaración: el usuario ya es miembro de la org GitHub, solo falta el team.\",\n    \"public\": true\n  }'\n```\n\n## Checklist de cierre\n\n- [ ] Preview mostrado y revisado (campos, `accountId`s, sd/rt correctos)\n- [ ] Confirmación dada explícitamente\n- [ ] `issueKey` guardado (ej. `CYBS-6900`)\n- [ ] URL del portal guardada para seguimiento\n- [ ] SLA conocido / revisado con el endpoint\n- [ ] Si bloqueado en aprobación: contactar al aprobador por Slack con el issue key\n\n---\n\n> Volvé al [README](README.md) o hacé el [Lab integrador](exercises/README.md).\n"},{"id":"lab","num":"🧪","title":"Lab: armar un ticket","eyebrow":"Lab integrador","file":"","md":"# Lab · Armar un ticket de GitHub team access\n\n> Ejercicio integrador. Objetivo: construir el payload completo para agregar un usuario a un GitHub team, en modo **dry-run** (sin POST real), usando el skill `modo-jsm-ticket`.\n\n---\n\n## Escenario\n\nNuevo dev en el equipo de frontend. Necesitás que tenga acceso al GitHub team `modo-landing-dev` en la org `playsistemico`.\n\n- **Beneficiario**: `nuevo.dev@modo.com.ar`\n- **Team target**: `modo-landing-dev`\n- **Aprobador**: tu manager directo (o quien corresponda en tu equipo — usá su email real)\n- **Objetivo**: construir el JSON payload correcto para `POST /rest/servicedeskapi/request` sin crear el ticket todavía.\n\n---\n\n## Paso 1 · Identificar el service desk y request type\n\nSin mirar la solución abajo, buscá en el catálogo:\n\n```bash\ngrep -i \"github.*team\\|team.*github\" \\\n  ~/.claude/skills/modo-jsm-ticket/reference/catalog.md\n```\n\nO con el skill:\n\n```\n/modo-jsm-ticket agregar usuario a GitHub team\n```\n\n- [ ] ¿Cuál es el `sd`? ___\n- [ ] ¿Cuál es el `rt` para \"Agregar Usuario a Team\"? ___\n- [ ] ¿Cuál es la URL del portal para ese form? ___\n\n---\n\n## Paso 2 · Fetchear el schema de campos\n\nCon el `sd` y `rt` que encontraste:\n\n```bash\n# API token\nEMAIL=$(cat ~/.atlassian/email)\nTOKEN=$(cat ~/.atlassian/jsm-token)\ncurl -sS -u \"$EMAIL:$TOKEN\" \\\n  \"https://play-sistemico.atlassian.net/rest/servicedeskapi/servicedesk/<sd>/requesttype/<rt>/field\" \\\n  -H \"Accept: application/json\" | jq '.requestTypeFields[] | { fieldId, name, required }'\n```\n\nO con browser session desde Claude Code:\n\n```\n/modo-jsm-ticket fetch fields sd=<sd> rt=<rt>\n```\n\n- [ ] Listá los campos con `required: true`: ___\n- [ ] ¿Hay algún campo de tipo `user`? ¿Cuál? ___\n- [ ] ¿Hay algún campo de tipo `option`? ¿Cuál? ___\n\n---\n\n## Paso 3 · Resolver los `accountId`\n\nPara el beneficiario y el aprobador necesitás sus `accountId` reales (no el email).\n\nCon MCP Atlassian (desde Claude Code):\n```\nmcp__claude_ai_Atlassian__lookupJiraAccountId  →  emailAddress: \"nuevo.dev@modo.com.ar\"\nmcp__claude_ai_Atlassian__lookupJiraAccountId  →  emailAddress: \"manager@modo.com.ar\"\n```\n\n- [ ] `accountId` del beneficiario: `557058:___`\n- [ ] `accountId` del aprobador: `557058:___`\n\n> Si no tenés acceso al MCP Atlassian en este momento, usá placeholders `ACCOUNT_ID_BENEFICIARIO` y `ACCOUNT_ID_APROBADOR` para el dry-run.\n\n---\n\n## Paso 4 · Armar el payload (dry-run)\n\nCompletá el JSON con los valores reales que obtuviste:\n\n```json\n{\n  \"serviceDeskId\": \"___\",\n  \"requestTypeId\": \"___\",\n  \"requestFieldValues\": {\n    \"summary\": \"Agregar a modo-landing-dev — Nuevo Dev\",\n    \"description\": \"...\",\n    \"CUSTOMFIELD_DEL_TEAM\": \"modo-landing-dev\",\n    \"CUSTOMFIELD_DEL_USUARIO\": { \"accountId\": \"ACCOUNT_ID_BENEFICIARIO\" },\n    \"CUSTOMFIELD_DEL_APROBADOR\": { \"accountId\": \"ACCOUNT_ID_APROBADOR\" }\n  }\n}\n```\n\n- [ ] Los `customfield_*` son los del schema real (no copiados de otra fuente)\n- [ ] El `summary` es claro y describe el pedido en una línea\n- [ ] La `description` incluye contexto: equipo, razón, repo o proyecto\n\n---\n\n## Paso 5 · Preview (sin POST)\n\nPasale el payload al skill para que lo revise:\n\n```\n/modo-jsm-ticket preview sd=24 rt=1577 <pega el JSON>\n```\n\nEl skill debería mostrarte el preview y preguntar confirmación. **No confirmes** — este es el lab, no el ticket real.\n\n- [ ] El preview muestra todos los campos requeridos\n- [ ] No hay `customfield_*` inventados\n- [ ] Los `accountId`s son los correctos (o los placeholders del dry-run)\n- [ ] La URL del portal está incluida en el preview\n\n---\n\n## Checklist final del lab\n\n- [ ] Encontré el service desk correcto (sd=24 · CYBS) y el request type correcto (rt=1577)\n- [ ] Fetcheé el schema del form y listé los campos con `required: true`\n- [ ] Resolví los `accountId` del beneficiario y el aprobador (o usé placeholders)\n- [ ] Armé el JSON payload con los `customfield_*` reales del schema\n- [ ] El skill mostró el preview sin errores\n- [ ] **No POSTeé** — dry-run completo\n\n---\n\n## Solución de referencia (spoiler)\n\n<details>\n<summary>Ver solución (no mirar antes de terminar)</summary>\n\n**sd=24 rt=1577** · Github - Agregar Usuario a Team\n\nLos `customfield_*` exactos los obtenés solo del schema del form en runtime (cambian). Lo que SÍ podés hardcodear:\n\n```json\n{\n  \"serviceDeskId\": \"24\",\n  \"requestTypeId\": \"1577\",\n  \"requestFieldValues\": {\n    \"summary\": \"Agregar a modo-landing-dev — Nuevo Dev\",\n    \"description\": \"Incorporación al GitHub team modo-landing-dev para acceso a repos del squad frontend. Sprint de junio 2026.\",\n    \"<fieldId_team>\": \"modo-landing-dev\",\n    \"<fieldId_usuario>\": { \"accountId\": \"<accountId_del_beneficiario>\" },\n    \"<fieldId_aprobador>\": { \"accountId\": \"<accountId_del_aprobador>\" }\n  }\n}\n```\n\nURL del portal:\n```\nhttps://play-sistemico.atlassian.net/servicedesk/customer/portal/24/group/-1/create/1577\n```\n\nCasos relacionados si el usuario no es miembro de la org GitHub todavía:\n- Primero: sd=24 rt=1146 (Github - Alta de Usuario)\n- Después: sd=24 rt=1577 (Agregar Usuario a Team)\n\n</details>\n\n---\n\n> Volvé al [README del curso](../README.md)\n"}];</script>
