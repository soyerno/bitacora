  <script>window.LESSONS = [{"id":"intro","num":"·","title":"Introducción","eyebrow":"Capacitación interactiva","file":"","md":"# Capacitación · Deploy de un frontend MODO a playsistemico (EKS)\n\n> **Harness = agentes.** Este no es un manual para leer y guardar. Es un curso que se hace **con Claude Code abierto**, donde cada paso lo guía y verifica un skill MODO. Vos seguís, Claude orquesta, los gates te dicen si está bien.\n>\n> Autor: Hernán De Souza · Sr AI Engineer · MODO\n\n---\n\n## Para quién\n\nDev frontend que necesita llevar un repo al org `playsistemico` y desplegarlo en EKS bajo `subdominio.modo.com.ar`. Asumís que ya sabés desarrollar con Next 15/16 y pnpm; lo que aprendés acá es **la capa de plataforma**: cómo funciona la infra compartida de MODO y qué archivos la enchufan.\n\nCaso canónico que atraviesa todo el curso: **aprendeatumodo** (COENXT-308, 7 PRs).\n\n## Qué vas a saber hacer al terminar\n\n1. Verificar que un repo cumple los prerrequisitos para ser desplegable.\n2. Abrir los 6 tickets JSM canónicos en el orden correcto, sin bloquearte.\n3. Clonar promos-hub y armar los 6 PRs de infra (catalog → helm → parameters → ci → cd → docker).\n4. Configurar subdominio, `basePath`/`assetPrefix` y probes correctamente.\n5. Lanzar el primer deploy a develop, verificar el pod `Ready` y hacer smoke test.\n6. Pasar el gate de prod (GRC/OFFSEC) antes de promover a producción.\n\n## Cómo funciona la plataforma (mapa mental)\n\n```\ntu código (Next 15/16, puerto 3000)\n        │\n        ▼\nDockerfile  ──  FROM modo-base:<ver>-node22\n                ENTRYPOINT entrypoint.sh\n        │\n        ▼\nentrypoint.sh  ──  AWS SSM get-parameters-by-path\n                   → export NEXT_PUBLIC_* al proceso\n                   → exec pnpm start\n        │\n        ▼\nci-ms.yaml@v1  ──  lint + test + build imagen + push a ECR\n        │\n        ▼\ncd-ms.yaml@v1  ──  aplica helm/values.yaml con el chart compartido\n                   un namespace por proyecto-env\n        │\n        ▼\nIstio ingress  ──  exposeName: \"<sub>\"\n                   dnsAliasRecord.enabled: true\n                   → <sub>.{env}.modo.com.ar (o <sub>.modo.com.ar en prod)\n```\n\nLo que el repo **no** trae: el Helm chart (es compartido), la lógica de CI/CD (workflows reusables en `playsistemico/workflows`), la creación de DNS/ALB (la hace la plataforma a partir de `values.yaml`).\n\n## Learning path\n\n| # | Lección | Skill harness | Gate que toca |\n|---|---------|---------------|---------------|\n| 00 | [Prerrequisitos](00-prerequisitos.md) | `modo-frontend-onboarding`, `github-packages-auth` | — |\n| 01 | [Tickets JSM](01-tickets-jsm.md) | `modo-jsm-ticket` | — |\n| 02 | [PRs de infra](02-infra-prs.md) | `modo-frontend-onboarding`, `modo-frontend-deploy` | — |\n| 03 | [Subdominio + basePath](03-subdominio-basepath.md) | `modo-frontend-deploy` | DNS / Istio |\n| 04 | [Deploy + verify](04-deploy-verify.md) | `modo-frontend-deploy`, `modo-landing-smoke-test` | probes + FQDN |\n| 05 | [Gate de prod](05-gate-prod.md) | `modo-jsm-ticket` | GRC / OFFSEC |\n| 🧪 | [Lab: publicar un front](exercises/README.md) | todos | los 6 |\n\n## Atajo: el agente orquestador\n\nSi ya entendés el flujo y querés que un agente lo maneje punta a punta:\n\n```\n/modo-frontend-deploy\n```\n\nTriple-layer skill (skill + agent + slash command) que recorre el runbook canónico paso a paso: audita el estado actual, crea los archivos de infra en un worktree, te guía por los tickets JSM y te deja con los PRs listos para mergear.\n\n## Reglas del equipo que el curso respeta\n\n- **Sin `console.log/error/warn`** en prod.\n- **Sin tokens hardcodeados** — `.npmrc` usa `${NODE_AUTH_TOKEN}`, nunca un `ghp_…` literal.\n- **Un solo lockfile** (pnpm). Si hay varios, convergé antes de pushear.\n- **Commits**: `type(COENXT-XXX): Subject` — scope = Jira.\n- **No inventar**: ownership, aprobador, KMS ARNs, channel IDs de Slack → preguntar o `TODO(devops)`.\n- **No claim sin verify**: antes de declarar \"deploy listo\", verificar pod `Ready` + FQDN responde.\n\n> Empezá por [00 · Prerrequisitos](00-prerequisitos.md).\n"},{"id":"00","num":"00","title":"Prerrequisitos","eyebrow":"Lección 00 · Harness: modo-frontend-onboarding","file":"00-prerequisitos.md","md":"# 00 · Prerrequisitos\n\n> Harness: `modo-frontend-onboarding`, `github-packages-auth`\n\nAntes de tocar un solo archivo de infra, verificá que tenés todo lo que la plataforma necesita. Esta lección es el pre-flight check. Salir sin un tick en cada ítem = bloquearte más adelante.\n\n---\n\n## Herramientas locales\n\n```bash\n# Node — tiene que ser 22.x\nnode -v          # esperado: v22.x.x\n\n# pnpm — package manager estándar del workspace\npnpm -v          # esperado: 9.x o superior\n\n# gh CLI — para crear PRs y verificar repos\ngh --version\n\n# sops — para encriptar parameters/ (lo usás en lección 02)\nsops --version   # si falta: brew install sops\n```\n\n- [ ] `node -v` muestra v22.x (`nvm use 22.22.2` si tenés nvm)\n- [ ] `pnpm -v` responde sin error\n- [ ] `gh --version` responde sin error\n- [ ] `sops --version` responde sin error\n\n---\n\n## Auth a GitHub: org `playsistemico`\n\n```bash\n# Verificar auth actual\ngh auth status\n\n# Si no muestra playsistemico entre las orgs, reautenticá con el scope correcto\ngh auth login --scopes \"read:org,repo,read:packages\"\n```\n\nVerificar que podés ver el org:\n\n```bash\ngh repo list playsistemico --limit 5\n```\n\n- [ ] `gh auth status` muestra autenticación activa\n- [ ] `gh repo list playsistemico` devuelve repos (no \"not found\" ni 404)\n\n---\n\n## `~/.npmrc` con GitHub Packages\n\nPara instalar paquetes `@playsistemico` localmente necesitás un token de GH con `read:packages`.\n\n```\n# ~/.npmrc — mínimo necesario\n@playsistemico:registry=https://npm.pkg.github.com/\n//npm.pkg.github.com/:_authToken=<TU_TOKEN_GH_read:packages>\n```\n\n> **Importante**: el token va en `~/.npmrc` local (no en el repo). El repo usa `${NODE_AUTH_TOKEN}` como variable. Si encontrás un token hardcodeado y commiteado en `.npmrc` del repo → **parar**, avisar, rotar el token y scrubear el history.\n\nVerificar que la autenticación funciona:\n\n```bash\nexport NODE_AUTH_TOKEN=\"$(grep -m1 'npm.pkg.github.com/:_authToken=' ~/.npmrc | sed 's/.*_authToken=//')\"\nnpm view @playsistemico/modo-landing-web-ui-lib --registry https://npm.pkg.github.com/\n```\n\n- [ ] `~/.npmrc` tiene `_authToken=` con un token real (no placeholder)\n- [ ] El `npm view` devuelve metadata del paquete (no 401 ni 403)\n\nSi necesitás ayuda con el token: usá el skill `github-packages-auth` (`/github-packages-auth`).\n\n---\n\n## Repo destino en `playsistemico`\n\nEl repo tiene que existir antes de pushear cualquier PR de infra. Verificá:\n\n```bash\ngh repo view playsistemico/<nombre-de-tu-repo>\n```\n\nSi devuelve `Could not resolve to a Repository` → el repo no existe. Tenés que abrirlo vía ticket JSM (lección [01 · Tickets JSM](01-tickets-jsm.md), ticket #1 HD-1404). **No crear el repo a mano** — el proceso pasa por devops para que queden los permisos correctos.\n\n- [ ] `gh repo view playsistemico/<tu-repo>` devuelve el repo (no 404)\n\n---\n\n## Repo molde: `promos-hub-site`\n\nLas lecciones 02–04 clonan archivos de `promos-hub-site`. Necesitás tenerlo disponible local (no hace falta que sea el working directory):\n\n```bash\ngh repo clone playsistemico/promos-hub-site /tmp/promos-hub-site -- --depth=1\nls /tmp/promos-hub-site/helm/ /tmp/promos-hub-site/.github/workflows/\n```\n\n- [ ] El clone respondió sin error\n- [ ] Ves `values.yaml` y `namespace.yaml` en `helm/`\n- [ ] Ves al menos `ci.yaml`, `cd.yaml`, `ssm.yaml` en `.github/workflows/`\n\n> `promos-hub-site` es el molde canónico de un front MODO en k8s (Next 15, subdominio + subpath, vivo en producción). Lo que no sepás si hacer, mirá cómo lo hace promos.\n\n---\n\n## Decisiones previas (antes de arrancar las lecciones)\n\nAntes de tocar un archivo, respondé estas preguntas. Si alguna no la sabés, preguntale al lead del squad — no asumas defaults silenciosos.\n\n| Pregunta | Por qué importa |\n|----------|----------------|\n| ¿Cuál es el `PROJECT_NAME`? (kebab-case, único) | Define namespace k8s, path en SSM (`/<name>/<env>/`), nombre en Datadog |\n| ¿Subdominio dedicado o embebido bajo un path? | Define `exposeName` vs `assetPrefix` + rewrites |\n| ¿El framework es Next 15/16 server-rendered? | La infra asume `next start` en puerto `3000`. Vite/SPA no funciona sin migrar primero |\n| ¿Quién es el aprobador del ticket JSM? | Obligatorio para el ticket de provisioning — no se inventa |\n| ¿Cuál es el canal de Slack para notificar CI/CD? | El `channel:` en `ci.yaml` y `production.yaml` — `TODO(devops)` si no lo sabés |\n\n- [ ] `PROJECT_NAME` definido y verificado que sea único\n- [ ] Tipo de exposición elegido (subdominio vs path)\n- [ ] El repo corre `next start` y bindea `:3000` (verificar local)\n\n---\n\n## Checklist de salida\n\n- [ ] Node 22, pnpm, gh CLI y sops instalados\n- [ ] Auth a `playsistemico` confirmada\n- [ ] `~/.npmrc` con token GH Packages funcional\n- [ ] Repo destino existe en `playsistemico`\n- [ ] `promos-hub-site` clonado en `/tmp/promos-hub-site`\n- [ ] Decisiones de `PROJECT_NAME` + tipo de exposición tomadas\n\n> Siguiente: [01 · Tickets JSM](01-tickets-jsm.md)\n"},{"id":"01","num":"01","title":"Tickets JSM","eyebrow":"Lección 01 · Harness: modo-jsm-ticket","file":"01-tickets-jsm.md","md":"# 01 · Tickets JSM\n\n> Harness: `modo-jsm-ticket` (`/modo-jsm-ticket`)\n\nUn front nuevo en `playsistemico` dispara seis tickets en el portal JSM de MODO. Esta lección explica cuáles son, cuándo abrirlos y en qué orden — porque equivocarse en el orden bloquea la siguiente fase.\n\n---\n\n## Los 6 tickets canónicos\n\n| # | Fase | Service Desk | Request Type | sd / rt | Cuándo |\n|---|------|--------------|--------------|---------|--------|\n| 1 | Bootstrap | HD · IT-Solicitudes | ABM de Repositorios de GitHub | 1 / **1404** | Antes de pushear infra |\n| 2 | Bootstrap | CYBS · Cyber-Solicitudes IAM | Github - Creación de Team | 24 / 1576 | Después de #1 cerrado |\n| 3 | Bootstrap | CYBS · Cyber-Solicitudes IAM | Github - Agregar Usuario a Team | 24 / 1577 | Después de #2 cerrado |\n| 4 | Config k8s | PEA · Platform-Assistant | Investigar un problema | 23 / 10936 | Solo si necesitás KMS nuevas, DNS manual, o ALB legacy |\n| 5 | Pre-prod | OFFSEC · Cyber Offensive Security | Cyber & GRC Hub | 192 / 14111 | Al pasar preprod (GATE de prod) |\n| 6 | Post-prod | CYBS · Cyber-Solicitudes IAM | 1Password | 24 / 1042 | Solo después de prod desplegado |\n\n> **Rt=1404 es el único validado live para HD-1404.** El catálogo expone también `rt=1175` y `rt=1403` con el mismo nombre — están deprecated. Usar siempre 1404.\n\n---\n\n## Reglas de orden (crítico)\n\n```\nBootstrap (antes de código)\n  → #1 crear repo (HD-1404)\n  → #2 crear team (CYBS-1576)     ← esperar cierre de #1\n  → #3 agregar miembros (CYBS-1577) ← esperar cierre de #2\n\nConfig k8s\n  → #4 PEA-10936  (SOLO si: KMS keys nuevas / DNS manual / misc-alb.yml legacy)\n\nAl pasar preprod (antes de prod)\n  → #5 GRC review / threat model  ← GATE: si rebota, no hay prod\n\nPost-prod\n  → #6 1Password vault             ← solo después de prod desplegado\n```\n\n### Anti-patrones a evitar\n\n- **\"Cyber para crear el repo\"** — no existe. CYBS no crea repos; solo gestiona teams y accesos. El repo es siempre HD-1404.\n- **Abrir #5 el día de prod** — el SLA de OFFSEC no está declarado; tratalo como ≥72h. Abrilo al entrar a preprod.\n- **Abrir #6 antes de prod** — el vault de prod no tiene credenciales que cargar hasta que prod esté desplegado.\n- **Reusar `rt=1175` o `rt=1403`** — deprecated, pueden tener fields distintos al form actual.\n\n---\n\n## SLAs\n\n| Ticket | SLA |\n|--------|-----|\n| CYBS (sd=24): #2, #3, #6 | **72h hábiles** desde aprobación |\n| OFFSEC (sd=192): #5 | No declarado — tratá como ≥72h, confirmá en el portal |\n| HD (sd=1): #1 | No declarado en el catálogo |\n| PEA (sd=23): #4 | No declarado |\n\n> Si tu fecha objetivo de prod es el lunes, meté #2 y #3 el martes anterior como mínimo. Calendarizá hacia atrás.\n\n---\n\n## Cómo abrirlos con el harness\n\nEl skill `modo-jsm-ticket` arma el payload, te muestra un preview con la URL del portal, y POSTea solo con tu confirmación explícita. Devuelve el issue key + link.\n\n```\n/modo-jsm-ticket\n```\n\nAl invocar, Claude te pregunta el ticket que querés abrir y los campos necesarios. Para #1 y #3 los templates están validados live (HD-11623, CYBS-6841); para los otros cuatro el skill hace un `fetch fields fresh` del portal antes de armar el payload.\n\n> **Preguntar el aprobador antes de POSTear** — es campo obligatorio del ticket y no se inventa. Si no lo sabés, pedíselo al lead o manager del squad.\n\n---\n\n## Verificar que #1 cerró antes de seguir\n\n```bash\n# Chequear que el repo existe antes de arrancar los PRs de infra\ngh repo view playsistemico/<nombre-de-tu-repo>\n```\n\nSi devuelve 404 → #1 no está cerrado o devops todavía no procesó. No sigas a la lección 02 hasta tener el repo.\n\n---\n\n## Tickets opcionales\n\nSegún el proyecto pueden hacer falta:\n\n| Necesidad | Service Desk | sd / rt |\n|-----------|--------------|---------|\n| Datadog API key | CYBS · Cyber-Solicitudes IAM | 24 / 1144 |\n| AWS · Alta de usuario | CYBS · Cyber-Solicitudes IAM | 24 / 1139 |\n| Acceso a AWS | HD · IT-Solicitudes | 1 / 64 |\n\nMismas reglas de orden y SLA que los CYBS canónicos.\n\n---\n\n## Checklist de salida\n\n- [ ] #1 HD-1404 abierto (o ya cerrado con el repo existiendo)\n- [ ] #2 CYBS-1576 abierto (después del cierre de #1)\n- [ ] #3 CYBS-1577 abierto (después de #2)\n- [ ] SLAs anotados en el calendario: CYBS ≥72h hábiles\n- [ ] Aprobador del ticket registrado (no inventado)\n- [ ] `gh repo view playsistemico/<repo>` devuelve el repo\n\n> Siguiente: [02 · PRs de infra](02-infra-prs.md)\n"},{"id":"02","num":"02","title":"PRs de infra","eyebrow":"Lección 02 · Harness: clonar promos-hub","file":"02-infra-prs.md","md":"# 02 · PRs de infra\n\n> Harness: `modo-frontend-onboarding`, `modo-frontend-deploy` (`/modo-frontend-deploy`)\n\nEsta lección crea los 6 PRs de infra que enchufan tu repo a la plataforma compartida. El patrón es **clonar promos-hub-site** ajustando los valores per-project, y abrir un PR por concern (sin overlap de archivos). Así cada PR es reviewable en paralelo y su rollback es aislado.\n\n---\n\n## Qué aporta el repo vs qué es compartido\n\nLa plataforma MODO funciona porque **separó la responsabilidad**. Tu repo aporta la config declarativa; la plataforma trae la lógica.\n\n| Tu repo aporta | La plataforma trae |\n|----------------|--------------------|\n| `helm/values.yaml` + `helm/namespace.yaml` | Helm chart compartido v1.15.3 (vía `cd-ms.yaml@v1`) |\n| `.github/workflows/ci.yaml` (solo llama) | `playsistemico/workflows/ci-ms.yaml@v1` |\n| `.github/workflows/cd.yaml` (solo llama) | `playsistemico/workflows/cd-ms.yaml@v1` |\n| `parameters/<env>/*.yaml` (cifrados SOPS) | Workflow `ssm-sops.yaml@v1` → AWS SSM |\n| `Dockerfile` + `entrypoint.sh` | Imagen base `modo-base:<ver>-node22` |\n| `catalog/global.yaml` | Workflow `catalog@v1` → service catalog |\n\n> No copiés el chart. No copiés los workflows reusables. Tu repo solo llama — la lógica vive en `playsistemico/workflows`.\n\n---\n\n## Los 6 PRs y sus archivos (sin overlap)\n\n| PR | Branch sugerida | Archivos | Nota |\n|----|----------------|----------|------|\n| catalog | `feat/infra-catalog` | `catalog/global.yaml` + `catalog.yaml` workflow | Provisiona el service catalog |\n| helm | `feat/infra-helm` | `helm/values.yaml` + `helm/namespace.yaml` | Probes a `/<basePath>` si hay basePath |\n| parameters | `feat/infra-parameters` | `.sops.yaml` + `parameters/<env>/configurations.yaml` + `parameters/<env>/secrets.yaml` | Necesita ARNs KMS de devops |\n| ci | `feat/infra-ci` | `.github/workflows/ci.yaml` + `pr.yaml` + `sonar-project.properties` | Necesita secrets de org |\n| cd | `feat/infra-cd` | `.github/workflows/cd.yaml` + `production.yaml` | — |\n| docker | `feat/infra-docker` | `Dockerfile` + `entrypoint.sh` + `.dockerignore` + `.npmrc` | `chmod +x entrypoint.sh` antes del commit |\n\n> **Sin overlap** = cada archivo aparece en exactamente un PR. Así podés mergear o revertir un PR sin tocar los demás.\n\n---\n\n## Receta de creación (paso a paso)\n\n### 1. Scaffold de todos los archivos en una branch local\n\nPrimero creás todos los archivos en una sola branch (no se pushea; es solo la fuente):\n\n```bash\n# Asegurate de estar en un worktree dedicado\ngit worktree add /tmp/<repo>-infra -b feat/infra-scaffold origin/main\ncd /tmp/<repo>-infra\n\n# Copiá los archivos de promos-hub y ajustá los valores per-project\n# (ver tabla de sustituciones abajo)\ncp /tmp/promos-hub-site/Dockerfile .\ncp /tmp/promos-hub-site/entrypoint.sh . && chmod +x entrypoint.sh\ncp /tmp/promos-hub-site/.dockerignore .\ncp /tmp/promos-hub-site/.npmrc .\ncp -r /tmp/promos-hub-site/helm .\ncp /tmp/promos-hub-site/.sops.yaml .\ncp -r /tmp/promos-hub-site/parameters .\ncp -r /tmp/promos-hub-site/catalog .\ncp -r /tmp/promos-hub-site/.github .\n\n# Ajustá los valores per-project (ver tabla abajo)\n# Commitear en la branch scaffold (fuente para las slices)\ngit add -A && git commit -m \"chore(COENXT-XXX): scaffold infra EKS (clon promos-hub)\"\nINFRA_SHA=$(git rev-parse HEAD)\necho \"INFRA_SHA=$INFRA_SHA\"\n```\n\n### 2. Tabla de sustituciones promos → tu proyecto\n\n| Campo | Valor promos-hub | Reemplazar por |\n|-------|-----------------|----------------|\n| `app.name` en `values.yaml` | `\"promos-hub-site\"` | `\"<tu-project-name>\"` |\n| `exposeName` en `values.yaml` | `\"promoshub\"` | `\"<tu-exposeName>\"` (o quitarlo si es apex/basePath) |\n| `containerPort` + probes | `3000` | `3000` para Next 15/16 (no cambiar si usás el default) |\n| `PROJECT_NAME` en `namespace.yaml` | `promos-hub-site` | `<tu-project-name>` |\n| `channel:` en `ci.yaml` | `\"C04FCA0BG6S\"` | `TODO(devops)` — pedíselo al squad |\n| `extra-content:` en `ci.yaml` | `\"loaderNextImage/ dist/\"` | Solo `\"dist/\"` si no tenés loader custom |\n| KMS ARNs en `.sops.yaml` | ARNs de promos | `TODO(devops)` — pedíselos a DevOps |\n| `parameters/<env>/` contenido | Vars de promos | Vars de tu proyecto (limpiarlas antes de cifrar) |\n\n> **ARNs de KMS**: no copies los de promos. Son por-repo. Pedíselos a DevOps o copiá los de un repo hermano que tu squad ya tenga. El `.sops.yaml` sin ARNs reales no puede cifrar — dejá `TODO(devops)` y el PR de parameters se revisará con ARNs pendientes.\n\n### 3. Abrir cada PR como slice del scaffold\n\nPara cada PR, creás una branch desde `main` del repo destino, le aplicás solo los archivos que le corresponden del scaffold, y abrís el PR:\n\n```bash\n# Ejemplo para el PR de helm\ngit checkout -b feat/infra-helm origin/main\ngit checkout $INFRA_SHA -- helm/\ngit add helm/ && git commit -m \"chore(COENXT-XXX): infra helm (values + namespace)\"\ngit push origin feat/infra-helm\ngh pr create --repo playsistemico/<repo> \\\n  --base main \\\n  --head feat/infra-helm \\\n  --title \"chore(COENXT-XXX): infra helm (values + namespace)\" \\\n  --body \"PR 2/6 de infra. Aporta helm/values.yaml + helm/namespace.yaml clonando promos-hub.\n  Pendiente: confirmar containerPort y probes con el squad.\"\n```\n\nRepetir para cada uno de los 6 PRs, cambiando los paths y el mensaje.\n\n---\n\n## Trap del retarget (si mergean antes de tiempo)\n\nLos 6 PRs de infra targetean `main`. Si alguien mergea el PR de migración base y GitHub tiene *delete-branch-on-merge* activo, los PRs pueden quedar sin base. Opciones:\n\n- **(a) Retargetear** los 6 PRs a `main` después del merge: `gh pr edit <N> --base main`. OJO: no rebasa, solo cambia el ref; el diff puede verse inflado.\n- **(b) Serializar**: mergear la migración, rebasar las branches de infra sobre `main`, recién abrir los PRs. Diff limpio pero más lento.\n- **(c) Desactivar delete-on-merge** para el PR base.\n\nElegí la opción que tenga sentido para tu flujo. El rollback de infra es siempre aislado por concern.\n\n---\n\n## Anatomía del repo desplegable (inventario)\n\nAl final de esta lección tu repo tiene que tener todos estos archivos. Si falta alguno, el deploy falla silencioso o no enchufa:\n\n```\nrepo/\n├── Dockerfile                         # FROM modo-base:<ver>-node22\n├── entrypoint.sh                      # baja config de SSM + exec pnpm start\n├── .dockerignore\n├── .npmrc                             # ${NODE_AUTH_TOKEN} — nunca hardcodeado\n├── helm/\n│   ├── values.yaml                    # subdominio, probes, recursos, autoscaling\n│   └── namespace.yaml                 # <project>-<env> + istio-injection: enabled\n├── .sops.yaml                         # reglas KMS por env\n├── parameters/\n│   ├── develop/{configurations,secrets}.yaml    # SOPS-cifrados\n│   ├── qa/{configurations,secrets}.yaml\n│   ├── preprod/{configurations,secrets}.yaml\n│   └── production/{configurations,secrets}.yaml\n├── catalog/\n│   └── global.yaml\n└── .github/workflows/\n    ├── ci.yaml        # → ci-ms.yaml@v1\n    ├── pr.yaml        # → pr-ms.yaml@v1\n    ├── cd.yaml        # → cd-ms.yaml@v1 (develop/qa/preprod)\n    ├── production.yaml # → cd-ms.yaml@v1 (prod, manual)\n    ├── ssm.yaml       # → ssm-sops.yaml@v1\n    └── catalog.yaml   # → catalog@v1\n```\n\n---\n\n## Checklist de salida\n\n- [ ] Branch scaffold creada con todos los archivos (valores per-project aplicados)\n- [ ] `app.name` en `values.yaml` = `<tu-project-name>` (único)\n- [ ] `containerPort` y probes apuntan al puerto correcto (`:3000` para Next)\n- [ ] `.npmrc` usa `${NODE_AUTH_TOKEN}` — no hay `ghp_…` literal\n- [ ] `entrypoint.sh` tiene `chmod +x` aplicado\n- [ ] KMS ARNs en `.sops.yaml`: tienen valor real o están marcados `TODO(devops)`\n- [ ] 6 PRs abiertos en `playsistemico/<repo>` con branches sin overlap\n- [ ] Cuerpo de cada PR dice qué archivos toca y si tiene dependencia de otro PR o de devops\n\n> Siguiente: [03 · Subdominio + basePath](03-subdominio-basepath.md)\n"},{"id":"03","num":"03","title":"Subdominio + basePath","eyebrow":"Lección 03 · Istio + DNS","file":"03-subdominio-basepath.md","md":"# 03 · Subdominio + basePath\n\n> Harness: `modo-frontend-deploy` (`/modo-frontend-deploy`) · Istio + DNS\n\nEsta lección cubre cómo le decís a la plataforma dónde vivir. Hay tres patrones; elegís uno según el rol del front. Confundir `basePath` con `assetPrefix` o poner las probes en el path equivocado son los dos bugs más frecuentes en el primer deploy.\n\n---\n\n## Los tres patrones de exposición\n\n### Patrón A — Apex (caso `modo-landing`)\n\nEl front es la raíz de `modo.com.ar`. No tiene subdominio propio ni prefijo de path.\n\n```yaml\n# helm/values.yaml\ndomainName: modo.com.ar\nexposeAliases: ['www']\n```\n\nResultado por env:\n\n| Env | FQDN |\n|-----|------|\n| develop | `develop.modo.com.ar` |\n| qa | `qa.modo.com.ar` |\n| preprod | `preprod.modo.com.ar` |\n| production | `modo.com.ar` + `www.modo.com.ar` |\n\nNo usás `exposeName` ni `dnsAliasRecord`. Las probes van a `/`:\n\n```yaml\nlivenessProbe:\n  parameters: { path: /, port: 3000 ... }\nreadinessProbe:\n  parameters: { path: /, port: 3000 ... }\n```\n\n---\n\n### Patrón B — Subdominio dedicado (caso `promos-hub-site`)\n\nEl front vive en `<sub>.modo.com.ar`. Es el patrón estándar para un front nuevo.\n\n```yaml\n# helm/values.yaml\ndomainName: modo.com.ar\nexposeName: \"mifront\"         # → mifront.modo.com.ar en prod\ndnsAliasRecord:\n  enabled: true               # la plataforma crea el record DNS automáticamente\nistio:\n  enabled: true\n  external: true              # gateway externo → expuesto a internet\n```\n\nResultado por env:\n\n| Env | FQDN |\n|-----|------|\n| develop | `mifront.develop.modo.com.ar` |\n| qa | `mifront.qa.modo.com.ar` |\n| preprod | `mifront.preprod.modo.com.ar` |\n| production | `mifront.modo.com.ar` |\n\nLas probes van a `/` (la app vive en root en su subdominio):\n\n```yaml\nlivenessProbe:\n  parameters: { path: /, port: 3000 ... }\n```\n\n> **`exposeName` define el prefijo del subdominio.** Tiene que ser único en la plataforma y coincidir con la identidad del proyecto. No uses guiones bajos — solo minúsculas y guiones medios.\n\n---\n\n### Patrón C — Embebido bajo un path: `modo.com.ar/<path>`\n\nEl front no tiene subdominio propio; vive dentro del apex como un subpath. O tiene ambos (doble exposición, como promos).\n\n```js\n// next.config.mjs\nconst nextConfig = {\n  assetPrefix: \"/mipath\",   // los assets se piden a /mipath/_next/*\n  distDir: \"./dist/\",\n  async rewrites() {\n    return [\n      { source: \"/mipath/_next/:path*\", destination: \"/_next/:path*\" },\n    ];\n  },\n};\n```\n\n```bash\n# config runtime (parameters/<env>/configurations.yaml)\nNEXT_PUBLIC_BASE_PATH: /mipath\n```\n\n> **`basePath` vs `assetPrefix`** — no son lo mismo:\n> - `assetPrefix` solo afecta los assets estáticos (`_next/static/`). La app puede seguir viviendo en `/` en su subdominio.\n> - `basePath` hace que **todas** las rutas de la app vivan bajo `/mipath`, incluso en el subdominio propio. Usalo solo si el front **solo** vive embebido y nunca como root.\n>\n> promos usa `assetPrefix` (+ rewrite) porque también tiene subdominio propio. Si tu front solo existe embebido bajo un path, usá `basePath`.\n\nCuando usás `basePath`, las probes **tienen que apuntar al path**:\n\n```yaml\nlivenessProbe:\n  parameters: { path: /mipath, port: 3000 ... }\nreadinessProbe:\n  parameters: { path: /mipath, port: 3000 ... }\n```\n\n> **Trampa clásica con `basePath`**: si las probes van a `/` y la app tiene `basePath: /mipath`, el pod responde 404 en `/` y el pod **nunca queda Ready**. El cluster lo mata y reinicia en loop. Siempre que haya `basePath`, las probes van al path.\n\n---\n\n## Istio external: cuándo hace falta ticket\n\nCon `dnsAliasRecord.enabled: true` + `istio.external: true`, la plataforma crea el DNS y la regla del gateway automáticamente. **No hace falta ticket a PE CloudOps** para el caso estándar.\n\nCuando sí hace falta ticket (PEA-10936):\n\n- Necesitás KMS keys nuevas para el `.sops.yaml`.\n- El chart que estás usando es una versión vieja que **no** soporta `dnsAliasRecord` — en ese caso el DNS se crea con una regla manual en `misc-alb.yml` del repo `payment-k8s-services`.\n- Pedido genérico de plataforma que no entra en los otros tickets.\n\n> Si no sabés qué versión de chart estás usando, preguntale a CloudOps antes de asumir que `dnsAliasRecord` funciona.\n\n---\n\n## ALB legacy (caso borde)\n\nAlgunos fronts viejos no usan istio-external sino una regla manual en `payment-k8s-services/misc-alb.yml`. Ese es el fallback si el chart no soporta `dnsAliasRecord`. El proceso:\n\n1. Ticket PEA-10936 a PE CloudOps con la regla que necesitás.\n2. Ellos la agregan a `misc-alb.yml`.\n3. Vos no tenés write access a ese repo — el diff va en el ticket.\n\nCaso canónico: PE-3192. No es el patrón nuevo — si tenés opción, usá `dnsAliasRecord` + `istio.external`.\n\n---\n\n## Verificar la config antes de mergear\n\nAntes de mergear el PR de helm, verificá mentalmente estas tres preguntas:\n\n1. ¿`app.name` en `values.yaml` coincide con el `PROJECT_NAME` que dijiste en la lección 00? (define el namespace y el path SSM)\n2. ¿Las probes apuntan al `path` correcto para tu tipo de exposición?\n3. ¿El `containerPort` coincide con el puerto donde escucha `next start`? (3000 para Next 15/16)\n\n```bash\n# Verificar que la app levanta en el puerto esperado antes de pushear\npnpm build && pnpm start &\nsleep 5\ncurl -fsS -o /dev/null -w '%{http_code}\\n' http://localhost:3000/   # debe ser 200\n# Si tenés basePath:\ncurl -fsS -o /dev/null -w '%{http_code}\\n' http://localhost:3000/mipath   # 200\ncurl -s  -o /dev/null -w '%{http_code}\\n' http://localhost:3000/          # 404\nkill %1\n```\n\n---\n\n## Checklist de salida\n\n- [ ] Tipo de exposición elegido: apex / subdominio / path / doble\n- [ ] `exposeName` definido (único, sin guiones bajos) si es subdominio\n- [ ] `dnsAliasRecord.enabled: true` + `istio.external: true` si es subdominio\n- [ ] Probes apuntan al path correcto (`/` o `/<basePath>`)\n- [ ] `containerPort` en `values.yaml` = puerto real donde escucha la app (`:3000`)\n- [ ] `assetPrefix`/`basePath` en `next.config` si aplica + rewrite `_next`\n- [ ] `NEXT_PUBLIC_BASE_PATH` en `parameters/<env>/configurations.yaml` si aplica\n- [ ] Ticket PEA-10936 abierto si necesitás KMS o ALB legacy (o confirmado que no hace falta)\n\n> Siguiente: [04 · Deploy + verify](04-deploy-verify.md)\n"},{"id":"04","num":"04","title":"Deploy + verify","eyebrow":"Lección 04 · SOPS→SSM + probes","file":"04-deploy-verify.md","md":"# 04 · Deploy + verify\n\n> Harness: `modo-frontend-deploy`, `modo-landing-smoke-test` · SOPS→SSM + probes\n\nEsta lección arranca el primer deploy a develop y lo verifica. No declarás \"deploy listo\" hasta tener pod `Ready` + FQDN responde + smoke curl 200. Un claim sin verify no sirve.\n\n---\n\n## El flujo de un deploy k8s MODO\n\n```\n1. push a main (código)\n      │\n      ▼\n   ci.yaml  → ci-ms.yaml@v1\n      │  lint + test + SonarCloud + docker build + push a ECR\n      ▼\n   imagen tagueada en el registry (tag = SHA del commit)\n\n2. push parámetros (parameters/**)\n      │\n      ▼\n   ssm.yaml  → ssm-sops.yaml@v1\n      │  descifra con KMS, pushea a AWS SSM Parameter Store\n      ▼\n   /<PROJECT_NAME>/<ENVIRONMENT>/<KEY>  en SSM\n\n3. deploy manual (cd.yaml workflow_dispatch)\n      │\n      ▼\n   cd.yaml  → cd-ms.yaml@v1\n      │  trae el Helm chart compartido, aplica values.yaml\n      ▼\n   pod levanta → entrypoint.sh baja config de SSM → exec pnpm start\n      │\n      ▼\n   probes (liveness + readiness) verifican /:3000 o /<basePath>:3000\n      │  pod queda Ready\n      ▼\n   FQDN disponible: <sub>.develop.modo.com.ar\n```\n\n---\n\n## `entrypoint.sh` — la pieza no obvia\n\nEl container **no lee `.env`**. Baja la config de AWS SSM al arrancar:\n\n```bash\n#!/bin/bash\nset -e\n\nTMP_ENV=/tmp/parameters.env\nTMP_JSON=/tmp/parameters.json\n\n[[ -z \"${PROJECT_NAME}\" || -z \"${ENVIRONMENT}\" ]] && exit 127;\n\necho \"Getting parameters from /${PROJECT_NAME}/${ENVIRONMENT}/\"\naws ssm get-parameters-by-path --path \"/$PROJECT_NAME/$ENVIRONMENT/\" \\\n  --region us-east-1 --with-decryption | jq -r '.Parameters' > ${TMP_JSON}\n\njq -r 'map(\"export \" + (.Name | split(\"/\") | .[-1]) + \"=\" + (.Value | @sh)) | join(\"\\n\")' \\\n  ${TMP_JSON} | grep -v '^$' > ${TMP_ENV}\n\n[[ \"$(stat -c %s ${TMP_ENV})\" == \"0\" ]] && exit 127;\neval $(cat ${TMP_ENV})\nrm -f ${TMP_JSON} ${TMP_ENV}\n\ncd /app && exec pnpm start\n```\n\nPuntos clave:\n- Sale con código `127` si `PROJECT_NAME` o `ENVIRONMENT` están vacíos, o si SSM devuelve vacío. Falla rápido, no arranca con config a medias.\n- `exec pnpm start` (no `pnpm start` solo) — el `exec` reemplaza el proceso bash por node, propagando correctamente `SIGTERM` cuando k8s mata el pod.\n- `PROJECT_NAME` y `ENVIRONMENT` los inyecta el chart Helm como env vars del pod (el `envs.enabled: true` en `values.yaml`).\n\n> **Trampa de `exec`**: si el `entrypoint.sh` usa `pnpm start` sin `exec`, el proceso node queda como hijo del bash. Cuando k8s manda SIGTERM para un rolling update, el bash lo ignora y el pod no cierra limpio → timeout de terminación + pod forzado a matar. Con `exec`, node recibe el SIGTERM directamente.\n\n---\n\n## SOPS → SSM: cómo llegan las variables al pod\n\n```\nparameters/<env>/configurations.yaml  (texto plano, NUNCA commiteado)\n      │  sops --encrypt con la KMS del env\n      ▼\nparameters/<env>/configurations.yaml  (cifrado, commiteado en el repo)\n      │  push a main toca parameters/** → dispara ssm.yaml\n      ▼\nworkflow ssm-sops.yaml@v1\n      │  descifra con KMS, pushea a SSM Parameter Store\n      ▼\nAWS SSM  /<PROJECT_NAME>/<ENVIRONMENT>/<KEY>\n      │  pod arranca, entrypoint.sh get-parameters-by-path --with-decryption\n      ▼\nprocess.env.<KEY>  dentro del container\n```\n\nPara editar parámetros después del primer deploy:\n\n```bash\n# sops abre el editor, descifra y recifra automáticamente\nsops parameters/qa/configurations.yaml\n\n# commit + push de parameters/** dispara ssm.yaml\ngit add parameters/ && git commit -m \"chore(COENXT-XXX): bump QA config\"\ngit push\n```\n\nRevisá el diff en Actions **antes de mergear** — el workflow muestra qué cambia en SSM en texto plano (solo en el diff del workflow, no en el repo).\n\n---\n\n## Secretos vs configuraciones\n\n- `configurations.yaml` — config no sensible: URLs de BFFs, feature flags, keys públicas de Amplitude/Datadog (`NEXT_PUBLIC_*`).\n- `secrets.yaml` — sensible: tokens privados, credenciales de servicios.\n\nAmbos terminan en SSM y se mergean en `process.env`. La separación es para claridad y para saber qué rotar cuando hay un leak.\n\n---\n\n## Ejecutar el primer deploy\n\n### Paso 1 · Push del código (dispara CI)\n\n```bash\n# Mergear el PR de docker + el de ci\n# Push a main dispara ci.yaml automáticamente\ngh run watch  # seguir el Actions run en tiempo real\n```\n\nVerificar en Actions que CI terminó verde. El último step muestra la imagen tagueada:\n\n```\n✓  Build and push Docker image\n   Image: <registry>/<repo>:<SHA>\n```\n\n### Paso 2 · Push de parameters (dispara SSM)\n\n```bash\n# Mergear el PR de parameters\n# (Después de que devops confirmó los ARNs KMS y los parámetros están cifrados)\ngit push origin feat/infra-parameters  # si no está mergeado aún\n```\n\nVerificar el run de `ssm.yaml` en Actions. Debería mostrar los keys que se crearon en SSM.\n\n### Paso 3 · Deploy manual a develop\n\nEn GitHub Actions → `cd.yaml` → \"Run workflow\":\n- `environment`: `develop`\n- `version`: dejar vacío (usa la última imagen)\n\nO por CLI:\n\n```bash\ngh workflow run cd.yaml \\\n  --repo playsistemico/<repo> \\\n  --field environment=develop\n```\n\n### Paso 4 · Verificar el pod\n\n```bash\n# TODO(devops): necesitás acceso al cluster o pedirle a CloudOps que verifique\n# El pod tiene que aparecer como Running con READY 1/1\n\n# Si tenés acceso:\nkubectl get pods -n <project-name>-develop\n# Esperado:\n# NAME                              READY   STATUS    RESTARTS   AGE\n# <project>-deploy-abc123-xyz       1/1     Running   0          2m\n```\n\nSi el pod queda en `CrashLoopBackOff` o `0/1` por más de 2 minutos, revisá los logs:\n\n```bash\nkubectl logs <pod-name> -n <project-name>-develop\n```\n\nLos errores más frecuentes:\n- `exit 127` en `entrypoint.sh` → SSM vacío. Verificar que el PR de parameters se mergeó y el run de `ssm.yaml` terminó verde.\n- `ECONNREFUSED` o `Connection refused` → la app no levantó en el puerto. Verificar `containerPort` en `values.yaml` = puerto real de la app.\n- `Probe failed` → las probes apuntan al path equivocado (ver [lección 03](03-subdominio-basepath.md)).\n\n### Paso 5 · Smoke test del FQDN\n\n```bash\n# Verificar que el FQDN responde\ncurl -fsS -o /dev/null -w '%{http_code}\\n' https://<sub>.develop.modo.com.ar/\n# Esperado: 200\n\n# Si tiene basePath:\ncurl -fsS -o /dev/null -w '%{http_code}\\n' https://<sub>.develop.modo.com.ar/<basePath>\n```\n\nPara un smoke más completo:\n\n```\n/modo-landing-smoke-test\n```\n\nEl skill verifica status codes, headers de seguridad (CSP, HSTS, X-Frame-Options), y que los assets estáticos resuelven.\n\n---\n\n## Flujo de promoción\n\nDespués de verificar develop:\n\n```\ndevelop ──► qa         (cd.yaml manual, environment=qa)\nqa      ──► preprod    (cd.yaml manual, environment=preprod)\npreprod ──► [GATE #5]  (lección 05)\n[GATE]  ──► production (production.yaml manual, solo después del OK de GRC)\n```\n\n> No hay rollback automático — si algo falla en qa, el deploy anterior sigue corriendo hasta que deploys de nuevo. Para rollback explícito: `gh workflow run cd.yaml --field environment=qa --field version=<SHA-anterior>`.\n\n---\n\n## Checklist de salida\n\n- [ ] CI verde en Actions (imagen construida y pusheada)\n- [ ] `ssm.yaml` verde en Actions (parameters en SSM)\n- [ ] Pod `Ready 1/1` en el namespace `<project>-develop`\n- [ ] `curl https://<sub>.develop.modo.com.ar/` devuelve `200`\n- [ ] Smoke test básico: assets cargan, no hay errores de CSP en consola\n- [ ] Promover a qa verificando el mismo smoke en `<sub>.qa.modo.com.ar`\n\n> Siguiente: [05 · Gate de prod](05-gate-prod.md)\n"},{"id":"05","num":"05","title":"Gate de prod","eyebrow":"Lección 05 · GRC / OFFSEC","file":"05-gate-prod.md","md":"# 05 · Gate de prod\n\n> Harness: `modo-jsm-ticket` (`/modo-jsm-ticket`) · GRC / OFFSEC\n\nEl gate de prod no es un paso de verificación post-deploy — es un **gate** que tiene que pasar **antes** de que podás promover a producción. Si OFFSEC lo rebota, no hay prod hasta que se resuelvan los hallazgos. Esta lección explica cómo prepararlo para que no bloquee la fecha.\n\n---\n\n## Ticket #5 · GRC review / threat model\n\n| Campo | Valor |\n|-------|-------|\n| Service Desk | OFFSEC · Cyber Offensive Security |\n| Request Type | Cyber & GRC Hub |\n| sd / rt | 192 / 14111 |\n| Cuándo abrirlo | Al pasar preprod (no el día de prod) |\n| SLA | No declarado — tratá como ≥72h, confirmá en el portal |\n\n```\n/modo-jsm-ticket\n```\n\nEl skill arma el payload del ticket con los campos del formulario live (hace fetch fresh de los fields), te muestra el preview y POSTea con tu confirmación.\n\n> **Abrirlo al entrar a preprod, no el día de prod.** Con SLA no declarado y tratando como ≥72h, si lo abrís el lunes queriendo ir a prod el miércoles, probablemente no llegás. Calendarizá con margen.\n\n---\n\n## Qué necesita OFFSEC para aprobar\n\nEl equipo GRC/OFFSEC revisa:\n\n- **Threat model básico**: qué datos maneja el front, qué APIs consume, qué puede hacer un usuario no autenticado.\n- **CSP + headers de seguridad**: el resultado del Layer 3 del skill `frontend-security-checklist` acelera mucho la review.\n- **Autenticación / autorización**: si el front tiene rutas protegidas o maneja sesiones, cómo están aseguradas.\n- **Dependencias**: `npm audit` sin high/critical sin atender.\n- **Secrets**: que no hay tokens hardcodeados en el código (el scan de Fase 2 del onboarding lo verifica).\n\n### Preparar el Layer 3 antes de abrir el ticket\n\n```\n/frontend-security-checklist\n```\n\nEl skill Layer 3 valida CSP y security headers contra el edge live de preprod. Pasarle el output al ticket #5 muestra que ya hiciste el trabajo:\n\n```bash\n# Layer 3 — validación CSP post-deploy contra preprod\n# (el skill lo hace automáticamente, pero podés verificar a mano)\ncurl -sI https://<sub>.preprod.modo.com.ar/ | grep -i \"content-security-policy\\|x-frame-options\\|strict-transport-security\"\n```\n\nHeaders esperados (mínimo):\n- `Content-Security-Policy` presente y no vacío\n- `X-Frame-Options: DENY` o `SAMEORIGIN`\n- `Strict-Transport-Security` con `max-age` ≥ 31536000\n\n---\n\n## Qué hacer si el ticket rebota\n\nSi OFFSEC encuentra hallazgos:\n\n1. Leer cada hallazgo con calma — muchos son configuración, no código.\n2. Resolver los bloqueantes (los que OFFSEC marcó como requeridos para prod).\n3. Documentar los hallazgos opcionales como deuda en Jira (COENXT o el proyecto del squad).\n4. Actualizar el ticket con las evidencias de fix (commit SHA, screenshot, curl output).\n5. Pedir re-review dentro del mismo ticket (no abrir uno nuevo).\n\n> No escondas hallazgos. Si algo no se puede resolver antes de prod, explicarlo honestamente en el ticket con el plan de remediación y la fecha. Es mejor un hallazgo documentado que uno ignorado.\n\n---\n\n## Ticket #6 · 1Password (post-prod)\n\n| Campo | Valor |\n|-------|-------|\n| Service Desk | CYBS · Cyber-Solicitudes IAM |\n| Request Type | 1Password |\n| sd / rt | 24 / 1042 |\n| Cuándo abrirlo | **Solo después de prod desplegado** |\n| SLA | 72h hábiles desde aprobación |\n\nEste ticket pide un vault en 1Password del team con las **credenciales de prod** (tokens, API keys, secrets del entorno de producción). No tiene sentido abrirlo antes de que prod exista — no hay credenciales que compartir.\n\nPara dev/qa podés pedir un vault separado antes, con scope distinto.\n\n---\n\n## Validación final antes de prod\n\nAdemás del OK de OFFSEC, verificar:\n\n- [ ] **Datadog** recibe trazas de preprod (`unifiedServiceTagging` + `ddTrace` en `values.yaml`)\n- [ ] **Amplitude** emite eventos de preprod (verificar en el dashboard de la propiedad)\n- [ ] **CSP Layer 3** verde en preprod (resultado del skill `frontend-security-checklist`)\n- [ ] **`npm audit`** sin vulnerabilidades high/critical sin atender\n\n```bash\n# Verificar observabilidad en preprod\ncurl -sI https://<sub>.preprod.modo.com.ar/ | grep -i \"x-datadog-trace-id\\|x-b3-traceid\"\n\n# npm audit\npnpm audit --audit-level=high\n```\n\n---\n\n## Promover a prod\n\nSolo después del OK explícito de OFFSEC en el ticket #5:\n\n```bash\ngh workflow run production.yaml \\\n  --repo playsistemico/<repo> \\\n  --field environment=production\n# o desde GitHub Actions → production.yaml → Run workflow\n```\n\nDespués del deploy:\n\n```bash\n# Re-validar CSP/headers contra el edge de prod\ncurl -sI https://<sub>.modo.com.ar/ | grep -i \"content-security-policy\\|strict-transport-security\"\n\n# Smoke final\ncurl -fsS -o /dev/null -w '%{http_code}\\n' https://<sub>.modo.com.ar/\n# Esperado: 200\n```\n\n---\n\n## Checklist de salida\n\n- [ ] Ticket #5 (OFFSEC-14111) abierto al entrar a preprod\n- [ ] Layer 3 CSP ejecutado en preprod y resultado adjunto al ticket\n- [ ] `npm audit` sin high/critical sin atender\n- [ ] Datadog + Amplitude verificados en preprod\n- [ ] OK explícito de OFFSEC en el ticket (no suposición)\n- [ ] Deploy a prod ejecutado con `production.yaml`\n- [ ] Smoke curl 200 en `https://<sub>.modo.com.ar/`\n- [ ] CSP/headers Layer 3 re-validado en prod\n- [ ] Ticket #6 (CYBS-1042 · 1Password) abierto con credenciales de prod\n\n> ¡Listo! Tu front está en producción. Revisá el [Lab integrador](exercises/README.md) para consolidar el flujo completo.\n"},{"id":"lab","num":"🧪","title":"Lab: publicar un front","eyebrow":"Lab integrador","file":"","md":"# Lab · Publicar un front de ejemplo end-to-end (dry-run)\n\n> Harness: todos (`modo-frontend-onboarding`, `modo-frontend-deploy`, `modo-jsm-ticket`, `frontend-security-checklist`, `modo-landing-smoke-test`)\n\nEste lab integra todo lo que viste en las 5 lecciones en un ejercicio continuo. El objetivo es que hagás el flujo completo de punta a punta **en modo dry-run** — es decir, creando los archivos reales y abriendo los tickets, pero desplegando a `develop` solamente (no llegás a prod en el lab).\n\nUsá como proyecto de práctica: **`mi-front-modo`** (nombre de fantasía; en un proyecto real sería el nombre del producto).\n\n---\n\n## Contexto del escenario\n\nTenés un repo Next 15 con la app básica ya funcionando en local. El repo existe en `playsistemico/mi-front-modo` (lo creamos en el paso 1). El front va a vivir en `mifront.modo.com.ar` (subdominio dedicado). No tiene basePath.\n\n---\n\n## Paso 0 · Pre-flight check\n\nAntes de arrancar, verificá que tenés todo lo de la [lección 00](../00-prerequisitos.md):\n\n```bash\nnode -v && pnpm -v && gh --version && sops --version\ngh repo list playsistemico --limit 3\nnpm view @playsistemico/modo-landing-web-ui-lib --registry https://npm.pkg.github.com/ 2>/dev/null | head -2\n```\n\n- [ ] Todas las herramientas responden sin error\n- [ ] GitHub Packages auth funciona\n\n---\n\n## Paso 1 · Ticket #1 (simulado)\n\nEn un proyecto real abrirías el ticket HD-1404. Para el lab, asumimos que el repo ya existe. Verificar:\n\n```bash\ngh repo view playsistemico/mi-front-modo 2>/dev/null || echo \"repo no existe — en prod abrirías HD-1404\"\n```\n\nAnotá el orden correcto de los 6 tickets sin mirar la lección 01:\n\n```\nTicket #1: _______________________  sd/rt: ___ / ___\nTicket #2: _______________________  sd/rt: ___ / ___\nTicket #3: _______________________  sd/rt: ___ / ___\nTicket #4: _______________________  (cuándo abre): _______________\nTicket #5: _______________________  (cuándo abre): _______________\nTicket #6: _______________________  (cuándo abre): _______________\n```\n\n- [ ] Podés nombrar los 6 tickets y su orden sin mirar las notas\n\n---\n\n## Paso 2 · Auditoría del repo\n\nAntes de crear archivos, auditá el estado:\n\n```bash\nR=<ruta-a-mi-front-modo>\necho \"Dockerfile:\";    ls $R/Dockerfile 2>/dev/null    || echo \"FALTA\"\necho \"entrypoint.sh:\"; ls $R/entrypoint.sh 2>/dev/null || echo \"FALTA\"\necho \".npmrc:\";        grep -l 'NODE_AUTH_TOKEN' $R/.npmrc 2>/dev/null || echo \"FALTA o token hardcodeado\"\necho \"helm/:\";         ls $R/helm/values.yaml 2>/dev/null || echo \"FALTA\"\necho \".sops.yaml:\";    ls $R/.sops.yaml 2>/dev/null    || echo \"FALTA\"\necho \"workflows:\";     ls $R/.github/workflows/ci.yaml 2>/dev/null || echo \"FALTAN\"\necho \"PAT leak:\";      grep -rn 'ghp_[A-Za-z0-9]' $R/.npmrc 2>/dev/null && echo \"⚠️ TOKEN HARDCODEADO\" || echo \"limpio\"\n```\n\n- [ ] Gap-list anotada: qué archivos faltan\n\n---\n\n## Paso 3 · Scaffold de infra (clon promos-hub)\n\nEn un worktree dedicado:\n\n```bash\ngit worktree add /tmp/mi-front-infra -b feat/infra-scaffold origin/main\ncd /tmp/mi-front-infra\n\n# Clonar los archivos de promos-hub\ncp /tmp/promos-hub-site/Dockerfile .\ncp /tmp/promos-hub-site/entrypoint.sh . && chmod +x entrypoint.sh\ncp /tmp/promos-hub-site/.dockerignore .\ncp /tmp/promos-hub-site/.npmrc .\ncp -r /tmp/promos-hub-site/helm .\ncp /tmp/promos-hub-site/.sops.yaml .\ncp -r /tmp/promos-hub-site/parameters .\ncp -r /tmp/promos-hub-site/catalog .\ncp -r /tmp/promos-hub-site/.github .\n```\n\nAhora aplicar los valores per-project. Editá `helm/values.yaml` para que tenga:\n- `app.name: \"mi-front-modo\"`\n- `exposeName: \"mifront\"`\n- `containerPort: 3000`\n- Probes a `path: /`\n- KMS ARNs: `TODO(devops)` en `.sops.yaml`\n- `channel:` en `ci.yaml`: `TODO(devops)`\n\n```bash\n# Verificar que no quedó ningún \"promos-hub\" sin reemplazar\ngrep -r \"promos-hub\\|promoshub\" helm/ .github/ catalog/ .sops.yaml 2>/dev/null\n```\n\n- [ ] `grep` no encuentra \"promos-hub\" ni \"promoshub\" en los archivos editados\n- [ ] `.npmrc` tiene `${NODE_AUTH_TOKEN}` (no `ghp_…`)\n- [ ] `chmod +x entrypoint.sh` aplicado (verificar con `ls -la entrypoint.sh`)\n\n---\n\n## Paso 4 · Abrir los 6 PRs\n\nDesde la branch scaffold, crear los 6 PRs como slices sin overlap. Por cada PR:\n\n```bash\n# Ejemplo para helm\ngit checkout -b feat/infra-helm origin/main\ngit checkout feat/infra-scaffold -- helm/\ngit add helm/ && git commit -m \"chore(COENXT-XXX): infra helm · mi-front-modo\"\n# En modo dry-run, verificar el diff antes de pushear:\ngit diff HEAD~1 --name-only\n```\n\n- [ ] 6 branches creadas, cada una con solo los archivos de su concern\n- [ ] Ninguna branch tiene archivos de otra (verificar con `git diff HEAD~1 --name-only`)\n- [ ] `entrypoint.sh` usa `exec pnpm start` (no `pnpm start` solo)\n\n---\n\n## Paso 5 · Verificar config de subdominio\n\nRespondé sin mirar las notas:\n\n1. ¿Qué campo en `values.yaml` define el prefijo del subdominio? `___________`\n2. ¿Qué dos campos hay que habilitar para que la plataforma cree el DNS automáticamente? `___________` + `___________`\n3. Si la app tuviera `basePath: /mipath`, ¿a qué path deberían apuntar las probes? `___________`\n4. ¿Cuál es la diferencia entre `basePath` y `assetPrefix`? (explicar en 1 oración)\n\n- [ ] Respondiste las 4 preguntas sin mirar la lección 03\n\n---\n\n## Paso 6 · Simular el deploy a develop\n\nEn modo dry-run no tenés acceso al cluster. Pero podés verificar el contrato local:\n\n```bash\n# La app levanta en el puerto correcto\npnpm build && pnpm start &\nsleep 8\ncurl -fsS -o /dev/null -w '%{http_code}\\n' http://localhost:3000/\n# Esperado: 200\nkill %1\n```\n\nY verificar que `entrypoint.sh` fallaría si SSM estuviera vacío (comportamiento esperado):\n\n```bash\n# Sin PROJECT_NAME y ENVIRONMENT, debe salir 127\nbash -c 'source ./entrypoint.sh' 2>/dev/null; echo \"exit: $?\"\n# Esperado: exit: 127\n```\n\n- [ ] `curl localhost:3000` devuelve `200`\n- [ ] `entrypoint.sh` sin vars de entorno devuelve exit 127\n\n---\n\n## Criterio de aprobado\n\nEl lab se considera aprobado cuando:\n\n- [ ] Pre-flight check completo (paso 0)\n- [ ] Los 6 tickets nombrados en orden correcto (paso 1)\n- [ ] Gap-list auditada antes de crear archivos (paso 2)\n- [ ] Scaffold completo sin \"promos-hub\" remanente (paso 3)\n- [ ] 6 branches sin overlap de archivos (paso 4)\n- [ ] 4 preguntas de subdominio respondidas sin notas (paso 5)\n- [ ] App levanta en :3000 y entrypoint.sh falla rápido sin vars (paso 6)\n- [ ] `.npmrc` sin token hardcodeado en ningún archivo staged\n\n---\n\n## Checklist de errores comunes para revisar\n\nAntes de declarar el lab completo, verificar que no cayste en ninguna de estas trampas:\n\n- [ ] No copiaste los KMS ARNs de promos — están como `TODO(devops)` o son ARNs reales del nuevo proyecto\n- [ ] `exec pnpm start` (no `pnpm start` solo) en `entrypoint.sh`\n- [ ] Probes apuntan a `/` (no a `/<basePath>` cuando no hay basePath)\n- [ ] `containerPort` en `values.yaml` = `3000` (no `8080` de modo-landing legacy)\n- [ ] `app.name` en `values.yaml` es único y en kebab-case\n\n> Si tenés dudas de si algo está bien, invocar `/modo-frontend-deploy` — el skill audita el estado del repo y te dice qué falta con una gap-list honesta.\n"}];</script>
