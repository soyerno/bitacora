name: Update contributions chart

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/generate-contributions-svg.mjs'
      - '.github/workflows/update-contributions.yml'

permissions:
  contents: write

concurrency:
  group: update-contributions
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate SVG and profile.json
        env:
          CONTRIB_TOKEN: ${{ secrets.CONTRIB_TOKEN }}
        run: node scripts/generate-contributions-svg.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/contributions.svg public/assets/profile.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh contributions chart"
          git push
